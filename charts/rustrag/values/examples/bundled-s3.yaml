app:
  environment: production
  frontendOrigin: https://rustrag.example.com

startup:
  mode: startup_job

storage:
  provider: s3
  topology: shared_cluster
  s3:
    mode: bundled
    bucket: rustrag
    accessKeyId: rustrag
    secretAccessKey: rustrag-dev-secret

dependencies:
  postgres:
    mode: bundled
  redis:
    mode: bundled
  arangodb:
    mode: bundled
