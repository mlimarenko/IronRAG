apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rustrag.fullname" . }}-api
  labels:
    {{- include "rustrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "rustrag.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "rustrag.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "rustrag.serviceAccountName" . }}
      {{- if eq .Values.startup.mode "startup_job" }}
      initContainers:
        {{- include "rustrag.startupWaitInitContainer" . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: {{ .Values.security.runAsUser | default 1000 }}
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "rustrag.fullname" . }}-runtime
            - secretRef:
                name: {{ include "rustrag.runtimeSecretName" . }}
          env:
            - name: RUSTRAG_SERVICE_ROLE
              value: api
            - name: RUSTRAG_SERVICE_NAME
              value: rustrag-api
          readinessProbe:
            httpGet:
              path: /v1/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if eq .Values.storage.provider "filesystem" }}
            - name: content-storage
              mountPath: {{ .Values.storage.rootPath }}
            {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        {{- if eq .Values.storage.provider "filesystem" }}
        - name: content-storage
          persistentVolumeClaim:
            claimName: {{ include "rustrag.fullname" . }}-content-storage
        {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rustrag.fullname" . }}-api
  labels:
    {{- include "rustrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "rustrag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
