{{- if eq .Values.startup.mode "startup_job" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ironrag.startupJobName" . }}
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: startup
spec:
  backoffLimit: {{ .Values.startup.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.startup.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "ironrag.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: startup
      annotations:
        {{- include "ironrag.runtimePodAnnotations" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ironrag.serviceAccountName" . }}
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.security.runAsUser | default 1000 }}
        runAsGroup: {{ .Values.security.runAsUser | default 1000 }}
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        {{- include "ironrag.startupDependencyWaitInitContainer" . | nindent 8 }}
      containers:
        - name: startup
          image: "{{ include "ironrag.appImage" (dict "root" . "image" .Values.api.image) }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: {{ .Values.security.runAsUser | default 1000 }}
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: {{ include "ironrag.fullname" . }}-runtime
            - secretRef:
                name: {{ include "ironrag.runtimeSecretName" . }}
          env:
            - name: IRONRAG_SERVICE_ROLE
              value: startup
            - name: IRONRAG_SERVICE_NAME
              value: ironrag-startup
            - name: OTEL_SERVICE_NAME
              value: ironrag-startup
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if eq .Values.storage.provider "filesystem" }}
            - name: content-storage
              mountPath: {{ .Values.storage.rootPath }}
            {{- end }}
          resources:
            {{- toYaml .Values.startup.resources | nindent 12 }}
      volumes:
        {{- include "ironrag.startupWaitKubeApiVolume" . | nindent 8 }}
        - name: tmp
          emptyDir:
            # Disk-backed (node ephemeral storage), NOT medium: Memory. A
            # RAM-backed /tmp charges scratch bytes to the pod memory cgroup;
            # keeping it on disk lands them in ephemeral-storage (capped by
            # the resource preset), off the memory budget. Mirrors the host
            # tmpfs /tmp trap fixed for docker-compose.
            sizeLimit: 1Gi
        {{- if eq .Values.storage.provider "filesystem" }}
        - name: content-storage
          persistentVolumeClaim:
            claimName: {{ include "ironrag.fullname" . }}-content-storage
        {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
