{{- if eq .Values.dependencies.postgres.mode "bundled" }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ironrag.fullname" . }}-postgres
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.dependencies.postgres.persistence.size }}
  {{- with .Values.dependencies.postgres.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ironrag.fullname" . }}-postgres
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      {{- include "ironrag.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "ironrag.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: "{{ .Values.dependencies.postgres.image.repository }}:{{ .Values.dependencies.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.dependencies.postgres.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: POSTGRES_DB
              value: {{ .Values.dependencies.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.dependencies.postgres.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ironrag.bundledDependencySecretName" . }}
                  key: IRONRAG_POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
              name: tcp
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
            - name: socket
              mountPath: /var/run/postgresql
            # Postgres parallel-query gathers allocate dynamic-shared-memory
            # segments in /dev/shm. Kubernetes mounts /dev/shm as a 64Mi
            # emptyDir by default, which large graph-topology scans or a
            # burst of concurrent graph loads exhaust ("could not resize
            # shared memory segment ... No space left on device" -> HTTP
            # 500). A memory-backed emptyDir raises the ceiling; the size
            # counts against the pod memory limit, so it is sized modestly.
            # The app also pins the heaviest topology scans to a non-parallel
            # plan, so correctness does not depend on this alone.
            - name: dshm
              mountPath: /dev/shm
          resources:
            {{- toYaml .Values.dependencies.postgres.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "ironrag.fullname" . }}-postgres
        - name: socket
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.dependencies.postgres.shmSize | default "256Mi" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ironrag.fullname" . }}-postgres
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  selector:
    {{- include "ironrag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - name: tcp
      port: {{ .Values.dependencies.postgres.port }}
      targetPort: tcp
{{- end }}
