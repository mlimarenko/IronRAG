{{- if eq .Values.dependencies.redis.mode "bundled" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ironrag.fullname" . }}-redis
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ironrag.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "ironrag.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: "{{ .Values.dependencies.redis.image.repository }}:{{ .Values.dependencies.redis.image.tag }}"
          imagePullPolicy: {{ .Values.dependencies.redis.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - redis-server
            - --save
            - ""
            - --appendonly
            - "no"
            - --maxmemory
            - {{ .Values.dependencies.redis.maxMemory | quote }}
            - --maxmemory-policy
            - volatile-lru
          ports:
            - containerPort: 6379
              name: tcp
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.dependencies.redis.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ironrag.fullname" . }}-redis
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  selector:
    {{- include "ironrag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - name: tcp
      port: {{ .Values.dependencies.redis.port }}
      targetPort: tcp
{{- end }}
