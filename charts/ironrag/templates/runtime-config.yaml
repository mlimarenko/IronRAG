apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ironrag.fullname" . }}-runtime
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
data:
  IRONRAG_ENVIRONMENT: {{ .Values.app.environment | quote }}
  IRONRAG_DEPLOYMENT_ID: {{ .Values.observability.deploymentId | quote }}
  IRONRAG_DATABASE_MAX_CONNECTIONS: {{ .Values.app.databaseMaxConnections | quote }}
  IRONRAG_API_REPLICAS: {{ include "ironrag.apiCapacityReplicas" . | quote }}
  IRONRAG_WORKER_REPLICAS: {{ include "ironrag.workerCapacityReplicas" . | quote }}
  IRONRAG_KNOWLEDGE_PLANE_BACKEND: {{ .Values.app.knowledgePlaneBackend | quote }}
  IRONRAG_QUERY_ANSWER_SOURCE_LINKS_ENABLED: {{ .Values.app.queryAnswerSourceLinksEnabled | quote }}
  IRONRAG_PROVIDER_CONCURRENCY_MAX_OUTBOUND: {{ .Values.app.providerConcurrency.maxOutbound | quote }}
  IRONRAG_PROVIDER_CONCURRENCY_QUERY_RESERVED: {{ .Values.app.providerConcurrency.queryReserved | quote }}
  IRONRAG_PROVIDER_CONCURRENCY_ACQUIRE_TIMEOUT_MS: {{ .Values.app.providerConcurrency.acquireTimeoutMs | quote }}
  IRONRAG_PROVIDER_CONCURRENCY_REGISTRY_MAX_ENTRIES: {{ .Values.app.providerConcurrency.registryMaxEntries | quote }}
  IRONRAG_PROVIDER_CONCURRENCY_REGISTRY_IDLE_TTL_SECONDS: {{ .Values.app.providerConcurrency.registryIdleTtlSeconds | quote }}
  IRONRAG_PG_HNSW_EF_SEARCH: {{ .Values.app.pgHnsw.efSearch | quote }}
  IRONRAG_PG_HNSW_MAX_SCAN_TUPLES: {{ .Values.app.pgHnsw.maxScanTuples | quote }}
  IRONRAG_PG_HNSW_SCAN_MEM_MULTIPLIER: {{ .Values.app.pgHnsw.scanMemMultiplier | quote }}
  IRONRAG_PG_HNSW_EXACT_FALLBACK_MAX_ROWS: {{ .Values.app.pgHnsw.exactFallbackMaxRows | quote }}
  IRONRAG_QUERY_RERANK_ENABLED: {{ .Values.app.queryRerank.enabled | quote }}
  IRONRAG_QUERY_RERANK_CANDIDATE_LIMIT: {{ .Values.app.queryRerank.candidateLimit | quote }}
  IRONRAG_QUERY_SEMANTIC_RERANK_MODE: {{ .Values.app.queryRerank.semantic.mode | quote }}
  IRONRAG_QUERY_SEMANTIC_RERANK_TIMEOUT_MS: {{ .Values.app.queryRerank.semantic.timeoutMs | quote }}
  IRONRAG_QUERY_SEMANTIC_RERANK_CANDIDATE_LIMIT: {{ .Values.app.queryRerank.semantic.candidateLimit | quote }}
  IRONRAG_QUERY_SEMANTIC_RERANK_CANDIDATE_TEXT_CHARS: {{ .Values.app.queryRerank.semantic.candidateTextChars | quote }}
  IRONRAG_QUERY_SEMANTIC_RERANK_TOTAL_TEXT_CHARS: {{ .Values.app.queryRerank.semantic.totalTextChars | quote }}
  IRONRAG_LOG_FILTER: {{ .Values.app.logFilter | quote }}
  IRONRAG_FRONTEND_ORIGIN: {{ .Values.app.frontendOrigin | quote }}
  IRONRAG_OPENAPI_PUBLIC_ORIGIN: {{ .Values.app.openapiPublicOrigin | quote }}
  IRONRAG_CREDENTIAL_ENCRYPTION_WRITE_ENABLED: {{ .Values.app.credentialEncryptionWriteEnabled | quote }}
  IRONRAG_UI_BOOTSTRAP_ADMIN_LOGIN: {{ .Values.app.bootstrapAdmin.login | quote }}
  IRONRAG_UI_BOOTSTRAP_EXTRACT_GRAPH_PROVIDER_KIND: {{ .Values.app.modelDefaults.extractGraphProviderKind | quote }}
  IRONRAG_UI_BOOTSTRAP_EXTRACT_GRAPH_MODEL_NAME: {{ .Values.app.modelDefaults.extractGraphModelName | quote }}
  IRONRAG_UI_BOOTSTRAP_EMBED_CHUNK_PROVIDER_KIND: {{ .Values.app.modelDefaults.embedChunkProviderKind | quote }}
  IRONRAG_UI_BOOTSTRAP_EMBED_CHUNK_MODEL_NAME: {{ .Values.app.modelDefaults.embedChunkModelName | quote }}
  IRONRAG_UI_BOOTSTRAP_QUERY_COMPILE_PROVIDER_KIND: {{ .Values.app.modelDefaults.queryCompileProviderKind | quote }}
  IRONRAG_UI_BOOTSTRAP_QUERY_COMPILE_MODEL_NAME: {{ .Values.app.modelDefaults.queryCompileModelName | quote }}
  IRONRAG_UI_BOOTSTRAP_QUERY_ANSWER_PROVIDER_KIND: {{ .Values.app.modelDefaults.queryAnswerProviderKind | quote }}
  IRONRAG_UI_BOOTSTRAP_QUERY_ANSWER_MODEL_NAME: {{ .Values.app.modelDefaults.queryAnswerModelName | quote }}
  IRONRAG_UI_BOOTSTRAP_AGENT_PROVIDER_KIND: {{ .Values.app.modelDefaults.agentProviderKind | quote }}
  IRONRAG_UI_BOOTSTRAP_AGENT_MODEL_NAME: {{ .Values.app.modelDefaults.agentModelName | quote }}
  IRONRAG_UI_BOOTSTRAP_EXTRACT_TEXT_PROVIDER_KIND: {{ .Values.app.modelDefaults.extractTextProviderKind | quote }}
  IRONRAG_UI_BOOTSTRAP_EXTRACT_TEXT_MODEL_NAME: {{ .Values.app.modelDefaults.extractTextModelName | quote }}
  IRONRAG_RUNTIME_POLICY_REJECT_TASK_KINDS: {{ .Values.app.runtimePolicy.rejectTaskKinds | quote }}
  IRONRAG_RUNTIME_POLICY_REJECT_TARGET_KINDS: {{ .Values.app.runtimePolicy.rejectTargetKinds | quote }}
  IRONRAG_UI_DEFAULT_LOCALE: {{ .Values.app.uiDefaultLocale | quote }}
  IRONRAG_STARTUP_AUTHORITY_MODE: {{ .Values.startup.mode | quote }}
  IRONRAG_DEPENDENCY_POSTGRES_MODE: {{ .Values.dependencies.postgres.mode | quote }}
  IRONRAG_DEPENDENCY_REDIS_MODE: {{ .Values.dependencies.redis.mode | quote }}
  IRONRAG_DEPENDENCY_OBJECT_STORAGE_MODE: {{ include "ironrag.objectStorageMode" . | quote }}
  IRONRAG_CONTENT_STORAGE_PROVIDER: {{ .Values.storage.provider | quote }}
  IRONRAG_CONTENT_STORAGE_TOPOLOGY: {{ .Values.storage.topology | quote }}
  IRONRAG_CONTENT_STORAGE_KEY_PREFIX: {{ .Values.storage.keyPrefix | quote }}
  IRONRAG_CONTENT_STORAGE_ROOT: {{ .Values.storage.rootPath | quote }}
  IRONRAG_CONTENT_STORAGE_S3_BUCKET: {{ .Values.storage.s3.bucket | quote }}
  IRONRAG_CONTENT_STORAGE_S3_ENDPOINT: {{ include "ironrag.s3Endpoint" . | quote }}
  IRONRAG_CONTENT_STORAGE_S3_REGION: {{ .Values.storage.s3.region | quote }}
  IRONRAG_CONTENT_STORAGE_S3_FORCE_PATH_STYLE: {{ .Values.storage.s3.forcePathStyle | quote }}
  IRONRAG_OTEL_ENABLED: {{ .Values.observability.enabled | quote }}
  OTEL_RESOURCE_ATTRIBUTES: {{ .Values.observability.resourceAttributes | quote }}
  OTEL_TRACES_EXPORTER: {{ .Values.observability.tracesExporter | quote }}
  OTEL_METRICS_EXPORTER: {{ .Values.observability.metricsExporter | quote }}
  OTEL_LOGS_EXPORTER: {{ .Values.observability.logsExporter | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ .Values.observability.otlpProtocol | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.otlpEndpoint | quote }}
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: {{ .Values.observability.metricsTemporality | quote }}
