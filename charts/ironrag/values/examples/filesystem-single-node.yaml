app:
  environment: single-node
  frontendOrigin: https://ironrag.example.com

api:
  replicaCount: 1

worker:
  replicaCount: 1

web:
  replicaCount: 1

startup:
  mode: startup_job

storage:
  provider: filesystem
  topology: single_node

dependencies:
  postgres:
    mode: bundled
    image:
      repository: pgvector/pgvector
      tag: pg18
  redis:
    mode: bundled
    image:
      repository: redis
      tag: "8.8"
