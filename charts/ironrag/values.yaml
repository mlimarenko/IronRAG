nameOverride: ""
fullnameOverride: ""

# CPU/memory tiers aligned with docker-compose resource anchors (requests ≈ compose
# reservations, limits ≈ compose limits). Override any component's `resources` to replace.
resourcePresets:
  small: &ironrag-resources-small
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  medium: &ironrag-resources-medium
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 3Gi
  # ArangoDB sits alone on this tier (the API backend + worker use `workload`
  # below). The 6 GiB ceiling is sized for ArangoDB's IVF vector-index build
  # path: with multi-dim per-(library,dim) embedding bindings, the largest
  # per-(library,dim) shard `knowledge_chunk_vector_d{dim}_l{libhex}` can
  # still hold hundreds of thousands of rows for a big library, and Arango
  # must be allowed to train + ingest the IVF index without hitting the pod
  # memory cap. Do not lower below the largest active shard's IVF build need;
  # see the vector-layer policy in CLAUDE.md and the matching anchor in
  # docker-compose.yml.
  large: &ironrag-resources-large
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "4"
      memory: 6Gi
  # API backend + ingest worker tier. 4 GiB is the canonical docling memory
  # containment: auto_docling_max_concurrency_for_limits resolves a 4 GiB
  # limit to docling concurrency = 1, so a docling/python spike OOMs the
  # worker pod (job retries) rather than starving co-scheduled pods. The
  # Burstable QoS (requests < limits) also biases the kubelet OOM-killer
  # toward the worker over the API backend.
  workload: &ironrag-resources-workload
    requests:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 1Gi
    limits:
      cpu: "4"
      memory: 4Gi
      ephemeral-storage: 4Gi

imagePullSecrets: []
commonLabels: {}
podAnnotations: {}

serviceAccount:
  create: true
  name: ""

runtimeSecret:
  existingSecret: ""

app:
  environment: production
  bindAddr: 0.0.0.0:8080
  frontendOrigin: https://ironrag.example.com
  logFilter: info
  databaseMaxConnections: 20
  queryAnswerSourceLinksEnabled: false
  uiDefaultLocale: ru
  bootstrapToken: bootstrap-local
  bootstrapAdmin:
    login: ""
    password: ""
    apiToken: ""
  modelDefaults:
    extractGraphProviderKind: openai
    extractGraphModelName: gpt-5.4-nano
    embedChunkProviderKind: openai
    embedChunkModelName: text-embedding-3-large
    queryAnswerProviderKind: openai
    queryAnswerModelName: gpt-5.4-mini
    visionProviderKind: openai
    visionModelName: gpt-5.4-mini
  providerSecrets:
    openaiApiKey: ""
    deepseekApiKey: ""
    qwenApiKey: ""
  runtimePolicy:
    rejectTaskKinds: ""
    rejectTargetKinds: ""
  arangodbBootstrap:
    collections: true
    views: true
    graph: true
    vectorIndexes: true

observability:
  enabled: true
  # Empty endpoint/protocol defer to the compiled-in diagnostics defaults
  # (apps/api/observability.toml). Set them to override the shipped sink, or
  # set enabled=false to disable diagnostics export entirely.
  otlpEndpoint: ""
  otlpProtocol: ""
  resourceAttributes: service.namespace=ironrag
  tracesExporter: otlp
  metricsExporter: otlp
  logsExporter: otlp
  metricsTemporality: cumulative

startup:
  mode: startup_job
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  resources: *ironrag-resources-medium
  wait:
    image:
      repository: registry.k8s.io/kubectl
      tag: v1.35.1
      pullPolicy: IfNotPresent
    timeoutSeconds: 900

security:
  runAsUser: 1000

api:
  replicaCount: 2
  image:
    repository: pipingspace/ironrag-backend
    # Empty means use Chart.appVersion.
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources: *ironrag-resources-workload
  nodeSelector: {}
  tolerations: []
  affinity: {}

worker:
  replicaCount: 2
  image:
    repository: pipingspace/ironrag-backend
    # Empty means use Chart.appVersion.
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources: *ironrag-resources-workload
  nodeSelector: {}
  tolerations: []
  affinity: {}

web:
  replicaCount: 2
  image:
    repository: pipingspace/ironrag-frontend
    # Empty means use Chart.appVersion.
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources: *ironrag-resources-small
  nodeSelector: {}
  tolerations: []
  affinity: {}
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: ironrag.local
        paths:
          - /
    tls: []

storage:
  provider: s3
  topology: shared_cluster
  keyPrefix: ""
  rootPath: /var/lib/ironrag/content-storage
  filesystem:
    size: 20Gi
    storageClassName: ""
  s3:
    mode: bundled
    bucket: ironrag
    endpoint: ""
    region: us-east-1
    accessKeyId: ironrag
    secretAccessKey: ironrag-dev-secret
    sessionToken: ""
    forcePathStyle: true
    image:
      repository: s4core/s4core
      # For production deployments, prefer pinning via digest below.
      # `tag` is used only when `digest` is empty.
      tag: latest
      # Set to a sha256 digest like "sha256:abc..." for reproducible deploys.
      # Example: digest: "sha256:e68547d747f34e4d23a2c28da35ffdc70e747b7f5b256cd6c44807dffe619e6e"
      digest: ""
      pullPolicy: IfNotPresent
    persistence:
      size: 20Gi
      storageClassName: ""
    resources: *ironrag-resources-medium

dependencies:
  postgres:
    mode: bundled
    url: ""
    host: ""
    port: 5432
    database: ironrag
    username: postgres
    password: postgres
    image:
      repository: postgres
      tag: 18-alpine
      pullPolicy: IfNotPresent
    persistence:
      size: 20Gi
      storageClassName: ""
    resources: *ironrag-resources-medium
  redis:
    mode: bundled
    url: ""
    host: ""
    port: 6379
    image:
      repository: redis
      tag: "8.6"
      pullPolicy: IfNotPresent
    maxMemory: 512mb
    resources: *ironrag-resources-small
  arangodb:
    mode: bundled
    url: ""
    host: ""
    port: 8529
    database: ironrag
    username: root
    password: ironrag-dev
    image:
      repository: arangodb
      tag: 3.12.4
      pullPolicy: IfNotPresent
    persistence:
      size: 20Gi
      storageClassName: ""
    resources: *ironrag-resources-large
