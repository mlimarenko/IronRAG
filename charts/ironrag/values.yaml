nameOverride: ""
fullnameOverride: ""

# CPU/memory tiers mirror the docker-compose role-based resource anchors 1:1
# (requests ≈ compose `reservations`, limits ≈ compose `limits`). The memory
# LIMIT is the load-bearing number: it is the cgroup ceiling that decides OOM
# behavior, and it must stay in lockstep with the matching `x-ironrag-resources-*`
# anchor in docker-compose.yml. Override any component's `resources` to replace
# a tier.
#
# QoS: every tier sets requests < limits → Burstable QoS. Under node memory
# pressure the kubelet evicts/OOM-kills Burstable pods before Guaranteed ones
# and ranks them by how far each exceeds its requests — mirroring the compose
# `oom_score_adj` ladder that sacrifices the worker first and the stateful
# stores (postgres/redis/arangodb) last.
resourcePresets:
  # Web SPA + nginx. Mirrors x-ironrag-resources-frontend.
  frontend: &ironrag-resources-frontend
    requests:
      cpu: 200m
      memory: 64Mi
    limits:
      cpu: "1"
      memory: 256Mi
  # Redis cache. Mirrors x-ironrag-resources-cache.
  cache: &ironrag-resources-cache
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 768Mi
  # Postgres relational store + one-shot startup migrator share this tier.
  # Mirrors x-ironrag-resources-db. ephemeral-storage covers migration scratch
  # and the migrator's /tmp.
  db: &ironrag-resources-db
    requests:
      cpu: 500m
      memory: 256Mi
      ephemeral-storage: 1Gi
    limits:
      cpu: "2"
      memory: 1536Mi
      ephemeral-storage: 4Gi
  # Ingest worker. Mirrors x-ironrag-resources-worker. 3 GiB is the canonical
  # docling containment: auto_docling_max_concurrency_for_limits resolves a
  # 3 GiB limit to docling concurrency = 1, so a docling/python spike cgroup-
  # OOMs the worker pod (job retries) instead of starving co-scheduled pods.
  worker: &ironrag-resources-worker
    requests:
      cpu: "1"
      memory: 768Mi
      ephemeral-storage: 1Gi
    limits:
      cpu: "4"
      memory: 3072Mi
      ephemeral-storage: 4Gi
  # API backend (answer path; no docling spawned here). Mirrors
  # x-ironrag-resources-backend. 3.5 GiB covers concurrent grounded-answer
  # turns with margin.
  backend: &ironrag-resources-backend
    requests:
      cpu: "1"
      memory: 768Mi
      ephemeral-storage: 1Gi
    limits:
      cpu: "4"
      memory: 3584Mi
      ephemeral-storage: 4Gi
  # ArangoDB sits alone on the vector tier. Mirrors x-ironrag-resources-vector.
  # The 5 GiB ceiling is sized for ArangoDB's IVF vector-index build: with
  # multi-dim per-(library,dim) bindings, the largest per-(library,dim) shard
  # `knowledge_chunk_vector_d{dim}_l{libhex}` can hold hundreds of thousands of
  # rows, and Arango must train + ingest the IVF index under the pod cap. The
  # builder fail-soft-caps nLists to the training budget (default 3 GB, env-
  # overridable via IRONRAG_VECTOR_INDEX_TRAINING_BUDGET_BYTES) ÷ the empirical
  # 50 MB/list, so a smaller cap means a cheaper build, never an OOM. Do not
  # lower below the largest active shard's IVF build need; raise it (and the
  # training budget) in lockstep with a bigger model/corpus — see the vector-
  # layer policy in CLAUDE.md and the matching docker-compose.yml anchor.
  vector: &ironrag-resources-vector
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "4"
      memory: 5Gi

imagePullSecrets: []
commonLabels: {}
podAnnotations: {}

serviceAccount:
  create: true
  name: ""

runtimeSecret:
  existingSecret: ""

app:
  environment: production
  frontendOrigin: https://ironrag.example.com
  logFilter: info
  databaseMaxConnections: 20
  queryAnswerSourceLinksEnabled: false
  uiDefaultLocale: ru
  bootstrapToken: bootstrap-local
  bootstrapAdmin:
    login: ""
    password: ""
    apiToken: ""
  modelDefaults:
    extractGraphProviderKind: openai
    extractGraphModelName: gpt-5.4-nano
    embedChunkProviderKind: openai
    embedChunkModelName: text-embedding-3-large
    queryAnswerProviderKind: openai
    queryAnswerModelName: gpt-5.4-mini
    visionProviderKind: openai
    visionModelName: gpt-5.4-mini
  providerSecrets:
    openaiApiKey: ""
    deepseekApiKey: ""
    qwenApiKey: ""
  runtimePolicy:
    rejectTaskKinds: ""
    rejectTargetKinds: ""
  arangodbBootstrap:
    collections: true
    views: true
    graph: true
    vectorIndexes: true

observability:
  enabled: true
  # Empty endpoint/protocol defer to the compiled-in diagnostics defaults
  # (apps/api/observability.toml). Set them to override the shipped sink, or
  # set enabled=false to disable diagnostics export entirely.
  otlpEndpoint: ""
  otlpProtocol: ""
  resourceAttributes: service.namespace=ironrag
  tracesExporter: otlp
  metricsExporter: otlp
  logsExporter: otlp
  metricsTemporality: cumulative

startup:
  mode: startup_job
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  resources: *ironrag-resources-db
  wait:
    image:
      repository: registry.k8s.io/kubectl
      tag: v1.35.1
      pullPolicy: IfNotPresent
    timeoutSeconds: 900

security:
  runAsUser: 1000

api:
  replicaCount: 2
  image:
    repository: pipingspace/ironrag-backend
    # Empty means use Chart.appVersion.
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources: *ironrag-resources-backend
  nodeSelector: {}
  tolerations: []
  affinity: {}

worker:
  replicaCount: 2
  image:
    repository: pipingspace/ironrag-backend
    # Empty means use Chart.appVersion.
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources: *ironrag-resources-worker
  nodeSelector: {}
  tolerations: []
  affinity: {}

web:
  replicaCount: 2
  image:
    repository: pipingspace/ironrag-frontend
    # Empty means use Chart.appVersion.
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources: *ironrag-resources-frontend
  nodeSelector: {}
  tolerations: []
  affinity: {}
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: ironrag.local
        paths:
          - /
    tls: []

storage:
  provider: s3
  topology: shared_cluster
  keyPrefix: ""
  rootPath: /var/lib/ironrag/content-storage
  filesystem:
    size: 20Gi
    storageClassName: ""
  s3:
    mode: bundled
    bucket: ironrag
    endpoint: ""
    region: us-east-1
    accessKeyId: ironrag
    secretAccessKey: ironrag-dev-secret
    sessionToken: ""
    forcePathStyle: true
    image:
      repository: s4core/s4core
      # For production deployments, prefer pinning via digest below.
      # `tag` is used only when `digest` is empty.
      tag: latest
      # Set to a sha256 digest like "sha256:abc..." for reproducible deploys.
      # Example: digest: "sha256:e68547d747f34e4d23a2c28da35ffdc70e747b7f5b256cd6c44807dffe619e6e"
      digest: ""
      pullPolicy: IfNotPresent
    persistence:
      size: 20Gi
      storageClassName: ""
    resources: *ironrag-resources-db

dependencies:
  postgres:
    mode: bundled
    url: ""
    host: ""
    port: 5432
    database: ironrag
    username: postgres
    password: postgres
    # Size of the memory-backed /dev/shm emptyDir mounted into the postgres
    # pod. Raises the stock 64Mi k8s default so parallel-query gathers have
    # room for their dynamic-shared-memory segments; large graph-topology
    # scans / concurrent graph loads otherwise exhaust 64Mi and the request
    # fails with `No space left on device` -> HTTP 500. Counts against the
    # pod memory limit, so keep it modest.
    shmSize: 256Mi
    image:
      repository: postgres
      tag: 18-alpine
      pullPolicy: IfNotPresent
    persistence:
      size: 20Gi
      storageClassName: ""
    resources: *ironrag-resources-db
  redis:
    mode: bundled
    url: ""
    host: ""
    port: 6379
    image:
      repository: redis
      tag: "8.6"
      pullPolicy: IfNotPresent
    maxMemory: 512mb
    resources: *ironrag-resources-cache
  arangodb:
    mode: bundled
    url: ""
    host: ""
    port: 8529
    database: ironrag
    username: root
    password: ironrag-dev
    image:
      repository: arangodb
      tag: 3.12.4
      pullPolicy: IfNotPresent
    persistence:
      size: 20Gi
      storageClassName: ""
    resources: *ironrag-resources-vector
