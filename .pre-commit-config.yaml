repos:
  - repo: local
    hooks:
      - id: backend-fmt
        name: backend-fmt
        entry: bash -lc 'cd backend && cargo fmt --all'
        language: system
        pass_filenames: false
      - id: backend-lint
        name: backend-lint
        entry: bash -lc 'cd backend && cargo clippy --all-targets --all-features -- -D warnings'
        language: system
        pass_filenames: false
      - id: backend-test
        name: backend-test
        entry: bash -lc 'cd backend && cargo test'
        language: system
        pass_filenames: false
      - id: frontend-lint
        name: frontend-lint
        entry: bash -lc 'cd frontend && npm run lint'
        language: system
        pass_filenames: false
      - id: frontend-format-check
        name: frontend-format-check
        entry: bash -lc 'cd frontend && npm run format:check'
        language: system
        pass_filenames: false
      - id: frontend-typecheck
        name: frontend-typecheck
        entry: bash -lc 'cd frontend && npm run typecheck'
        language: system
        pass_filenames: false
