components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Bearer token minted by `POST /v1/auth/tokens`.
        Note: some read/list endpoints are currently public and do not require auth.
  parameters:
    id:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    workspaceId:
      in: query
      name: workspace_id
      required: false
      schema:
        type: string
        format: uuid
    projectIdOptional:
      in: query
      name: project_id
      required: false
      schema:
        type: string
        format: uuid
    documentId:
      in: query
      name: document_id
      required: false
      schema:
        type: string
        format: uuid
    limit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        format: int64
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
          examples:
            apiErrorEnvelope:
              value:
                error: unauthorized
        text/plain:
          schema:
            type: string
          examples:
            authExtractorError:
              value: missing authorization header
      headers:
        WWW-Authenticate:
          required: false
          schema:
            type: string
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
        text/plain:
          schema:
            type: string
  schemas:
    ApiErrorBody:
      type: object
      required: [error]
      properties:
        error:
          type: string

    HealthResponse:
      type: object
      required: [status, service, environment]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: rustrag-backend
        environment:
          type: string
          example: local

    ReadinessResponse:
      type: object
      required: [status, postgres, redis]
      properties:
        status:
          type: string
          enum: [ready, degraded]
        postgres:
          type: string
          enum: [ok, down]
        redis:
          type: string
          enum: [ok, down]

    HealthState:
      type: string
      enum: [healthy, degraded, failed, unknown]

    VersionResponse:
      type: object
      required: [service, version, environment]
      properties:
        service:
          type: string
        version:
          type: string
          example: 0.1.0
        environment:
          type: string

    CreateTokenRequest:
      type: object
      required: [token_kind, label, scopes]
      properties:
        workspace_id:
          type: [string, "null"]
          format: uuid
        token_kind:
          type: string
          example: workspace_api
        label:
          type: string
          example: frontend-local
        scopes:
          type: array
          items:
            type: string
          example: [documents:read, query:run]

    TokenCreateResponse:
      type: object
      required: [id, token_kind, label, token, scopes]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: [string, "null"]
          format: uuid
        token_kind:
          type: string
        label:
          type: string
        token:
          type: string
          description: Plaintext token shown only at creation time.
        scopes:
          type: array
          items:
            type: string

    WorkspaceSummary:
      type: object
      required: [id, slug, name, status]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        status:
          type: string
          example: active

    WorkspaceGovernanceSummary:
      type: object
      required:
        [
          id,
          slug,
          name,
          status,
          projects,
          provider_accounts,
          model_profiles,
          api_tokens,
          health_state,
          usage,
        ]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        status:
          type: string
        projects:
          type: integer
          minimum: 0
        provider_accounts:
          type: integer
          minimum: 0
        model_profiles:
          type: integer
          minimum: 0
        api_tokens:
          type: integer
          minimum: 0
        health_state:
          $ref: "#/components/schemas/HealthState"
        usage:
          $ref: "#/components/schemas/UsageGovernanceSummary"

    CreateWorkspaceRequest:
      type: object
      required: [slug, name]
      properties:
        slug:
          type: string
        name:
          type: string

    ProjectSummary:
      type: object
      required: [id, workspace_id, slug, name]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: [string, "null"]

    CreateProjectRequest:
      type: object
      required: [workspace_id, slug, name]
      properties:
        workspace_id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: [string, "null"]

    ProjectReadinessSummary:
      type: object
      required:
        [
          id,
          workspace_id,
          slug,
          name,
          ingestion_jobs,
          sources,
          documents,
          ready_for_query,
          indexing_state,
        ]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        ingestion_jobs:
          type: integer
          minimum: 0
        sources:
          type: integer
          minimum: 0
        documents:
          type: integer
          minimum: 0
        ready_for_query:
          type: boolean
        indexing_state:
          type: string
          example: indexed
        latest_ingestion_status:
          type: [string, "null"]
        active_ingestion_jobs:
          type: integer
          minimum: 0
        completed_ingestion_jobs:
          type: integer
          minimum: 0
        failed_ingestion_jobs:
          type: integer
          minimum: 0

    ProviderAccountSummary:
      type: object
      required: [id, workspace_id, provider_kind, label, status]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        provider_kind:
          type: string
          example: openai
        label:
