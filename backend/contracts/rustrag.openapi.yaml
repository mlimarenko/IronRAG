openapi: 3.1.0
info:
  title: RustRAG API
  version: 0.1.0
  description: |
    Runtime API contract for the current RustRAG backend implementation.

    This contract is hand-maintained from the implemented Axum routes in `backend/src/interfaces/http`.
    It aims to reflect the currently available endpoints, request bodies, response shapes,
    auth requirements, and common error envelopes as accurately as practical.
servers:
  - url: http://localhost:8095
    description: Local default
security:
  - bearerAuth: []
tags:
  - name: system
  - name: auth
  - name: workspaces
  - name: projects
  - name: providers
  - name: ingestion
  - name: documents
  - name: content
  - name: retrieval
  - name: product
  - name: graph
  - name: integrations
  - name: usage
paths:
  /v1/health:
    get:
      tags: [system]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/ready:
    get:
      tags: [system]
      summary: Readiness check
      operationId: getReadiness
      security: []
      responses:
        "200":
          description: Readiness probe result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /v1/version:
    get:
      tags: [system]
      summary: Service version
      operationId: getVersion
      security: []
      responses:
        "200":
          description: Service version metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
  /v1/auth/tokens:
    get:
      tags: [auth]
      summary: List API tokens
      operationId: listTokens
      description: Requires `workspace:admin` scope or an `instance_admin` token. Instance admin callers may optionally filter by `workspace_id`; workspace-scoped tokens are implicitly limited to their own workspace even if the query parameter is omitted.
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Visible API token summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TokenSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [auth]
      summary: Mint an API token
      operationId: createToken
      description: Requires `workspace:admin` scope or an `instance_admin` token. Workspace-scoped tokens may mint tokens only for their own workspace. Global tokens without `workspace_id` require an `instance_admin` caller.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
      responses:
        "200":
          description: Newly minted API token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/auth/bootstrap-token:
    post:
      tags: [auth]
      summary: Mint an API token using the bootstrap secret
      operationId: createBootstrapToken
      security: []
      description: |
        Requires a `bootstrap_secret` field in the request body matching the backend
        `RJUSTRAG_BOOTSTRAP_TOKEN` or `RUSTRAG_BOOTSTRAP_TOKEN` environment variable.
        This route is intended for initial setup when no regular API token exists yet.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapTokenRequest"
      responses:
        "200":
          description: Newly minted API token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/auth/tokens/{id}:
    get:
      tags: [auth]
      summary: Get API token summary
      operationId: getToken
      description: Requires `workspace:admin` scope or an `instance_admin` token. Workspace-scoped tokens may only access tokens from their own workspace.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Token summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [auth]
      summary: Revoke API token
      operationId: revokeToken
      description: Requires `workspace:admin` scope or an `instance_admin` token. Workspace-scoped tokens may only revoke tokens from their own workspace.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: Token revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/workspaces:
    get:
      tags: [workspaces]
      summary: List workspaces
      operationId: listWorkspaces
      security: []
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceSummary"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [workspaces]
      summary: Create workspace
      operationId: createWorkspace
      description: Requires `workspace:admin` scope or an `instance_admin` token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "200":
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/workspaces/{id}/governance:
    get:
      tags: [workspaces, usage]
      summary: Get workspace governance summary
      operationId: getWorkspaceGovernance
      description: Requires `workspace:admin`, `usage:read`, `providers:admin`, or an `instance_admin` token. Workspace-scoped tokens may only access their own workspace.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Workspace governance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceGovernanceSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/projects:
    get:
      tags: [projects]
      summary: List projects
      operationId: listProjects
      security: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectSummary"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [projects]
      summary: Create project
      operationId: createProject
      description: Requires `projects:write`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only create projects in their own workspace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "200":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/projects/{id}/readiness:
    get:
      tags: [projects]
      summary: Get project readiness summary
      operationId: getProjectReadiness
      description: Requires `documents:read`, `query:run`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only access projects in their own workspace.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Project readiness summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectReadinessSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/provider-accounts:
    get:
      tags: [providers]
      summary: List provider accounts
      operationId: listProviderAccounts
      security: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Provider account list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderAccountSummary"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [providers]
      summary: Create provider account
      operationId: createProviderAccount
      description: Requires `providers:admin`, `workspace:admin`, or an `instance_admin` token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderAccountRequest"
      responses:
        "200":
          description: Created provider account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderAccountSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/model-profiles:
    get:
      tags: [providers]
      summary: List model profiles
      operationId: listModelProfiles
      security: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Model profile list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelProfileSummary"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [providers]
      summary: Create model profile
      operationId: createModelProfile
      description: Requires `providers:admin`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only create profiles in their own workspace, and the provider account must belong to that workspace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateModelProfileRequest"
      responses:
        "200":
          description: Created model profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelProfileSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/provider-governance/{workspace_id}:
    get:
      tags: [providers]
      summary: Get provider governance summary
      operationId: getProviderGovernance
      description: Requires `providers:admin`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only access their own workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Provider governance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderGovernanceSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/provider-defaults/{workspace_id}:
    get:
      tags: [providers]
      summary: Get onboarding provider defaults summary
      operationId: getProviderDefaultsSummary
      description: Requires `providers:admin`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only access their own workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace onboarding defaults summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingDefaultsSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/projects/{project_id}/defaults:
    get:
      tags: [providers, projects]
      summary: Get project provider defaults
      operationId: getProjectDefaults
      description: Requires one of `projects:write`, `documents:read`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only access projects in their own workspace.
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Project defaults
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDefaultsDto"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [providers, projects]
      summary: Update project provider defaults
      operationId: updateProjectDefaults
      description: Requires `projects:write`, `workspace:admin`, or an `instance_admin` token. Validates that any referenced provider account and model profiles belong to the project's workspace. The backend currently persists only chat and embedding default profile ids on the project row; provider account, rerank model, and retrieval/chunk settings are validated and echoed in the response but are not persisted.
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectDefaultsUpsertRequest"
      responses:
        "200":
          description: Updated project defaults
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDefaultsDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/integrations/{workspace_id}:
    get:
      tags: [integrations]
      summary: Get integrations workspace summary
      operationId: getIntegrationsWorkspaceSummary
      description: Requires `providers:admin`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only access their own workspace. Returns up to 5 example projects and all workspace API tokens.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace integrations summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationsWorkspaceSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/integrations/{workspace_id}/examples:
    get:
      tags: [integrations]
      summary: List example projects for integrations setup
      operationId: listWorkspaceExampleProjects
      description: Requires `providers:admin`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only access their own workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 25
      responses:
        "200":
          description: Example project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationExampleProjectSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/integrations/{workspace_id}/tokens/{id}:
    delete:
      tags: [integrations, auth]
      summary: Revoke a workspace API token from the integrations surface
      operationId: revokeWorkspaceToken
      description: Requires `workspace:admin` scope or an `instance_admin` token. The token must belong to the specified workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: Token revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/integrations-products/{workspace_id}:
    get:
      tags: [integrations]
      summary: Get integrations product snapshot
      operationId: getIntegrationsProduct
      description: Requires `providers:admin`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only access their own workspace. Response wraps the snapshot under a top-level `snapshot` field.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Integrations product snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationsProductResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/sources:
    get:
      tags: [ingestion]
      summary: List sources
      operationId: listSources
      security: []
      parameters:
        - $ref: "#/components/parameters/projectIdOptional"
      responses:
        "200":
          description: Source list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourceSummary"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [ingestion]
      summary: Create source
      operationId: createSource
      description: Requires `documents:write`, `workspace:admin`, or an `instance_admin` token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSourceRequest"
      responses:
        "200":
          description: Created source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ingestion-jobs:
    get:
      tags: [ingestion]
      summary: List ingestion jobs
      operationId: listIngestionJobs
      security: []
      parameters:
        - $ref: "#/components/parameters/projectIdOptional"
      responses:
        "200":
          description: Ingestion job list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IngestionJobSummary"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [ingestion]
      summary: Create ingestion job
      operationId: createIngestionJob
      description: Requires `documents:write`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only create jobs for projects in their own workspace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIngestionJobRequest"
      responses:
        "200":
          description: Created ingestion job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJobSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ingestion-jobs/{id}:
    get:
      tags: [ingestion]
      summary: Get ingestion job detail
      operationId: getIngestionJobDetail
      description: Requires `documents:read`, `documents:write`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only access jobs in their own workspace.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Ingestion job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJobDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ingestion-jobs/{id}/retry:
    post:
      tags: [ingestion]
      summary: Retry an ingestion job
      operationId: retryIngestionJob
      description: Requires `documents:write`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only retry jobs in their own workspace.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Newly created retry ingestion job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJobDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/documents:
    get:
      tags: [documents]
      summary: List documents
      operationId: listDocuments
      security: []
      parameters:
        - $ref: "#/components/parameters/projectIdOptional"
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentSummary"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [documents]
      summary: Create document metadata record
      operationId: createDocument
      description: Requires `documents:write`, `workspace:admin`, or an `instance_admin` token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentRequest"
      responses:
        "200":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/content/ingest-text:
    post:
      tags: [content]
      summary: Queue plain text for ingestion
      operationId: ingestText
      description: |
        Requires `documents:write`, `workspace:admin`, or an `instance_admin` token.

        The current backend enqueues an ingestion job and returns its queued lifecycle state; it does not synchronously create a document/chunk result in this response.
        Workspace-scoped tokens may only queue jobs for projects in their own workspace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestTextRequest"
      responses:
        "200":
          description: Ingestion job accepted and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestTextResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/content/search-chunks:
    post:
      tags: [content]
      summary: Lexically search chunks within a project
      operationId: searchChunks
      description: Requires one of `documents:read`, `query:run`, `workspace:admin`, or an `instance_admin` token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchChunksRequest"
      responses:
        "200":
          description: Matching chunk list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChunkResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/content/embed-project:
    post:
      tags: [content]
      summary: Generate embeddings for project chunks
      operationId: embedProjectChunks
      description: |
        Requires `documents:write`, `workspace:admin`, or an `instance_admin` token.

        If `embedding_model_profile_id` is provided, the backend resolves provider/model from that profile;
        otherwise it uses `provider_kind` and `model_name` directly.
      requestBody:
        required: true
        content:
          application/json:
            schema:
