            format: uuid
      responses:
        "200":
          description: Visible query sessions ordered by most recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QueryConversation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [query]
      summary: Create one canonical query session
      operationId: createQuerySession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQueryConversationRequest"
      responses:
        "200":
          description: Query session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryConversation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/query/sessions/{sessionId}:
    get:
      tags: [query]
      summary: Get canonical query session detail
      operationId: getQuerySession
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Query session detail with turns and executions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryConversationDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/query/sessions/{sessionId}/turns:
    post:
      tags: [query]
      summary: Submit a user turn and execute one grounded answer in a query session
      operationId: createQuerySessionTurn
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQueryTurnRequest"
      responses:
        "200":
          description: User turn accepted and grounded answer completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryTurnExecutionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /v1/query/executions/{executionId}:
    get:
      tags: [query]
      summary: Get canonical grounded execution detail
      operationId: getQueryExecution
      parameters:
        - in: path
          name: executionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Execution detail with typed references
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryExecutionDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/billing/provider-calls:
    get:
      tags: [billing]
      summary: List canonical provider calls for one library
      operationId: listBillingProviderCalls
      parameters:
        - in: query
          name: libraryId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Provider calls attributed to canonical executions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BillingProviderCall"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/billing/charges:
    get:
      tags: [billing]
      summary: List canonical priced charges for one library
      operationId: listBillingCharges
      parameters:
        - in: query
          name: libraryId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Charges derived from canonical provider calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BillingCharge"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/billing/executions/{executionKind}/{executionId}:
    get:
      tags: [billing]
      summary: Get canonical execution cost rollup
      operationId: getBillingExecutionCost
      parameters:
        - in: path
          name: executionKind
          required: true
          schema:
            type: string
        - in: path
          name: executionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Cost rollup for one execution owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingExecutionCost"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/ops/operations/{operationId}:
    get:
      tags: [ops]
      summary: Get one canonical async operation
      operationId: getAsyncOperation
      parameters:
        - in: path
          name: operationId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Canonical async operation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsAsyncOperation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/ops/libraries/{libraryId}:
    get:
      tags: [ops]
      summary: Get derived operational state for one library
      operationId: getLibraryState
      parameters:
        - in: path
          name: libraryId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Derived operational state and knowledge generation snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsLibraryStateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/audit/events:
    get:
      tags: [audit]
      summary: List canonical audit events
      operationId: listAuditEvents
      parameters:
        - in: query
          name: actorPrincipalId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: workspaceId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: libraryId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: internal
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Canonical audit events with visible subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEventResponse"
        "401":
          description: Missing or insufficient authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "403":
          description: Internal view requires system administrator access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
  /v1/chunks:
    get:
      tags: [content]
      summary: List chunks by document
      operationId: listChunks
      description: Requires `documents:read`, `workspace:admin`, or an `instance_admin` token.
      parameters:
        - $ref: "#/components/parameters/documentId"
      responses:
        "200":
          description: Chunk list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChunkSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    bearerAuth:
      type: http
