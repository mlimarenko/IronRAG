openapi: 3.1.0
info:
  title: RustRAG API
  version: 0.1.0
  description: |
    Runtime API contract for the current RustRAG backend implementation.

    This contract is hand-maintained from the implemented Axum routes in `backend/src/interfaces/http`.
    It aims to reflect the currently available endpoints, request bodies, response shapes,
    auth requirements, and common error envelopes as accurately as practical.
servers:
  - url: http://localhost:8095
    description: Local default
security:
  - bearerAuth: []
tags:
  - name: system
  - name: auth
  - name: workspaces
  - name: projects
  - name: providers
  - name: ingestion
  - name: documents
  - name: content
  - name: retrieval
  - name: usage
paths:
  /v1/health:
    get:
      tags: [system]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/ready:
    get:
      tags: [system]
      summary: Readiness check
      operationId: getReadiness
      security: []
      responses:
        '200':
          description: Readiness probe result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
  /v1/version:
    get:
      tags: [system]
      summary: Service version
      operationId: getVersion
      security: []
      responses:
        '200':
          description: Service version metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /v1/auth/tokens:
    post:
      tags: [auth]
      summary: Mint an API token
      operationId: createToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTokenRequest'
      responses:
        '200':
          description: Newly minted API token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/workspaces:
    get:
      tags: [workspaces]
      summary: List workspaces
      operationId: listWorkspaces
      security: []
      responses:
        '200':
          description: Workspace list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkspaceSummary'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [workspaces]
      summary: Create workspace
      operationId: createWorkspace
      description: Requires `workspace:admin` scope or an `instance_admin` token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'
      responses:
        '200':
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/workspaces/{id}/governance:
    get:
      tags: [workspaces, usage]
      summary: Get workspace governance summary
      operationId: getWorkspaceGovernance
      description: Requires `workspace:admin`, `usage:read`, `providers:admin`, or an `instance_admin` token. Workspace-scoped tokens may only access their own workspace.
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Workspace governance summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceGovernanceSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/projects:
    get:
      tags: [projects]
      summary: List projects
      operationId: listProjects
      security: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectSummary'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [projects]
      summary: Create project
      operationId: createProject
      description: Requires `projects:write`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only create projects in their own workspace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '200':
          description: Created project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/projects/{id}/readiness:
    get:
      tags: [projects]
      summary: Get project readiness summary
      operationId: getProjectReadiness
      description: Requires `documents:read`, `query:run`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only access projects in their own workspace.
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Project readiness summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectReadinessSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/provider-accounts:
    get:
      tags: [providers]
      summary: List provider accounts
      operationId: listProviderAccounts
      security: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      responses:
        '200':
          description: Provider account list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProviderAccountSummary'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [providers]
      summary: Create provider account
      operationId: createProviderAccount
      description: Requires `providers:admin`, `workspace:admin`, or an `instance_admin` token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProviderAccountRequest'
      responses:
        '200':
          description: Created provider account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderAccountSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/model-profiles:
    get:
      tags: [providers]
      summary: List model profiles
      operationId: listModelProfiles
      security: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      responses:
        '200':
          description: Model profile list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModelProfileSummary'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [providers]
      summary: Create model profile
      operationId: createModelProfile
      description: Requires `providers:admin`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only create profiles in their own workspace, and the provider account must belong to that workspace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModelProfileRequest'
      responses:
        '200':
          description: Created model profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelProfileSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/provider-governance/{workspace_id}:
    get:
      tags: [providers]
      summary: Get provider governance summary
      operationId: getProviderGovernance
      description: Requires `providers:admin`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only access their own workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Provider governance summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderGovernanceSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/sources:
    get:
      tags: [ingestion]
      summary: List sources
      operationId: listSources
      security: []
      parameters:
        - $ref: '#/components/parameters/projectIdOptional'
      responses:
        '200':
          description: Source list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SourceSummary'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [ingestion]
      summary: Create source
      operationId: createSource
      description: Requires `documents:write`, `workspace:admin`, or an `instance_admin` token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSourceRequest'
      responses:
        '200':
          description: Created source
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/ingestion-jobs:
    get:
      tags: [ingestion]
      summary: List ingestion jobs
      operationId: listIngestionJobs
      security: []
      parameters:
        - $ref: '#/components/parameters/projectIdOptional'
      responses:
        '200':
          description: Ingestion job list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IngestionJobSummary'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [ingestion]
      summary: Create ingestion job
      operationId: createIngestionJob
      description: Requires `documents:write`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only create jobs for projects in their own workspace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIngestionJobRequest'
      responses:
        '200':
          description: Created ingestion job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionJobSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/ingestion-jobs/{id}:
    get:
      tags: [ingestion]
      summary: Get ingestion job detail
      operationId: getIngestionJobDetail
      description: Requires `documents:read`, `documents:write`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only access jobs in their own workspace.
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Ingestion job detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionJobDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/ingestion-jobs/{id}/retry:
    post:
      tags: [ingestion]
      summary: Retry an ingestion job
      operationId: retryIngestionJob
      description: Requires `documents:write`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only retry jobs in their own workspace.
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Newly created retry ingestion job detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionJobDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/documents:
    get:
      tags: [documents]
      summary: List documents
      operationId: listDocuments
      security: []
      parameters:
        - $ref: '#/components/parameters/projectIdOptional'
      responses:
        '200':
          description: Document list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentSummary'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [documents]
      summary: Create document metadata record
      operationId: createDocument
      description: Requires `documents:write`, `workspace:admin`, or an `instance_admin` token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '200':
          description: Created document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/content/ingest-text:
    post:
      tags: [content]
      summary: Ingest plain text and create chunks
      operationId: ingestText
      description: Requires `documents:write`, `workspace:admin`, or an `instance_admin` token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestTextRequest'
      responses:
        '200':
          description: Text ingested and chunked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestTextResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/content/search-chunks:
    post:
      tags: [content]
      summary: Lexically search chunks within a project
      operationId: searchChunks
      description: Requires one of `documents:read`, `query:run`, `workspace:admin`, or an `instance_admin` token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchChunksRequest'
      responses:
        '200':
          description: Matching chunk list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChunkResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/content/embed-project:
    post:
      tags: [content]
      summary: Generate embeddings for project chunks
      operationId: embedProjectChunks
      description: |
        Requires `documents:write`, `workspace:admin`, or an `instance_admin` token.

        If `embedding_model_profile_id` is provided, the backend resolves provider/model from that profile;
        otherwise it uses `provider_kind` and `model_name` directly.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmbedProjectChunksRequest'
      responses:
        '200':
          description: Embedding job result summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbedProjectChunksResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/chunks:
    get:
      tags: [documents]
      summary: List chunks by document or project
      operationId: listChunks
      description: Requires `documents:read`, `workspace:admin`, or an `instance_admin` token.
      parameters:
        - $ref: '#/components/parameters/projectIdOptional'
        - $ref: '#/components/parameters/documentId'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Chunk list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChunkSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/uploads/ingest:
    post:
      tags: [content]
      summary: Upload a UTF-8 text-like file and ingest it
      operationId: uploadAndIngest
      description: |
        Requires `documents:write`, `workspace:admin`, or an `instance_admin` token.

        Current implementation only supports UTF-8 text-like uploads. Expected multipart fields:
        - `project_id` (required)
        - `source_id` (optional)
        - `title` (optional)
        - `file` (required)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [project_id, file]
              properties:
                project_id:
                  type: string
                  format: uuid
                source_id:
                  type: string
                  format: uuid
                title:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Uploaded file ingested successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadIngestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/retrieval-runs:
    get:
      tags: [retrieval]
      summary: List retrieval runs
      operationId: listRetrievalRuns
      security: []
      parameters:
        - $ref: '#/components/parameters/projectIdOptional'
      responses:
        '200':
          description: Retrieval run list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RetrievalRunSummary'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [retrieval]
      summary: Create a retrieval run record manually
      operationId: createRetrievalRun
      description: Requires `query:run`, `workspace:admin`, or an `instance_admin` token. Workspace-scoped tokens may only create runs for projects in their own workspace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRetrievalRunRequest'
      responses:
        '200':
          description: Created retrieval run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrievalRunSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/retrieval-runs/{id}:
    get:
      tags: [retrieval]
      summary: Get retrieval run detail
      operationId: getRetrievalRunDetail
      description: Requires `query:run`, `workspace:admin`, `documents:read`, or an `instance_admin` token. Workspace-scoped tokens may only access runs in their own workspace.
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Retrieval run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrievalRunDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/query:
    post:
      tags: [retrieval]
      summary: Run live retrieval + generation query
      operationId: runQuery
      description: |
        Requires `query:run`, `workspace:admin`, or an `instance_admin` token.

        The backend combines lexical matching with optional semantic matching based on stored chunk embeddings,
        then calls the configured LLM gateway to produce the final answer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Query result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/usage-events:
    get:
      tags: [usage]
      summary: List usage events
      operationId: listUsageEvents
      description: Requires `usage:read`, `workspace:admin`, or an `instance_admin` token.
      parameters:
        - $ref: '#/components/parameters/projectIdOptional'
      responses:
        '200':
          description: Usage event list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsageEventSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/cost-ledger:
    get:
      tags: [usage]
      summary: List cost ledger entries
      operationId: listCostLedger
      description: Requires `usage:read`, `workspace:admin`, or an `instance_admin` token.
      parameters:
        - $ref: '#/components/parameters/projectIdOptional'
      responses:
        '200':
          description: Cost ledger entry list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CostLedgerSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Bearer token minted by `POST /v1/auth/tokens`.
        Note: some read/list endpoints are currently public and do not require auth.
  parameters:
    workspaceId:
      in: query
      name: workspace_id
      required: false
      schema:
        type: string
        format: uuid
    projectIdOptional:
      in: query
      name: project_id
      required: false
      schema:
        type: string
        format: uuid
    documentId:
      in: query
      name: document_id
      required: false
      schema:
        type: string
        format: uuid
    limit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        format: int64
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorBody'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorBody'
          examples:
            apiErrorEnvelope:
              value:
                error: unauthorized
        text/plain:
          schema:
            type: string
          examples:
            authExtractorError:
              value: missing authorization header
      headers:
        WWW-Authenticate:
          required: false
          schema:
            type: string
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorBody'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorBody'
        text/plain:
          schema:
            type: string
  schemas:
    ApiErrorBody:
      type: object
      required: [error]
      properties:
        error:
          type: string

    HealthResponse:
      type: object
      required: [status, service, environment]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: rustrag-backend
        environment:
          type: string
          example: local

    ReadinessResponse:
      type: object
      required: [status, postgres, redis]
      properties:
        status:
          type: string
          enum: [ready, degraded]
        postgres:
          type: string
          enum: [ok, down]
        redis:
          type: string
          enum: [ok, down]

    VersionResponse:
      type: object
      required: [service, version, environment]
      properties:
        service:
          type: string
        version:
          type: string
          example: 0.1.0
        environment:
