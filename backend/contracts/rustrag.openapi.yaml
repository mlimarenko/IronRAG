          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [runtime-pricing]
      summary: Create a new effective-dated pricing catalog entry
      operationId: createRuntimeModelPricing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimePricingCatalogUpsertRequest"
      responses:
        "201":
          description: Created pricing catalog entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePricingCatalogEntryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/runtime/admin/model-pricing/{pricingId}:
    put:
      tags: [runtime-pricing]
      summary: Update an existing pricing catalog entry without changing identity fields
      operationId: updateRuntimeModelPricing
      parameters:
        - $ref: "#/components/parameters/pricingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimePricingCatalogUpsertRequest"
      responses:
        "200":
          description: Updated pricing catalog entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePricingCatalogEntryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [runtime-pricing]
      summary: Deactivate a pricing catalog entry
      operationId: deleteRuntimeModelPricing
      parameters:
        - $ref: "#/components/parameters/pricingId"
      responses:
        "200":
          description: Deactivated pricing catalog entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePricingCatalogEntryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Bearer token minted by `POST /v1/auth/tokens`.
        Note: some read/list endpoints are currently public and do not require auth.
    uiSessionCookie:
      type: apiKey
      in: cookie
      name: rustrag_ui_session
      description: Browser session cookie used by the `/v1/ui/*` authenticated shell.
  parameters:
    id:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    workspaceId:
      in: query
      name: workspace_id
      required: false
      schema:
        type: string
        format: uuid
    projectIdOptional:
      in: query
      name: project_id
      required: false
      schema:
        type: string
        format: uuid
    documentId:
      in: query
      name: document_id
      required: false
      schema:
        type: string
        format: uuid
    limit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        format: int64
    libraryId:
      in: path
      name: libraryId
      required: true
      schema:
        type: string
        format: uuid
    runtimeDocumentId:
      in: path
      name: documentId
      required: true
      schema:
        type: string
        format: uuid
    pricingId:
      in: path
      name: pricingId
      required: true
      schema:
        type: string
        format: uuid
    runtimeNodeId:
      in: path
      name: nodeId
      required: true
      schema:
        type: string
        format: uuid
    runtimeQueryId:
      in: path
      name: queryId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
          examples:
            apiErrorEnvelope:
              value:
                error: unauthorized
        text/plain:
          schema:
            type: string
          examples:
            authExtractorError:
              value: missing authorization header
      headers:
        WWW-Authenticate:
          required: false
          schema:
            type: string
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
        text/plain:
          schema:
            type: string
  schemas:
    ApiErrorBody:
      type: object
      required: [error]
      properties:
        error:
          type: string
        errorKind:
          type: [string, "null"]
        requestId:
          type: [string, "null"]

    ApiWarningBody:
      type: object
      required: [warning, warningKind]
      properties:
        warning:
          type: string
        warningKind:
          type: string
          enum:
            [blocked_activity, stalled_activity, partial_accounting, partial_convergence]

    HealthResponse:
      type: object
      required: [status, service, environment]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: rustrag-backend
        environment:
          type: string
          example: local

    ReadinessResponse:
      type: object
      required: [status, postgres, redis]
      properties:
        status:
          type: string
          enum: [ready, degraded]
        postgres:
          type: string
          enum: [ok, down]
        redis:
          type: string
          enum: [ok, down]

    HealthState:
      type: string
      enum: [healthy, degraded, failed, unknown]

    VersionResponse:
      type: object
      required: [service, version, environment]
      properties:
        service:
          type: string
        version:
          type: string
          example: 0.1.0
        environment:
          type: string

    CreateTokenRequest:
      type: object
      required: [token_kind, label, scopes]
      properties:
        workspace_id:
          type: [string, "null"]
          format: uuid
        token_kind:
          type: string
          example: workspace_api
        label:
          type: string
          example: frontend-local
        scopes:
          type: array
          items:
            type: string
          example: [documents:read, query:run]

    TokenCreateResponse:
      type: object
      required: [id, token_kind, label, token, scopes]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: [string, "null"]
          format: uuid
        token_kind:
          type: string
        label:
          type: string
        token:
          type: string
          description: Plaintext token shown only at creation time.
        scopes:
          type: array
          items:
            type: string

    WorkspaceSummary:
      type: object
      required: [id, slug, name, status]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        status:
          type: string
          example: active

    WorkspaceGovernanceSummary:
      type: object
      required:
        [
          id,
          slug,
          name,
          status,
          projects,
          provider_accounts,
          model_profiles,
          api_tokens,
          health_state,
          usage,
        ]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        status:
          type: string
        projects:
          type: integer
          minimum: 0
        provider_accounts:
          type: integer
          minimum: 0
        model_profiles:
          type: integer
          minimum: 0
        api_tokens:
          type: integer
          minimum: 0
        health_state:
          $ref: "#/components/schemas/HealthState"
        usage:
          $ref: "#/components/schemas/UsageGovernanceSummary"

    CreateWorkspaceRequest:
      type: object
      required: [slug, name]
      properties:
        slug:
          type: string
        name:
          type: string

    ProjectSummary:
      type: object
      required: [id, workspace_id, slug, name]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: [string, "null"]

    CreateProjectRequest:
      type: object
      required: [workspace_id, slug, name]
      properties:
        workspace_id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: [string, "null"]

    ProjectReadinessSummary:
      type: object
      required:
        [
          id,
          workspace_id,
          slug,
          name,
          ingestion_jobs,
          sources,
          documents,
          ready_for_query,
          indexing_state,
        ]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        ingestion_jobs:
          type: integer
          minimum: 0
        sources:
          type: integer
          minimum: 0
        documents:
          type: integer
          minimum: 0
        ready_for_query:
          type: boolean
        indexing_state:
          type: string
          example: indexed
        latest_ingestion_status:
          type: [string, "null"]
        active_ingestion_jobs:
          type: integer
          minimum: 0
        completed_ingestion_jobs:
          type: integer
          minimum: 0
        failed_ingestion_jobs:
          type: integer
          minimum: 0

    ProviderAccountSummary:
      type: object
      required: [id, workspace_id, provider_kind, label, status]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        provider_kind:
          type: string
          example: openai
        label:
          type: string
        status:
          type: string
          example: active

    CreateProviderAccountRequest:
      type: object
      required: [workspace_id, provider_kind, label]
      properties:
        workspace_id:
          type: string
          format: uuid
        provider_kind:
          type: string
        label:
          type: string
        api_base_url:
          type: [string, "null"]
          format: uri

    ModelProfileSummary:
      type: object
      required:
        [id, workspace_id, provider_account_id, profile_kind, model_name]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        provider_account_id:
          type: string
          format: uuid
        profile_kind:
          type: string
          example: chat
        model_name:
          type: string
          example: gpt-5.4

    CreateModelProfileRequest:
      type: object
      required: [workspace_id, provider_account_id, profile_kind, model_name]
      properties:
        workspace_id:
          type: string
          format: uuid
        provider_account_id:
          type: string
          format: uuid
        profile_kind:
          type: string
        model_name:
          type: string
        temperature:
          type: [number, "null"]
        max_output_tokens:
          type: [integer, "null"]
          format: int32

    ProviderGovernanceSummary:
      type: object
      required: [workspace_id, provider_accounts, model_profiles]
      properties:
        workspace_id:
          type: string
          format: uuid
        provider_accounts:
          type: array
          items:
            $ref: "#/components/schemas/ProviderAccountSummary"
        model_profiles:
          type: array
          items:
            $ref: "#/components/schemas/ModelProfileSummary"
        warning:
          type: [string, "null"]

    SourceSummary:
      type: object
      required: [id, project_id, source_kind, label, status]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        source_kind:
          type: string
          example: upload
        label:
          type: string
        status:
          type: string
          example: active

    CreateSourceRequest:
      type: object
      required: [project_id, source_kind, label]
      properties:
        project_id:
          type: string
          format: uuid
        source_kind:
          type: string
        label:
          type: string

    IngestionJobSummary:
      type: object
      required: [id, project_id, trigger_kind, status, stage]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        source_id:
          type: [string, "null"]
          format: uuid
        trigger_kind:
          type: string
        status:
          type: string
          example: queued
        stage:
          type: string
          example: created

    CreateIngestionJobRequest:
      type: object
      required: [project_id, trigger_kind]
      properties:
        project_id:
          type: string
          format: uuid
        source_id:
          type: [string, "null"]
          format: uuid
        trigger_kind:
          type: string
        requested_by:
          type: [string, "null"]

    IngestionLifecycleState:
      type: string
      enum:
        [
          queued,
          validating,
          running,
          partial,
          completed,
          retryable_failed,
          canceled,
          failed,
        ]

    IngestionJobDetail:
      type: object
      required:
        [id, project_id, trigger_kind, status, stage, retryable, lifecycle]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        source_id:
          type: [string, "null"]
          format: uuid
        trigger_kind:
          type: string
        status:
          type: string
        stage:
          type: string
        requested_by:
          type: [string, "null"]
        error_message:
          type: [string, "null"]
        started_at:
          type: [string, "null"]
          format: date-time
        finished_at:
          type: [string, "null"]
          format: date-time
        retryable:
          type: boolean
        lifecycle:
          $ref: "#/components/schemas/IngestionLifecycleState"

    DocumentSummary:
      type: object
      required: [id, project_id, external_key]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        source_id:
          type: [string, "null"]
          format: uuid
        external_key:
          type: string
        title:
          type: [string, "null"]
        mime_type:
          type: [string, "null"]
        checksum:
          type: [string, "null"]

    CreateDocumentRequest:
      type: object
      required: [project_id, external_key]
      properties:
        project_id:
          type: string
          format: uuid
        source_id:
          type: [string, "null"]
          format: uuid
        external_key:
          type: string
        title:
          type: [string, "null"]
        mime_type:
          type: [string, "null"]
        checksum:
          type: [string, "null"]

    IngestTextRequest:
      type: object
      required: [project_id, external_key, text]
      properties:
        project_id:
          type: string
          format: uuid
        source_id:
          type: [string, "null"]
          format: uuid
        external_key:
          type: string
        title:
          type: [string, "null"]
        text:
          type: string

    IngestTextResponse:
      type: object
      required: [ingestion_job_id, status, stage]
      properties:
        ingestion_job_id:
          type: string
          format: uuid
        status:
          type: string
          description: Current ingestion job status, initially `queued`.
        stage:
          type: string
          description: Current ingestion job stage, initially `queued`.

    SearchChunksRequest:
      type: object
      required: [project_id, query_text]
      properties:
        project_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
          nullable: true
        query_text:
          type: string
        top_k:
          type: [integer, "null"]
          format: int32

    ChunkResult:
      type: object
      required: [id, document_id, ordinal, content]
      properties:
        id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        ordinal:
          type: integer
          format: int32
        content:
          type: string

    EmbedProjectChunksRequest:
      type: object
      required: [project_id, provider_kind, model_name]
      properties:
        project_id:
          type: string
          format: uuid
        provider_kind:
          type: string
        model_name:
          type: string
        embedding_model_profile_id:
          type: [string, "null"]
          format: uuid
        limit:
          type: [integer, "null"]
          format: int64

    EmbedProjectChunksResponse:
      type: object
      required: [project_id, embedded_chunks, provider_kind, model_name]
      properties:
        project_id:
          type: string
          format: uuid
        embedded_chunks:
          type: integer
          minimum: 0
        provider_kind:
          type: string
        model_name:
          type: string

    ChunkSummary:
      type: object
      required: [id, document_id, project_id, ordinal, content]
      properties:
        id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        ordinal:
          type: integer
          format: int32
        content:
          type: string
        token_count:
          type: [integer, "null"]
          format: int32

    UploadIngestResponse:
      type: object
      required:
        [
          ingestion_job_id,
          external_key,
          status,
          stage,
          file_kind,
          adapter_status,
          ingest_mode,
        ]
      properties:
        ingestion_job_id:
          type: string
          format: uuid
        external_key:
          type: string
        status:
          type: string
          description: Current ingestion job status, initially `queued`.
        stage:
          type: string
          description: Current ingestion job stage, initially `queued`.
        mime_type:
          type: [string, "null"]
        file_kind:
          type: string
          enum: [text_like, pdf, image, binary]
          description: Backend-classified file kind. Current successful uploads return `text_like`.
        adapter_status:
          type: string
          enum: [supported_now, planned]
          description: Adapter availability for the classified file kind. Current successful uploads return `supported_now`.
        ingest_mode:
          type: string
          description: Backend pipeline mode used for the accepted upload, currently `multipart_text_upload_v1`.

    RetrievalRunSummary:
      type: object
      required:
        [id, project_id, query_text, top_k, answer_status, weak_grounding]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        query_text:
          type: string
        model_profile_id:
          type: [string, "null"]
          format: uuid
        top_k:
          type: integer
          format: int32
        response_text:
          type: [string, "null"]
        answer_status:
          type: string
          example: grounded
        weak_grounding:
          type: boolean

    RetrievalRunDetail:
      type: object
      required:
        [
          id,
          project_id,
          query_text,
          top_k,
          answer_status,
          weak_grounding,
          references,
          matched_chunk_ids,
          debug_json,
        ]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        query_text:
          type: string
        model_profile_id:
          type: [string, "null"]
          format: uuid
        top_k:
          type: integer
          format: int32
        response_text:
          type: [string, "null"]
        answer_status:
          type: string
        weak_grounding:
          type: boolean
        references:
          type: array
          items:
            type: string
        matched_chunk_ids:
          type: array
          items:
            type: string
            format: uuid
        warning:
          type: [string, "null"]
        debug_json:
          type: object
          additionalProperties: true

    ChatSessionSummary:
      type: object
      required: [id, workspace_id, project_id, title, created_at, updated_at, message_count]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        title:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        message_count:
          type: integer
          format: int64
        last_message_preview:
          type: string
          nullable: true
    ChatMessageItem:
      type: object
      required: [id, session_id, project_id, role, content, created_at]
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        role:
          type: string
        content:
          type: string
        retrieval_run_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
    CreateRetrievalRunRequest:
      type: object
      required: [project_id, query_text]
      properties:
        project_id:
          type: string
          format: uuid
        query_text:
          type: string
        model_profile_id:
          type: [string, "null"]
          format: uuid
        top_k:
          type: [integer, "null"]
          format: int32
        response_text:
          type: [string, "null"]

    QueryRequest:
      type: object
      required: [project_id, query_text]
      properties:
        project_id:
          type: string
          format: uuid
        query_text:
          type: string
        model_profile_id:
          type: [string, "null"]
          format: uuid
        embedding_model_profile_id:
          type: [string, "null"]
          format: uuid
        top_k:
          type: [integer, "null"]
          format: int32

    QueryResponse:
      type: object
      required:
        [
          retrieval_run_id,
          project_id,
          answer,
          references,
          mode,
          answer_status,
          weak_grounding,
        ]
      properties:
        retrieval_run_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        answer:
          type: string
        references:
          type: array
          items:
            type: string
          example:
            - document:01958f52-1b41-7e1a-81f0-68bb2ac6df54:chunk:0
        mode:
          type: string
        warning:
          type: [string, "null"]
        warning_kind:
          type: [string, "null"]
          enum: [partial_convergence, "null"]
          example: gateway_live
        answer_status:
          type: string
          example: grounded
        weak_grounding:
          type: boolean
        warning:
          type: [string, "null"]

    UsageGovernanceSummary:
      type: object
      required:
        [
          usage_events,
          prompt_tokens,
          completion_tokens,
          total_tokens,
          estimated_cost,
        ]
      properties:
        usage_events:
          type: integer
          format: int64
          minimum: 0
        prompt_tokens:
          type: integer
          format: int64
          minimum: 0
        completion_tokens:
          type: integer
          format: int64
          minimum: 0
        total_tokens:
          type: integer
          format: int64
          minimum: 0
        estimated_cost:
          type: number
          format: double

    UsageEventSummary:
      type: object
      required: [id, usage_kind, raw_usage_json]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: [string, "null"]
          format: uuid
        model_profile_id:
