openapi: 3.1.0
info:
  title: RustRAG API
  version: 0.1.0
  description: |
    Runtime API contract for the current RustRAG backend implementation.

    This contract is hand-maintained from the implemented Axum routes in `backend/src/interfaces/http`.
    It aims to reflect the currently available endpoints, request bodies, response shapes,
    auth requirements, and common error envelopes as accurately as practical.
servers:
  - url: http://localhost:8095
    description: Local default
security:
  - bearerAuth: []
tags:
  - name: system
  - name: auth
  - name: ui-auth
  - name: ui-shell
  - name: ui-documents
  - name: ui-graph
  - name: ui-admin
  - name: runtime-documents
  - name: runtime-pricing
  - name: runtime-graph
  - name: runtime-query
  - name: runtime-providers
  - name: workspaces
  - name: projects
  - name: providers
  - name: ingestion
  - name: documents
  - name: content
  - name: retrieval
  - name: product
  - name: graph
  - name: integrations
  - name: usage
paths:
  /v1/health:
    get:
      tags: [system]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/ready:
    get:
      tags: [system]
      summary: Readiness check
      operationId: getReadiness
      security: []
      responses:
        "200":
          description: Readiness probe result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /v1/version:
    get:
      tags: [system]
      summary: Service version
      operationId: getVersion
      security: []
      responses:
        "200":
          description: Service version metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
  /v1/auth/tokens:
    get:
      tags: [auth]
      summary: List API tokens
      operationId: listTokens
      description: Requires `workspace:admin` scope or an `instance_admin` token. Instance admin callers may optionally filter by `workspace_id`; workspace-scoped tokens are implicitly limited to their own workspace even if the query parameter is omitted.
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Visible API token summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TokenSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [auth]
      summary: Mint an API token
      operationId: createToken
      description: Requires `workspace:admin` scope or an `instance_admin` token. Workspace-scoped tokens may mint tokens only for their own workspace. Global tokens without `workspace_id` require an `instance_admin` caller.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
      responses:
        "200":
          description: Newly minted API token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/auth/bootstrap-token:
    post:
      tags: [auth]
      summary: Mint an API token using the bootstrap secret
      operationId: createBootstrapToken
      security: []
      description: |
        Requires a `bootstrap_secret` field in the request body matching the backend
        `RJUSTRAG_BOOTSTRAP_TOKEN` or `RUSTRAG_BOOTSTRAP_TOKEN` environment variable.
        This route is intended for initial setup when no regular API token exists yet.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapTokenRequest"
      responses:
        "200":
          description: Newly minted API token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/auth/tokens/{id}:
    get:
      tags: [auth]
      summary: Get API token summary
      operationId: getToken
      description: Requires `workspace:admin` scope or an `instance_admin` token. Workspace-scoped tokens may only access tokens from their own workspace.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Token summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [auth]
      summary: Revoke API token
      operationId: revokeToken
      description: Requires `workspace:admin` scope or an `instance_admin` token. Workspace-scoped tokens may only revoke tokens from their own workspace.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: Token revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/auth/login:
    post:
      tags: [ui-auth]
      summary: Sign in with login and password for a browser UI session
      operationId: uiLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UiLoginRequest"
      responses:
        "200":
          description: Current UI session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/auth/session:
    get:
      tags: [ui-auth]
      summary: Get the current authenticated UI session
      operationId: getUiSession
      security:
        - uiSessionCookie: []
      responses:
        "200":
          description: Current UI session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiSessionResponse"
        "204":
          description: No active UI session
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/auth/logout:
    post:
      tags: [ui-auth]
      summary: End the current browser UI session
      operationId: uiLogout
      security:
        - uiSessionCookie: []
      responses:
        "200":
          description: Logout acknowledgement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiOkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/context:
    get:
      tags: [ui-shell]
      summary: Get the current authenticated shell context
      operationId: getUiContext
      security:
        - uiSessionCookie: []
      responses:
        "200":
          description: Active workspace, library, locale, and user chip data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiShellContextResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [ui-shell]
      summary: Update the active workspace, library, or locale for the UI session
      operationId: updateUiContext
      security:
        - uiSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UiUpdateContextRequest"
      responses:
        "200":
          description: Updated shell context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiShellContextResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/workspaces:
    get:
      tags: [ui-shell]
      summary: List workspaces visible to the current UI session
      operationId: listUiWorkspaces
      security:
        - uiSessionCookie: []
      responses:
        "200":
          description: Visible workspace options
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UiWorkspaceOption"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [ui-shell]
      summary: Create a workspace from the authenticated shell
      operationId: createUiWorkspace
      security:
        - uiSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UiCreateWorkspaceRequest"
      responses:
        "200":
          description: Created workspace option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiWorkspaceOption"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/libraries:
    get:
      tags: [ui-shell]
      summary: List libraries visible in the selected workspace
      operationId: listUiLibraries
      security:
        - uiSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Visible library options
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UiLibraryOption"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [ui-shell]
      summary: Create a library inside the selected workspace
      operationId: createUiLibrary
      security:
        - uiSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UiCreateLibraryRequest"
      responses:
        "200":
          description: Created library option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiLibraryOption"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/documents/surface:
    get:
      tags: [ui-documents]
      summary: Get the complete Documents screen model for the active library
      operationId: getUiDocumentsSurface
      security:
        - uiSessionCookie: []
      responses:
        "200":
          description: Documents workspace payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiDocumentsSurfaceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/documents/upload:
    post:
      tags: [ui-documents]
      summary: Upload one or more files into the active library
      operationId: uploadUiDocuments
      security:
        - uiSessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "200":
          description: Accepted queue items for the uploaded files
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiUploadDocumentsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/documents/{id}:
    get:
      tags: [ui-documents]
      summary: Get a document row detail payload
      operationId: getUiDocumentDetail
      security:
        - uiSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Detailed document drawer payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiDocumentDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [ui-documents]
      summary: Remove a document item from the active library
      operationId: deleteUiDocument
      security:
        - uiSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Delete acknowledgement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiDocumentDeleteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/documents/{id}/content:
    get:
      tags: [ui-documents]
      summary: Download extracted plain text for a processed document
      operationId: downloadUiDocumentContent
      security:
        - uiSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Extracted plain text download
          content:
            text/plain:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/documents/{id}/retry:
    post:
      tags: [ui-documents]
      summary: Retry processing for a failed or retryable document item
      operationId: retryUiDocument
      security:
        - uiSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Replacement queued row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiDocumentRow"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/documents/{id}/reprocess:
    post:
      tags: [ui-documents]
      summary: Reprocess a completed or failed document item
      operationId: reprocessUiDocument
      security:
        - uiSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Replacement queued row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiDocumentRow"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/graph/surface:
    get:
      tags: [ui-graph]
      summary: Get the graph workspace payload for the active library
      operationId: getUiGraphSurface
      security:
        - uiSessionCookie: []
      responses:
        "200":
          description: Graph workspace payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiGraphSurfaceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/graph/diagnostics:
    get:
      tags: [ui-graph]
      summary: Get graph readiness and rebuild diagnostics for the active library
      operationId: getUiGraphDiagnostics
      security:
        - uiSessionCookie: []
      responses:
        "200":
          description: Graph diagnostics payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiGraphDiagnostics"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/graph/search:
    get:
      tags: [ui-graph]
      summary: Search graph nodes inside the active library
      operationId: searchUiGraphNodes
      security:
        - uiSessionCookie: []
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Focus-friendly graph search hits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UiGraphSearchHit"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/graph/nodes/{id}:
    get:
      tags: [ui-graph]
      summary: Get focus detail for a graph node
      operationId: getUiGraphNodeDetail
      security:
        - uiSessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Selected node detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiGraphNodeDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/graph/ask:
    post:
      tags: [ui-graph]
      summary: Ask a question from the graph assistant panel
      operationId: askUiGraphAssistant
      security:
        - uiSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UiGraphAskRequest"
      responses:
        "200":
          description: Assistant answer and continuation metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiGraphAssistantAnswer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/admin/overview:
    get:
      tags: [ui-admin]
      summary: Get admin tab counts and availability for the active workspace
      operationId: getUiAdminOverview
      security:
        - uiSessionCookie: []
      responses:
        "200":
          description: Admin tab overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiAdminOverview"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/admin/api-tokens:
    get:
      tags: [ui-admin]
      summary: List API tokens for the active workspace admin surface
      operationId: listUiAdminApiTokens
      security:
        - uiSessionCookie: []
      responses:
        "200":
          description: Admin API token rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiAdminApiTokensResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [ui-admin]
      summary: Create a new API token from the admin surface
      operationId: createUiAdminApiToken
      security:
        - uiSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UiAdminCreateApiTokenRequest"
      responses:
        "200":
          description: Created admin API token row and one-time plaintext token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiAdminCreateApiTokenResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/admin/api-tokens/{id}:
    delete:
      tags: [ui-admin]
      summary: Revoke an API token from the admin surface
      operationId: revokeUiAdminApiToken
      security:
        - uiSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Revoked admin API token row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiAdminApiTokenRow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/admin/members:
    get:
      tags: [ui-admin]
      summary: List workspace members for the admin Members tab
      operationId: listUiAdminMembers
      security:
        - uiSessionCookie: []
      responses:
        "200":
          description: Admin member rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiAdminMembersResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/admin/library-access:
    get:
      tags: [ui-admin]
      summary: List library access rows for the admin tab
      operationId: listUiAdminLibraryAccess
      security:
        - uiSessionCookie: []
      responses:
        "200":
          description: Admin library access rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiAdminLibraryAccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/admin/settings:
    get:
      tags: [ui-admin]
      summary: Get admin settings, provider profile, and validation state
      operationId: getUiAdminSettings
      security:
        - uiSessionCookie: []
      responses:
        "200":
          description: Admin settings items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiAdminSettingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/admin/settings/provider-profile:
    put:
      tags: [ui-admin]
      summary: Update the active library provider profile from the admin surface
      operationId: updateUiAdminProviderProfile
      security:
        - uiSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UiAdminProviderProfileUpdateRequest"
      responses:
        "200":
          description: Updated provider profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiAdminProviderProfileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ui/admin/settings/provider-profile/validate:
    post:
      tags: [ui-admin]
      summary: Run live validation for the active library provider profile
      operationId: validateUiAdminProviderProfile
      security:
        - uiSessionCookie: []
      responses:
        "200":
          description: Provider validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiAdminProviderValidationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/workspaces:
    get:
      tags: [workspaces]
      summary: List workspaces
      operationId: listWorkspaces
      security: []
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceSummary"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [workspaces]
      summary: Create workspace
      operationId: createWorkspace
      description: Requires `workspace:admin` scope or an `instance_admin` token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "200":
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/workspaces/{id}/governance:
    get:
      tags: [workspaces, usage]
      summary: Get workspace governance summary
      operationId: getWorkspaceGovernance
      description: Requires `workspace:admin`, `usage:read`, `providers:admin`, or an `instance_admin` token. Workspace-scoped tokens may only access their own workspace.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Workspace governance summary
          content:
