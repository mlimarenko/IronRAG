  /v1/uploads/ingest:
    post:
      tags: [content]
      summary: Upload a file and queue ingestion when a supported adapter exists
      operationId: uploadAndIngest
      description: |
        Requires `documents:write`, `workspace:admin`, or an `instance_admin` token.

        Current implementation supports UTF-8 text-like uploads only. The backend classifies the selected file, rejects PDF/image uploads with explicit "planned" validation errors, decodes accepted text-like content as UTF-8 text, enqueues an ingestion job, and returns queued job metadata rather than a completed document/chunk result.
        Workspace-scoped tokens may only queue jobs for projects in their own workspace.

        Expected multipart fields:
        - `project_id` (required)
        - `source_id` (optional)
        - `title` (optional)
        - `file` (required)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [project_id, file]
              properties:
                project_id:
                  type: string
                  format: uuid
                source_id:
                  type: string
                  format: uuid
                title:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Ingestion job accepted and queued for the uploaded file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadIngestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
