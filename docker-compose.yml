x-ironrag-runtime-env: &ironrag-runtime-env
  IRONRAG_BIND_ADDR: 0.0.0.0:8080
  IRONRAG_ENVIRONMENT: ${IRONRAG_ENVIRONMENT:-production}
  IRONRAG_DATABASE_URL: postgres://${IRONRAG_POSTGRES_USER:-postgres}:${IRONRAG_POSTGRES_PASSWORD:-postgres}@${IRONRAG_POSTGRES_HOST:-postgres}:5432/${IRONRAG_POSTGRES_DB:-ironrag}
  IRONRAG_DATABASE_MAX_CONNECTIONS: ${IRONRAG_DATABASE_MAX_CONNECTIONS:-20}
  IRONRAG_REDIS_URL: ${IRONRAG_REDIS_URL:-redis://redis:6379}
  IRONRAG_ARANGODB_URL: ${IRONRAG_ARANGODB_URL:-http://arangodb:8529}
  IRONRAG_ARANGODB_DATABASE: ${IRONRAG_ARANGODB_DATABASE:-ironrag}
  IRONRAG_ARANGODB_USERNAME: ${IRONRAG_ARANGODB_USERNAME:-root}
  IRONRAG_ARANGODB_PASSWORD: ${IRONRAG_ARANGODB_PASSWORD:-ironrag-dev}
  IRONRAG_ARANGODB_REQUEST_TIMEOUT_SECONDS: ${IRONRAG_ARANGODB_REQUEST_TIMEOUT_SECONDS:-15}
  IRONRAG_LOG_FILTER: ${IRONRAG_LOG_FILTER:-info}
  IRONRAG_FRONTEND_ORIGIN: ${IRONRAG_FRONTEND_ORIGIN:-http://127.0.0.1:19000,http://localhost:19000}
  IRONRAG_UI_BOOTSTRAP_ADMIN_LOGIN: ${IRONRAG_UI_BOOTSTRAP_ADMIN_LOGIN:-}
  IRONRAG_UI_BOOTSTRAP_ADMIN_PASSWORD: ${IRONRAG_UI_BOOTSTRAP_ADMIN_PASSWORD:-}
  IRONRAG_UI_BOOTSTRAP_ADMIN_API_TOKEN: ${IRONRAG_UI_BOOTSTRAP_ADMIN_API_TOKEN:-}
  IRONRAG_UI_BOOTSTRAP_EXTRACT_GRAPH_PROVIDER_KIND: ${IRONRAG_UI_BOOTSTRAP_EXTRACT_GRAPH_PROVIDER_KIND:-openai}
  IRONRAG_UI_BOOTSTRAP_EXTRACT_GRAPH_MODEL_NAME: ${IRONRAG_UI_BOOTSTRAP_EXTRACT_GRAPH_MODEL_NAME:-gpt-5.4-mini}
  IRONRAG_UI_BOOTSTRAP_EMBED_CHUNK_PROVIDER_KIND: ${IRONRAG_UI_BOOTSTRAP_EMBED_CHUNK_PROVIDER_KIND:-openai}
  IRONRAG_UI_BOOTSTRAP_EMBED_CHUNK_MODEL_NAME: ${IRONRAG_UI_BOOTSTRAP_EMBED_CHUNK_MODEL_NAME:-text-embedding-3-large}
  IRONRAG_UI_BOOTSTRAP_QUERY_ANSWER_PROVIDER_KIND: ${IRONRAG_UI_BOOTSTRAP_QUERY_ANSWER_PROVIDER_KIND:-openai}
  IRONRAG_UI_BOOTSTRAP_QUERY_ANSWER_MODEL_NAME: ${IRONRAG_UI_BOOTSTRAP_QUERY_ANSWER_MODEL_NAME:-gpt-5.4-mini}
  IRONRAG_UI_BOOTSTRAP_VISION_PROVIDER_KIND: ${IRONRAG_UI_BOOTSTRAP_VISION_PROVIDER_KIND:-openai}
  IRONRAG_UI_BOOTSTRAP_VISION_MODEL_NAME: ${IRONRAG_UI_BOOTSTRAP_VISION_MODEL_NAME:-gpt-5.4-mini}
  IRONRAG_OPENAI_API_KEY: ${IRONRAG_OPENAI_API_KEY:-}
  IRONRAG_DEEPSEEK_API_KEY: ${IRONRAG_DEEPSEEK_API_KEY:-}
  IRONRAG_QWEN_API_KEY: ${IRONRAG_QWEN_API_KEY:-}
  IRONRAG_OPENROUTER_API_KEY: ${IRONRAG_OPENROUTER_API_KEY:-}
  IRONRAG_GPTUNNEL_API_KEY: ${IRONRAG_GPTUNNEL_API_KEY:-}
  IRONRAG_ROUTERAI_API_KEY: ${IRONRAG_ROUTERAI_API_KEY:-}
  IRONRAG_RUNTIME_POLICY_REJECT_TASK_KINDS: ${IRONRAG_RUNTIME_POLICY_REJECT_TASK_KINDS:-}
  IRONRAG_RUNTIME_POLICY_REJECT_TARGET_KINDS: ${IRONRAG_RUNTIME_POLICY_REJECT_TARGET_KINDS:-}
  IRONRAG_UI_DEFAULT_LOCALE: ${IRONRAG_UI_DEFAULT_LOCALE:-ru}
  TOKIO_WORKER_THREADS: ${TOKIO_WORKER_THREADS:-8}
  IRONRAG_INGESTION_MAX_PARALLEL_JOBS_GLOBAL: ${IRONRAG_INGESTION_MAX_PARALLEL_JOBS_GLOBAL:-64}
  IRONRAG_INGESTION_MAX_PARALLEL_JOBS_PER_WORKSPACE: ${IRONRAG_INGESTION_MAX_PARALLEL_JOBS_PER_WORKSPACE:-16}
  IRONRAG_INGESTION_MAX_PARALLEL_JOBS_PER_LIBRARY: ${IRONRAG_INGESTION_MAX_PARALLEL_JOBS_PER_LIBRARY:-4}
  IRONRAG_DOCLING_PAGE_BATCH_SIZE: ${IRONRAG_DOCLING_PAGE_BATCH_SIZE:-10}
  IRONRAG_DOCLING_PAGE_STREAM_WINDOW_PAGES: ${IRONRAG_DOCLING_PAGE_STREAM_WINDOW_PAGES:-40}
  IRONRAG_DOCLING_MAX_CONCURRENCY: ${IRONRAG_DOCLING_MAX_CONCURRENCY:-auto}
  IRONRAG_INGESTION_HEAVY_PIPELINE_PARALLELISM: ${IRONRAG_INGESTION_HEAVY_PIPELINE_PARALLELISM:-auto}
  IRONRAG_INGESTION_EMBEDDING_PARALLELISM: ${IRONRAG_INGESTION_EMBEDDING_PARALLELISM:-8}
  IRONRAG_INGESTION_GRAPH_EXTRACT_PARALLELISM_PER_DOC: ${IRONRAG_INGESTION_GRAPH_EXTRACT_PARALLELISM_PER_DOC:-16}
  IRONRAG_STARTUP_AUTHORITY_MODE: compose_one_shot
  IRONRAG_DEPENDENCY_POSTGRES_MODE: bundled
  IRONRAG_DEPENDENCY_REDIS_MODE: bundled
  IRONRAG_DEPENDENCY_ARANGODB_MODE: bundled
  IRONRAG_DEPENDENCY_OBJECT_STORAGE_MODE: disabled
  IRONRAG_CONTENT_STORAGE_PROVIDER: filesystem
  IRONRAG_CONTENT_STORAGE_TOPOLOGY: single_node
  IRONRAG_CONTENT_STORAGE_KEY_PREFIX: ${IRONRAG_CONTENT_STORAGE_KEY_PREFIX:-}
  IRONRAG_CONTENT_STORAGE_ROOT: /var/lib/ironrag/content-storage
  IRONRAG_OTEL_ENABLED: ${IRONRAG_OTEL_ENABLED:-true}
  OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-service.namespace=ironrag}
  OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
  OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-otlp}
  OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-otlp}
  # Empty defaults defer to the compiled-in diagnostics defaults
  # (apps/api/observability.toml). Set either var to override the shipped sink.
  OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: ${OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE:-cumulative}
  RUST_BACKTRACE: full
x-ironrag-app-env: &ironrag-app-env
  <<: *ironrag-runtime-env
  IRONRAG_ARANGODB_BOOTSTRAP_COLLECTIONS: ${IRONRAG_ARANGODB_BOOTSTRAP_COLLECTIONS:-true}
  IRONRAG_ARANGODB_BOOTSTRAP_VIEWS: ${IRONRAG_ARANGODB_BOOTSTRAP_VIEWS:-true}
  IRONRAG_ARANGODB_BOOTSTRAP_GRAPH: ${IRONRAG_ARANGODB_BOOTSTRAP_GRAPH:-true}
  IRONRAG_ARANGODB_BOOTSTRAP_VECTOR_INDEXES: ${IRONRAG_ARANGODB_BOOTSTRAP_VECTOR_INDEXES:-true}

x-ironrag-resources-small: &ironrag-resources-small
  limits:
    cpus: "1.00"
    memory: 1G
  reservations:
    cpus: "0.20"
    memory: 256M

x-ironrag-resources-medium: &ironrag-resources-medium
  limits:
    cpus: "2.00"
    memory: 3072M
  reservations:
    cpus: "0.50"
    memory: 768M

# ArangoDB sits alone on this tier. The 6 GiB ceiling is sized for
# ArangoDB's IVF vector-index build path: with multi-dim per-(library,dim)
# embedding bindings, the largest per-(library,dim) shard
# `knowledge_chunk_vector_d{dim}_l{libhex}` can still hold hundreds of
# thousands of rows for a big library, and Arango must be allowed to train +
# ingest the IVF index without hitting cgroup OOM. Idle Arango RSS is
# ~1.2 GiB; an IVF build over a large shard pushes the resident set up by
# ~1-1.5 GiB. 6 GiB gives headroom for parallel query traffic during the
# build. Do not lower below the largest active shard's IVF build need; see
# the vector-layer policy in CLAUDE.md.
x-ironrag-resources-large: &ironrag-resources-large
  limits:
    cpus: "4.00"
    memory: 6G
  reservations:
    cpus: "1.00"
    memory: 1G

# Shared tier for the API backend and the ingest worker (both run the same
# image). 4 GiB mirrors the charts `workload` tier and is the canonical
# memory containment for docling: `auto_docling_max_concurrency_for_limits`
# (apps/api/src/integrations/docling/mod.rs) derives the concurrency cap from
# (mem_mib*0.9 - 2048) / 2560, so a 4 GiB worker resolves to docling
# concurrency = 1. A runaway docling/python extraction then cgroup-OOMs the
# worker (the job retries) instead of triggering a host-level global OOM that
# kills the innocent API backend (the largest-RSS bystander). The API backend
# does not spawn docling, so 4 GiB is ample for per-query IVF candidate sets.
# The structural fix for total host oversubscription is raising VM RAM.
x-ironrag-resources-workload: &ironrag-resources-workload
  limits:
    cpus: "6.00"
    memory: 4G
  reservations:
    cpus: "2.00"
    memory: 2G

services:
  postgres:
    image: ${IRONRAG_POSTGRES_IMAGE:-postgres:18-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${IRONRAG_POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${IRONRAG_POSTGRES_USER:-postgres}
      POSTGRES_DB: ${IRONRAG_POSTGRES_DB:-ironrag}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${IRONRAG_POSTGRES_USER:-postgres} -d ${IRONRAG_POSTGRES_DB:-ironrag}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql
    deploy:
      resources:
        <<: *ironrag-resources-medium
  redis:
    image: ${IRONRAG_REDIS_IMAGE:-redis:8.6}
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - "${IRONRAG_REDIS_MAXMEMORY:-512mb}"
      - --maxmemory-policy
      - volatile-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        <<: *ironrag-resources-small
  arangodb:
    image: ${IRONRAG_ARANGODB_IMAGE:-arangodb:3.12.4}
    restart: unless-stopped
    environment:
      ARANGO_ROOT_PASSWORD: ${IRONRAG_ARANGODB_PASSWORD:-ironrag-dev}
    command:
      - arangod
      - --server.authentication=true
      - --experimental-vector-index=true
      - --database.directory=/var/lib/arangodb3
      # Memory caps for small (≤ 8 GB) hosts. Without these, the default
      # per-AQL-query memory limit is auto-sized to roughly half the host
      # RAM (~4.6 GB on an 8 GB box) and five parallel queries can reserve
      # 23 GB of virtual memory under concurrent load, enough to
      # trigger the OOM killer on small hosts. 1 GB / query is
      # the minimum that survives the retrieval workload on a large
      # library: the vector-search + graph-traversal + full-scan diagnostic
      # queries all materialize candidate sets big enough that 256 MB
      # produced intermittent 500s on bench runs 2026-04-23. RocksDB buffers
      # and block cache are capped separately so ingest writes don't bloat
      # resident memory.
      - --query.memory-limit=1073741824
      - --query.cache-mode=demand
      - --rocksdb.block-cache-size=536870912
      - --rocksdb.total-write-buffer-size=268435456
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:8529/_db/_system/_admin/aardvark/index.html || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    expose:
      - "8529"
    volumes:
      - arangodb_data:/var/lib/arangodb3
    deploy:
      resources:
        <<: *ironrag-resources-large
  startup:
    image: ${IRONRAG_BACKEND_IMAGE:-pipingspace/ironrag-backend:latest}
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      arangodb:
        condition: service_healthy
    stop_signal: SIGTERM
    stop_grace_period: 10m
    environment:
      <<: *ironrag-app-env
      IRONRAG_SERVICE_ROLE: startup
      IRONRAG_SERVICE_NAME: ironrag-startup
      OTEL_SERVICE_NAME: ironrag-startup
    volumes:
      - content_storage_data:/var/lib/ironrag/content-storage
    deploy:
      resources:
        <<: *ironrag-resources-medium
  backend:
    image: ${IRONRAG_BACKEND_IMAGE:-pipingspace/ironrag-backend:latest}
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 10m
    depends_on:
      startup:
        condition: service_completed_successfully
    environment:
      <<: *ironrag-app-env
      IRONRAG_SERVICE_ROLE: api
      IRONRAG_SERVICE_NAME: ironrag-backend
      OTEL_SERVICE_NAME: ironrag-backend
    expose:
      - "8080"
    volumes:
      - content_storage_data:/var/lib/ironrag/content-storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/ready"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    deploy:
      resources:
        <<: *ironrag-resources-workload
  worker:
    image: ${IRONRAG_BACKEND_IMAGE:-pipingspace/ironrag-backend:latest}
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 10m
    # Bias the kernel OOM-killer toward the worker (and its docling/python
    # extraction children) so a memory spike kills the retryable ingest job
    # rather than the API backend during a host-level global OOM.
    oom_score_adj: 500
    depends_on:
      startup:
        condition: service_completed_successfully
    environment:
      <<: *ironrag-app-env
      IRONRAG_SERVICE_ROLE: worker
      IRONRAG_SERVICE_NAME: ironrag-worker
      OTEL_SERVICE_NAME: ironrag-worker
    expose:
      - "8080"
    volumes:
      - content_storage_data:/var/lib/ironrag/content-storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/ready"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    deploy:
      resources:
        <<: *ironrag-resources-workload
  frontend:
    image: ${IRONRAG_FRONTEND_IMAGE:-pipingspace/ironrag-frontend:latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      IRONRAG_API_UPSTREAM: http://backend:8080
    ports:
      - "${IRONRAG_PORT:-19000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        <<: *ironrag-resources-small
volumes:
  postgres_data:
  arangodb_data:
  content_storage_data:
