services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: rustrag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      bind_addr: 0.0.0.0:8080
      service_name: rustrag-backend
      environment: local-compose
      database_url: postgres://postgres:postgres@postgres:5432/rustrag
      database_max_connections: 20
      redis_url: redis://redis:6379
      log_filter: info
      RUST_BACKTRACE: full
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
