# IronRAG — single canonical Compose stack.
#
# This one file replaces the former four (base / local / large / s4). Every
# dimension that used to need a separate file is now driven by env vars or a
# Compose profile, so `docker compose up -d` is the default path and the
# variants are opt-in:
#
#   default (no profile)   filesystem content storage, prebuilt Hub images,
#                          Docling-capable local memory caps. Just
#                          `docker compose up -d`.
#
#   s4 profile             bundled s4core (S3-compatible) object storage.
#     COMPOSE_PROFILES=s4 \
#     IRONRAG_CONTENT_STORAGE_PROVIDER=s3 \
#     IRONRAG_DEPENDENCY_OBJECT_STORAGE_MODE=bundled \
#     IRONRAG_CONTENT_STORAGE_TOPOLOGY=shared_cluster \
#       docker compose up -d
#     (S3 endpoint/credentials already default to the bundled s4core; override
#      IRONRAG_CONTENT_STORAGE_S3_* to point at an external bucket instead.)
#     The s4core service only starts under this profile; startup/backend/worker
#     wait for it via `depends_on … required: false`, so the default filesystem
#     path never references it.
#
#   large host             raise the per-role memory caps for 24-32 GiB hosts /
#                          big corpora — no separate file, just env:
#     IRONRAG_DB_MEMORY_LIMIT=6144M \
#     IRONRAG_BACKEND_MEMORY_LIMIT=4096M \
#     IRONRAG_WORKER_MEMORY_LIMIT=4096M \
#       docker compose up -d
#
#   local source build     build the images from this tree instead of pulling:
#     IRONRAG_BACKEND_IMAGE=ironrag-backend:local \
#     IRONRAG_FRONTEND_IMAGE=ironrag-frontend:local \
#       docker compose up -d --build
#     (`make docker-local-*` wires these names in for you.)
#
#   scale ingest workers   run N ingest workers. Default 1 keeps the baseline
#                          stack simple and light enough for weak machines.
#                          Scale-out is safe: workers claim jobs with
#                          `for update skip locked` under per-library / per-
#                          workspace / global concurrency caps, so replicas
#                          never double-process the same job:
#     IRONRAG_WORKER_REPLICAS=4 docker compose up -d
#     (Kubernetes: set worker.replicaCount in charts/ironrag/values.yaml.)
#
# Application environment. Only operator-facing knobs live here. Narrow runtime
# tuning (allocator, tokio pool, ingest parallelism, docling batching, pgvector
# index budget, OTEL exporter selection) is baked into the image defaults
# (apps/api/Dockerfile + apps/api/src/app/config.rs) and stays overridable by
# setting the matching IRONRAG_*/OTEL_* env var.
x-ironrag-runtime-env: &ironrag-runtime-env
  IRONRAG_ENVIRONMENT: ${IRONRAG_ENVIRONMENT:-production}
  # Stable per-deployment telemetry id. Empty -> auto-derived from the Postgres
  # cluster identity (unique per stack, stable across container recreation,
  # shared by every role). Set a value only to override the auto id or when
  # several stacks deliberately share one database.
  IRONRAG_DEPLOYMENT_ID: ${IRONRAG_DEPLOYMENT_ID:-}
  IRONRAG_DATABASE_URL: postgres://${IRONRAG_POSTGRES_USER:-postgres}:${IRONRAG_POSTGRES_PASSWORD:-postgres}@${IRONRAG_POSTGRES_HOST:-postgres}:5432/${IRONRAG_POSTGRES_DB:-ironrag}
  # Deployment-wide app connection budget. The backend divides it across the
  # expected API + worker replicas before opening per-process SQLx pools.
  IRONRAG_DATABASE_MAX_CONNECTIONS: ${IRONRAG_DATABASE_MAX_CONNECTIONS:-20}
  IRONRAG_API_REPLICAS: ${IRONRAG_API_REPLICAS:-1}
  IRONRAG_WORKER_REPLICAS: ${IRONRAG_WORKER_REPLICAS:-1}
  IRONRAG_KNOWLEDGE_PLANE_BACKEND: postgres
  IRONRAG_REDIS_URL: ${IRONRAG_REDIS_URL:-redis://redis:6379}
  IRONRAG_LOG_FILTER: ${IRONRAG_LOG_FILTER:-info}
  IRONRAG_FRONTEND_ORIGIN: ${IRONRAG_FRONTEND_ORIGIN:-http://127.0.0.1:19000,http://localhost:19000}
  IRONRAG_UI_BOOTSTRAP_ADMIN_LOGIN: ${IRONRAG_UI_BOOTSTRAP_ADMIN_LOGIN:-}
  IRONRAG_UI_BOOTSTRAP_ADMIN_PASSWORD: ${IRONRAG_UI_BOOTSTRAP_ADMIN_PASSWORD:-}
  IRONRAG_UI_BOOTSTRAP_ADMIN_API_TOKEN: ${IRONRAG_UI_BOOTSTRAP_ADMIN_API_TOKEN:-}
  IRONRAG_UI_BOOTSTRAP_EXTRACT_GRAPH_PROVIDER_KIND: ${IRONRAG_UI_BOOTSTRAP_EXTRACT_GRAPH_PROVIDER_KIND:-openai}
  IRONRAG_UI_BOOTSTRAP_EXTRACT_GRAPH_MODEL_NAME: ${IRONRAG_UI_BOOTSTRAP_EXTRACT_GRAPH_MODEL_NAME:-gpt-5.4-mini}
  IRONRAG_UI_BOOTSTRAP_EMBED_CHUNK_PROVIDER_KIND: ${IRONRAG_UI_BOOTSTRAP_EMBED_CHUNK_PROVIDER_KIND:-openai}
  IRONRAG_UI_BOOTSTRAP_EMBED_CHUNK_MODEL_NAME: ${IRONRAG_UI_BOOTSTRAP_EMBED_CHUNK_MODEL_NAME:-text-embedding-3-large}
  IRONRAG_UI_BOOTSTRAP_QUERY_ANSWER_PROVIDER_KIND: ${IRONRAG_UI_BOOTSTRAP_QUERY_ANSWER_PROVIDER_KIND:-openai}
  IRONRAG_UI_BOOTSTRAP_QUERY_ANSWER_MODEL_NAME: ${IRONRAG_UI_BOOTSTRAP_QUERY_ANSWER_MODEL_NAME:-gpt-5.4-mini}
  IRONRAG_UI_BOOTSTRAP_VISION_PROVIDER_KIND: ${IRONRAG_UI_BOOTSTRAP_VISION_PROVIDER_KIND:-openai}
  IRONRAG_UI_BOOTSTRAP_VISION_MODEL_NAME: ${IRONRAG_UI_BOOTSTRAP_VISION_MODEL_NAME:-gpt-5.4-mini}
  IRONRAG_OPENAI_API_KEY: ${IRONRAG_OPENAI_API_KEY:-}
  IRONRAG_DEEPSEEK_API_KEY: ${IRONRAG_DEEPSEEK_API_KEY:-}
  IRONRAG_QWEN_API_KEY: ${IRONRAG_QWEN_API_KEY:-}
  IRONRAG_OPENROUTER_API_KEY: ${IRONRAG_OPENROUTER_API_KEY:-}
  IRONRAG_GPTUNNEL_API_KEY: ${IRONRAG_GPTUNNEL_API_KEY:-}
  IRONRAG_ROUTERAI_API_KEY: ${IRONRAG_ROUTERAI_API_KEY:-}
  IRONRAG_UI_DEFAULT_LOCALE: ${IRONRAG_UI_DEFAULT_LOCALE:-ru}
  IRONRAG_STARTUP_AUTHORITY_MODE: compose_one_shot
  IRONRAG_DEPENDENCY_POSTGRES_MODE: bundled
  IRONRAG_DEPENDENCY_REDIS_MODE: bundled
  # ── Content storage ──────────────────────────────────────────────────────
  # Defaults validate as filesystem storage (provider=filesystem requires
  # topology=single_node and object_storage_mode=disabled — see
  # apps/api/src/app/config.rs::validate_content_storage_settings). The S3_*
  # values below are inert under filesystem and pre-aimed at the bundled
  # s4core, so switching to S3 means flipping these three knobs and enabling
  # the `s4` profile (see the header). Never leave PROVIDER unset/empty: an
  # empty value overrides the image default and fails to parse.
  IRONRAG_CONTENT_STORAGE_PROVIDER: ${IRONRAG_CONTENT_STORAGE_PROVIDER:-filesystem}
  IRONRAG_CONTENT_STORAGE_TOPOLOGY: ${IRONRAG_CONTENT_STORAGE_TOPOLOGY:-single_node}
  IRONRAG_DEPENDENCY_OBJECT_STORAGE_MODE: ${IRONRAG_DEPENDENCY_OBJECT_STORAGE_MODE:-disabled}
  IRONRAG_CONTENT_STORAGE_KEY_PREFIX: ${IRONRAG_CONTENT_STORAGE_KEY_PREFIX:-}
  IRONRAG_CONTENT_STORAGE_S3_BUCKET: ${IRONRAG_CONTENT_STORAGE_S3_BUCKET:-ironrag}
  IRONRAG_CONTENT_STORAGE_S3_ENDPOINT: ${IRONRAG_CONTENT_STORAGE_S3_ENDPOINT:-http://s4core:9000}
  IRONRAG_CONTENT_STORAGE_S3_REGION: ${IRONRAG_CONTENT_STORAGE_S3_REGION:-us-east-1}
  IRONRAG_CONTENT_STORAGE_S3_ACCESS_KEY_ID: ${IRONRAG_CONTENT_STORAGE_S3_ACCESS_KEY_ID:-ironrag}
  IRONRAG_CONTENT_STORAGE_S3_SECRET_ACCESS_KEY: ${IRONRAG_CONTENT_STORAGE_S3_SECRET_ACCESS_KEY:-ironrag-dev-secret}
  IRONRAG_CONTENT_STORAGE_S3_SESSION_TOKEN: ${IRONRAG_CONTENT_STORAGE_S3_SESSION_TOKEN:-}
  IRONRAG_CONTENT_STORAGE_S3_FORCE_PATH_STYLE: ${IRONRAG_CONTENT_STORAGE_S3_FORCE_PATH_STYLE:-true}
  # Keep the local baseline memory-safe: the worker runtime also applies a
  # cgroup-derived per-process claim cap, while these defaults prevent several
  # replicas from stacking graph-merge jobs on the same host. Larger deployments
  # can raise the values together with worker memory.
  IRONRAG_INGESTION_MAX_PARALLEL_JOBS_GLOBAL: ${IRONRAG_INGESTION_MAX_PARALLEL_JOBS_GLOBAL:-4}
  IRONRAG_INGESTION_MAX_PARALLEL_JOBS_PER_WORKSPACE: ${IRONRAG_INGESTION_MAX_PARALLEL_JOBS_PER_WORKSPACE:-2}
  IRONRAG_INGESTION_MAX_PARALLEL_JOBS_PER_LIBRARY: ${IRONRAG_INGESTION_MAX_PARALLEL_JOBS_PER_LIBRARY:-1}
  # Graph projection prewarm is opt-in. Large libraries can allocate enough
  # memory to OOM the API role if every active graph is loaded at startup.
  IRONRAG_RUNTIME_GRAPH_PROJECTION_PREWARM_ENABLED: ${IRONRAG_RUNTIME_GRAPH_PROJECTION_PREWARM_ENABLED:-false}
  IRONRAG_RUNTIME_GRAPH_PROJECTION_PREWARM_MAX_LIBRARIES: ${IRONRAG_RUNTIME_GRAPH_PROJECTION_PREWARM_MAX_LIBRARIES:-0}
  IRONRAG_OTEL_ENABLED: ${IRONRAG_OTEL_ENABLED:-true}
  OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-service.namespace=ironrag}
  # Logs are the only content-bearing signal (they carry query text and document
  # chunk previews), so they are OFF by default — the shipped telemetry is then
  # traces + metrics only, i.e. performance data with no document/query content.
  # Set OTEL_LOGS_EXPORTER=otlp to also ship logs to your own collector.
  OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-none}
  # Empty endpoint/protocol defer to the compiled-in diagnostics sink
  # (apps/api/observability.toml); set either to point at your own collector.
  OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}

x-ironrag-dns: &ironrag-dns
  - ${IRONRAG_DOCKER_DNS_PRIMARY:-1.1.1.1}
  - ${IRONRAG_DOCKER_DNS_SECONDARY:-8.8.8.8}

# ─── Memory containment (Docling-capable local baseline, swap = 0) ────────────
# The steady-state sum of `memory` LIMITS is the real lever here: Compose does
# NOT enforce `reservations` (only Swarm / k8s does), and cgroup v2 lets the
# sum of caps exceed physical RAM. On a swapless host a combined resident set
# above physical RAM trips the kernel's GLOBAL OOM killer, which then SIGKILLs
# the largest-RSS bystander instead of the rebuildable worker. The defaults
# below are sized so the local stack can run one bounded embedded Docling
# extractor and still fail fast before pressure turns into SIGKILL loops.
#
#   anchor    default  services            counts toward steady Σ?
#   frontend   192M    frontend            yes
#   cache      192M    redis               yes
#   db        1024M    postgres, startup   postgres: yes / startup: one-shot
#   worker    3072M    worker              yes
#   backend   1024M    backend             yes
#
# Steady Σ (repo services, one-shot startup excluded):
#   1024 + 1024 + 3072 + 192 + 192 = 5504 MiB ≈ 5.4 GiB.
# `scripts/ops/check-mem-budget.sh` (wired into `make check`) parses the
# defaults below and fails the build if this baseline sum is exceeded, so a
# future edit cannot silently make the default stack more memory-hungry. Both
# the CPU and memory limit of every role scale via the IRONRAG_*_CPUS /
# IRONRAG_*_MEMORY_LIMIT env overrides without editing this file. Text/native
# only local stacks may lower the worker cap, but PDF / office / OCR ingest
# needs the one-process Docling headroom or it will be rejected by the worker.
x-ironrag-resources-frontend: &ironrag-resources-frontend
  limits:
    cpus: ${IRONRAG_FRONTEND_CPUS:-0.50}
    memory: ${IRONRAG_FRONTEND_MEMORY_LIMIT:-192M}
  reservations:
    cpus: "0.10"
    memory: 32M

x-ironrag-resources-cache: &ironrag-resources-cache
  limits:
    cpus: ${IRONRAG_CACHE_CPUS:-0.50}
    memory: ${IRONRAG_CACHE_MEMORY_LIMIT:-192M}
  reservations:
    cpus: "0.10"
    memory: 64M

# Postgres (relational + pgvector knowledge plane) and the one-shot startup
# migrator share this tier. The budget gives Postgres headroom for
# HNSW/IVFFlat index builds and complex runtime graph scans.
x-ironrag-resources-db: &ironrag-resources-db
  limits:
    cpus: ${IRONRAG_DB_CPUS:-1.00}
    memory: ${IRONRAG_DB_MEMORY_LIMIT:-1024M}
  reservations:
    cpus: "0.25"
    memory: 256M

# Ingest worker. The default is sized for one bounded embedded Docling
# extractor process plus Rust worker headroom; application-side concurrency and
# cgroup headroom gates still prevent parallel extractor fanout and SIGKILL
# retry loops under pressure. For text/native-only local stacks this can be
# lowered, but PDF / office / OCR ingest should keep at least one-process
# Docling headroom.
x-ironrag-resources-worker: &ironrag-resources-worker
  limits:
    cpus: ${IRONRAG_WORKER_CPUS:-2.00}
    memory: ${IRONRAG_WORKER_MEMORY_LIMIT:-3072M}
  reservations:
    cpus: "0.50"
    memory: 256M

# API backend. Answer path only — no docling spawned here. The 1024M default is
# enough for light concurrency; heavy concurrent grounded-answer turns can peak
# higher, so raise IRONRAG_BACKEND_MEMORY_LIMIT on a bigger host.
x-ironrag-resources-backend: &ironrag-resources-backend
  limits:
    cpus: ${IRONRAG_BACKEND_CPUS:-2.00}
    memory: ${IRONRAG_BACKEND_MEMORY_LIMIT:-1024M}
  reservations:
    cpus: "0.50"
    memory: 256M

# Bundled s4core object store (only under the `s4` profile, so NOT part of the
# default memory budget — check-mem-budget.sh skips profiled services). A
# lightweight S3 server that streams blobs to disk; raise the cap for heavy
# upload concurrency, or point IRONRAG_CONTENT_STORAGE_S3_ENDPOINT at an
# external bucket and don't run s4core at all.
x-ironrag-resources-s4core: &ironrag-resources-s4core
  limits:
    cpus: ${IRONRAG_S4CORE_CPUS:-1.00}
    memory: ${IRONRAG_S4CORE_MEMORY_LIMIT:-512M}
  reservations:
    cpus: "0.25"
    memory: 128M

services:
  postgres:
    image: ${IRONRAG_POSTGRES_IMAGE:-pgvector/pgvector:pg18}
    restart: unless-stopped
    # Postgres parallel-query gathers allocate dynamic-shared-memory segments
    # in /dev/shm. The stock container mounts /dev/shm as a 64 MiB tmpfs, which
    # a single large parallel aggregate (e.g. the graph topology document-link
    # scan) or a burst of concurrent graph loads can exhaust, surfacing as
    # `could not resize shared memory segment ... No space left on device` ->
    # HTTP 500. 256 MiB gives parallel workers headroom. The application also
    # pins the heaviest topology scans to a non-parallel plan (see
    # runtime_graph_repository::begin_topology_scan_tx) so correctness never
    # depends on this value alone.
    shm_size: ${IRONRAG_POSTGRES_SHM_SIZE:-256mb}
    environment:
      POSTGRES_PASSWORD: ${IRONRAG_POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${IRONRAG_POSTGRES_USER:-postgres}
      POSTGRES_DB: ${IRONRAG_POSTGRES_DB:-ironrag}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${IRONRAG_POSTGRES_USER:-postgres} -d ${IRONRAG_POSTGRES_DB:-ironrag}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql
    # Stateful relational store — strongly protected; a kill forces WAL
    # recovery on restart. Sacrificed only after every app container.
    oom_score_adj: -800
    deploy:
      resources:
        <<: *ironrag-resources-db
  redis:
    image: ${IRONRAG_REDIS_IMAGE:-redis:8.8}
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - "${IRONRAG_REDIS_MAXMEMORY:-512mb}"
      - --maxmemory-policy
      - volatile-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    # Stateful-ish cache — protected; rebuilding the graph/answer cache is
    # costly. Sacrificed only after every app container.
    oom_score_adj: -700
    deploy:
      resources:
        <<: *ironrag-resources-cache
  # Bundled S3-compatible object storage. Only created under the `s4` profile;
  # the default filesystem stack never starts it (startup/backend/worker depend
  # on it with `required: false`, so its absence is not an error).
  s4core:
    image: ${IRONRAG_S4CORE_IMAGE:-s4core/s4core:latest}
    restart: unless-stopped
    profiles: ["s4"]
    environment:
      S4_BIND: 0.0.0.0:9000
      S4_ACCESS_KEY_ID: ${IRONRAG_CONTENT_STORAGE_S3_ACCESS_KEY_ID:-ironrag}
      S4_SECRET_ACCESS_KEY: ${IRONRAG_CONTENT_STORAGE_S3_SECRET_ACCESS_KEY:-ironrag-dev-secret}
      S4_DATA_DIR: /data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9000/metrics >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    expose:
      - "9000"
    volumes:
      - s4core_data:/data
    deploy:
      resources:
        <<: *ironrag-resources-s4core
  startup:
    image: ${IRONRAG_BACKEND_IMAGE:-pipingspace/ironrag-backend:latest}
    # `build` is dev-only: the public install path (install.sh) ships only this
    # file + `docker compose pull`, so the registry image is present and the
    # build context is never needed. Local source builds set
    # IRONRAG_BACKEND_IMAGE=ironrag-backend:local and run with --build.
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      s4core:
        condition: service_healthy
        required: false
    stop_signal: SIGTERM
    stop_grace_period: 10m
    environment:
      <<: *ironrag-runtime-env
      IRONRAG_SERVICE_ROLE: startup
      IRONRAG_SERVICE_NAME: ironrag-startup
      OTEL_SERVICE_NAME: ironrag-startup
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns: *ironrag-dns
    # One-shot migrator; neutral OOM priority — it exits before steady state
    # so it does not co-reside under load.
    oom_score_adj: 0
    volumes:
      - content_storage_data:/var/lib/ironrag/content-storage
    deploy:
      resources:
        <<: *ironrag-resources-db
  backend:
    image: ${IRONRAG_BACKEND_IMAGE:-pipingspace/ironrag-backend:latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        APP_VERSION: ${IRONRAG_VERSION:-0.0.0-dev}
        DOCLING_VERSION: ${DOCLING_VERSION:-2.107.0}
        TORCH_VERSION: ${TORCH_VERSION:-2.11.0+cpu}
        TORCHVISION_VERSION: ${TORCHVISION_VERSION:-0.26.0+cpu}
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 10m
    # Restartable, but a kill drops in-flight answer turns — sacrifice after
    # the worker and frontend, and well before any stateful store.
    oom_score_adj: 200
    depends_on:
      startup:
        condition: service_completed_successfully
    environment:
      <<: *ironrag-runtime-env
      IRONRAG_SERVICE_ROLE: api
      IRONRAG_SERVICE_NAME: ironrag-backend
      OTEL_SERVICE_NAME: ironrag-backend
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns: *ironrag-dns
    volumes:
      - content_storage_data:/var/lib/ironrag/content-storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/ready"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    deploy:
      resources:
        <<: *ironrag-resources-backend
  worker:
    image: ${IRONRAG_BACKEND_IMAGE:-pipingspace/ironrag-backend:latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 10m
    # First sacrifice under memory pressure: the worker (and its docling/python
    # extraction children) is the largest non-stateful consumer, and its ingest
    # job simply requeues after a kill. +800 puts it firmly at the top of the
    # kernel's OOM-victim list, ahead of frontend (+400) and backend (+200).
    oom_score_adj: 800
    depends_on:
      startup:
        condition: service_completed_successfully
    environment:
      <<: *ironrag-runtime-env
      IRONRAG_SERVICE_ROLE: worker
      IRONRAG_SERVICE_NAME: ironrag-worker
      OTEL_SERVICE_NAME: ironrag-worker
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns: *ironrag-dns
    volumes:
      - content_storage_data:/var/lib/ironrag/content-storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/ready"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    # Horizontal scale-out: run N ingest workers from one env var. Default 1
    # keeps the baseline stack simple. Safe because job claiming uses
    # `for update skip locked` with concurrency caps (see
    # claim_next_queued_ingest_job), so replicas never double-process a job.
    deploy:
      replicas: ${IRONRAG_WORKER_REPLICAS:-1}
      resources:
        <<: *ironrag-resources-worker
  frontend:
    image: ${IRONRAG_FRONTEND_IMAGE:-pipingspace/ironrag-frontend:latest}
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${IRONRAG_VERSION:-0.0.0-dev}
        # Browser traces (web vitals, fetch/navigation spans — no document or
        # query content) default to the maintainers' collector; set empty to
        # disable, or point at your own OTLP/HTTP traces endpoint.
        VITE_OTEL_EXPORTER_OTLP_ENDPOINT: ${VITE_OTEL_EXPORTER_OTLP_ENDPOINT:-https://otel.piping.space:4318/v1/traces}
        VITE_OTEL_SERVICE_NAME: ${VITE_OTEL_SERVICE_NAME:-ironrag-web}
        VITE_OTEL_SERVICE_VERSION: ${VITE_OTEL_SERVICE_VERSION:-${IRONRAG_VERSION:-0.0.0-dev}}
        VITE_OTEL_DEPLOYMENT_ENVIRONMENT: ${VITE_OTEL_DEPLOYMENT_ENVIRONMENT:-production}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      IRONRAG_API_UPSTREAM: http://backend:8080
    dns: *ironrag-dns
    ports:
      - "${IRONRAG_PORT:-19000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Stateless nginx + static SPA — trivially restartable; sacrifice right
    # after the worker and before the backend.
    oom_score_adj: 400
    deploy:
      resources:
        <<: *ironrag-resources-frontend
volumes:
  postgres_data:
  content_storage_data:
  s4core_data:
