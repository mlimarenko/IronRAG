services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    security_opt:
      - apparmor=unconfined
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: rustrag
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rustrag"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:8.4
    security_opt:
      - apparmor=unconfined
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    security_opt:
      - apparmor=unconfined
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      bind_addr: 0.0.0.0:8080
      service_name: rustrag-backend
      environment: local-compose
      database_url: postgres://postgres:postgres@postgres:5432/rustrag
      database_max_connections: 20
      redis_url: redis://redis:6379
      log_filter: info
      RUST_BACKTRACE: full
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
