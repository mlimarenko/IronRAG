# Application environment. Only operator-facing knobs live here. Narrow runtime
# tuning (allocator, tokio pool, ingest parallelism, docling batching, vector
# index budget, arango bootstrap toggles, OTEL exporter selection) is baked into
# the image defaults (apps/api/Dockerfile + apps/api/src/app/config.rs) and stays
# overridable by setting the matching IRONRAG_*/OTEL_* env var.
x-ironrag-runtime-env: &ironrag-runtime-env
  IRONRAG_ENVIRONMENT: ${IRONRAG_ENVIRONMENT:-production}
  IRONRAG_DATABASE_URL: postgres://${IRONRAG_POSTGRES_USER:-postgres}:${IRONRAG_POSTGRES_PASSWORD:-postgres}@${IRONRAG_POSTGRES_HOST:-postgres}:5432/${IRONRAG_POSTGRES_DB:-ironrag}
  IRONRAG_DATABASE_MAX_CONNECTIONS: ${IRONRAG_DATABASE_MAX_CONNECTIONS:-20}
  IRONRAG_REDIS_URL: ${IRONRAG_REDIS_URL:-redis://redis:6379}
  IRONRAG_ARANGODB_URL: ${IRONRAG_ARANGODB_URL:-http://arangodb:8529}
  IRONRAG_ARANGODB_DATABASE: ${IRONRAG_ARANGODB_DATABASE:-ironrag}
  IRONRAG_ARANGODB_USERNAME: ${IRONRAG_ARANGODB_USERNAME:-root}
  IRONRAG_ARANGODB_PASSWORD: ${IRONRAG_ARANGODB_PASSWORD:-ironrag-dev}
  IRONRAG_LOG_FILTER: ${IRONRAG_LOG_FILTER:-info}
  IRONRAG_FRONTEND_ORIGIN: ${IRONRAG_FRONTEND_ORIGIN:-http://127.0.0.1:19000,http://localhost:19000}
  IRONRAG_UI_BOOTSTRAP_ADMIN_LOGIN: ${IRONRAG_UI_BOOTSTRAP_ADMIN_LOGIN:-}
  IRONRAG_UI_BOOTSTRAP_ADMIN_PASSWORD: ${IRONRAG_UI_BOOTSTRAP_ADMIN_PASSWORD:-}
  IRONRAG_UI_BOOTSTRAP_ADMIN_API_TOKEN: ${IRONRAG_UI_BOOTSTRAP_ADMIN_API_TOKEN:-}
  IRONRAG_UI_BOOTSTRAP_EXTRACT_GRAPH_PROVIDER_KIND: ${IRONRAG_UI_BOOTSTRAP_EXTRACT_GRAPH_PROVIDER_KIND:-openai}
  IRONRAG_UI_BOOTSTRAP_EXTRACT_GRAPH_MODEL_NAME: ${IRONRAG_UI_BOOTSTRAP_EXTRACT_GRAPH_MODEL_NAME:-gpt-5.4-mini}
  IRONRAG_UI_BOOTSTRAP_EMBED_CHUNK_PROVIDER_KIND: ${IRONRAG_UI_BOOTSTRAP_EMBED_CHUNK_PROVIDER_KIND:-openai}
  IRONRAG_UI_BOOTSTRAP_EMBED_CHUNK_MODEL_NAME: ${IRONRAG_UI_BOOTSTRAP_EMBED_CHUNK_MODEL_NAME:-text-embedding-3-large}
  IRONRAG_UI_BOOTSTRAP_QUERY_ANSWER_PROVIDER_KIND: ${IRONRAG_UI_BOOTSTRAP_QUERY_ANSWER_PROVIDER_KIND:-openai}
  IRONRAG_UI_BOOTSTRAP_QUERY_ANSWER_MODEL_NAME: ${IRONRAG_UI_BOOTSTRAP_QUERY_ANSWER_MODEL_NAME:-gpt-5.4-mini}
  IRONRAG_UI_BOOTSTRAP_VISION_PROVIDER_KIND: ${IRONRAG_UI_BOOTSTRAP_VISION_PROVIDER_KIND:-openai}
  IRONRAG_UI_BOOTSTRAP_VISION_MODEL_NAME: ${IRONRAG_UI_BOOTSTRAP_VISION_MODEL_NAME:-gpt-5.4-mini}
  IRONRAG_OPENAI_API_KEY: ${IRONRAG_OPENAI_API_KEY:-}
  IRONRAG_DEEPSEEK_API_KEY: ${IRONRAG_DEEPSEEK_API_KEY:-}
  IRONRAG_QWEN_API_KEY: ${IRONRAG_QWEN_API_KEY:-}
  IRONRAG_OPENROUTER_API_KEY: ${IRONRAG_OPENROUTER_API_KEY:-}
  IRONRAG_GPTUNNEL_API_KEY: ${IRONRAG_GPTUNNEL_API_KEY:-}
  IRONRAG_ROUTERAI_API_KEY: ${IRONRAG_ROUTERAI_API_KEY:-}
  IRONRAG_UI_DEFAULT_LOCALE: ${IRONRAG_UI_DEFAULT_LOCALE:-ru}
  IRONRAG_STARTUP_AUTHORITY_MODE: compose_one_shot
  IRONRAG_DEPENDENCY_POSTGRES_MODE: bundled
  IRONRAG_DEPENDENCY_REDIS_MODE: bundled
  IRONRAG_DEPENDENCY_ARANGODB_MODE: bundled
  IRONRAG_OTEL_ENABLED: ${IRONRAG_OTEL_ENABLED:-true}
  OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-service.namespace=ironrag}
  # Empty endpoint/protocol defer to the compiled-in diagnostics sink
  # (apps/api/observability.toml); set either to point at your own collector.
  OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}

# ─── Memory containment (16 GiB host baseline, swap = 0) ─────────────────────
# The steady-state sum of `memory` LIMITS is the real lever here: Compose does
# NOT enforce `reservations` (only Swarm / k8s does), and cgroup v2 lets the
# sum of caps exceed physical RAM. On a swapless host a combined resident set
# above ~16 GiB trips the kernel's GLOBAL OOM killer, which then SIGKILLs the
# largest-RSS bystander (historically arangod, mid-IVF-write → crash loop)
# instead of the rebuildable worker. The previous anchors summed to ~21-23 GiB,
# sized for a 24-32 GiB VM that was never provisioned; this set fits 16 GiB.
#
#   anchor    limit   services            counts toward steady Σ?
#   frontend   256M   frontend            yes
#   cache      768M   redis               yes
#   db        1536M   postgres, startup   postgres: yes / startup: one-shot
#   worker    3072M   worker              yes
#   backend   3584M   backend             yes
#   vector    5120M   arangodb            yes
#
# Steady Σ (repo services, one-shot startup excluded):
#   5120 + 3584 + 3072 + 1536 + 768 + 256 = 14336 MiB ≈ 14.0 GiB.
# Budget ceiling = 16 GiB − 1.5 GiB headroom (OS, page cache, cadvisor,
# qemu-ga) = 14.5 GiB. The ~0.5 GiB slack absorbs the prod-only
# confluence-connector add-on. `scripts/ops/check-mem-budget.sh` (wired into
# `make check`) fails the build if this sum is exceeded, so a future edit
# cannot silently re-oversubscribe the host.
#
# These caps plus the per-service `oom_score_adj` below make a 16 GiB host
# correct by default. A 24-32 GiB host can layer `docker-compose.large.yml`
# to restore the wider arango/backend/worker caps for big corpora — raise
# `IRONRAG_VECTOR_INDEX_TRAINING_BUDGET_BYTES` in lock-step (see the multi-dim
# vector policy in CLAUDE.md).
x-ironrag-resources-frontend: &ironrag-resources-frontend
  limits:
    cpus: "1.00"
    memory: 256M
  reservations:
    cpus: "0.20"
    memory: 64M

x-ironrag-resources-cache: &ironrag-resources-cache
  limits:
    cpus: "1.00"
    memory: 768M
  reservations:
    cpus: "0.20"
    memory: 128M

# Postgres (relational store) and the one-shot startup migrator share this
# tier. Postgres anon RSS is ~0.4 GiB (shared_buffers is shared page cache,
# not counted here); 1.5 GiB covers work_mem spikes on complex queries.
x-ironrag-resources-db: &ironrag-resources-db
  limits:
    cpus: "2.00"
    memory: 1536M
  reservations:
    cpus: "0.50"
    memory: 256M

# Ingest worker. 3 GiB is the canonical docling memory containment:
# `auto_docling_max_concurrency_for_limits` (apps/api/src/integrations/docling/
# mod.rs) derives the concurrency cap from (mem_mib*0.9 - 2048) / 2560, so a
# 3 GiB worker still resolves to docling concurrency = 1 (identical outcome to
# the old 4 GiB). A runaway docling/python extraction then cgroup-OOMs the
# worker — whose job simply requeues — instead of tripping a host global OOM.
# `oom_score_adj: 800` (below) makes the worker the kernel's first sacrifice.
x-ironrag-resources-worker: &ironrag-resources-worker
  limits:
    cpus: "6.00"
    memory: 3072M
  reservations:
    cpus: "2.00"
    memory: 768M

# API backend. Answer path only — no docling spawned here — so 3.5 GiB covers
# the observed 1.7-3.1 GiB peak of concurrent grounded-answer turns with a
# margin (a future global concurrent-turn semaphore can tighten this to 3 GiB).
x-ironrag-resources-backend: &ironrag-resources-backend
  limits:
    cpus: "6.00"
    memory: 3584M
  reservations:
    cpus: "2.00"
    memory: 768M

# ArangoDB sits alone on the vector tier. The 5 GiB ceiling holds the IVF
# vector-index build for the largest active per-(library,dim) shard
# `knowledge_chunk_vector_d{dim}_l{libhex}`: idle arangod RSS is ~1.5 GiB and
# an IVF build over a large shard adds ~1.5 GiB, leaving room for concurrent
# query traffic. The builder fail-soft-caps its `nLists` to
# `VECTOR_INDEX_TRAINING_BUDGET_BYTES` (default 3 GB; env-overridable via
# `IRONRAG_VECTOR_INDEX_TRAINING_BUDGET_BYTES`) divided by the empirical
# 50 MB/list, so a smaller cap yields a cheaper build, never a cgroup OOM. Do
# not lower below the largest active shard's IVF build need; raise it (and the
# training-budget env) in lock-step with a bigger model/corpus — see the
# multi-dim vector policy in CLAUDE.md.
x-ironrag-resources-vector: &ironrag-resources-vector
  limits:
    cpus: "4.00"
    memory: 5120M
  reservations:
    cpus: "1.00"
    memory: 1G

services:
  postgres:
    image: ${IRONRAG_POSTGRES_IMAGE:-postgres:18-alpine}
    restart: unless-stopped
    # Postgres parallel-query gathers allocate dynamic-shared-memory
    # segments in /dev/shm. The stock container mounts /dev/shm as a 64 MiB
    # tmpfs, which a single large parallel aggregate (e.g. the graph
    # topology document-link scan) or a burst of concurrent graph loads can
    # exhaust, surfacing as `could not resize shared memory segment ... No
    # space left on device` -> HTTP 500. 256 MiB gives parallel workers
    # headroom. The application also pins the heaviest topology scans to a
    # non-parallel plan (see runtime_graph_repository::begin_topology_scan_tx)
    # so correctness never depends on this value alone.
    shm_size: ${IRONRAG_POSTGRES_SHM_SIZE:-256mb}
    environment:
      POSTGRES_PASSWORD: ${IRONRAG_POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${IRONRAG_POSTGRES_USER:-postgres}
      POSTGRES_DB: ${IRONRAG_POSTGRES_DB:-ironrag}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${IRONRAG_POSTGRES_USER:-postgres} -d ${IRONRAG_POSTGRES_DB:-ironrag}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql
    # Stateful relational store — strongly protected; a kill forces WAL
    # recovery on restart. Sacrificed only after every app container.
    oom_score_adj: -800
    deploy:
      resources:
        <<: *ironrag-resources-db
  redis:
    image: ${IRONRAG_REDIS_IMAGE:-redis:8.6}
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - "${IRONRAG_REDIS_MAXMEMORY:-512mb}"
      - --maxmemory-policy
      - volatile-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    # Stateful-ish cache — protected; rebuilding the graph/answer cache is
    # costly. Sacrificed only after every app container.
    oom_score_adj: -700
    deploy:
      resources:
        <<: *ironrag-resources-cache
  arangodb:
    image: ${IRONRAG_ARANGODB_IMAGE:-arangodb:3.12.4}
    restart: unless-stopped
    environment:
      ARANGO_ROOT_PASSWORD: ${IRONRAG_ARANGODB_PASSWORD:-ironrag-dev}
    command:
      - arangod
      - --server.authentication=true
      - --experimental-vector-index=true
      - --database.directory=/var/lib/arangodb3
      # Memory caps for small (≤ 8 GB) hosts. Without these, the default
      # per-AQL-query memory limit is auto-sized to roughly half the host
      # RAM (~4.6 GB on an 8 GB box) and five parallel queries can reserve
      # 23 GB of virtual memory under concurrent load, enough to
      # trigger the OOM killer on small hosts. 1 GB / query is
      # the minimum that survives the retrieval workload on a large
      # library: the vector-search + graph-traversal + full-scan diagnostic
      # queries all materialize candidate sets big enough that 256 MB
      # produced intermittent 500s on bench runs 2026-04-23. RocksDB buffers
      # and block cache are capped separately so ingest writes don't bloat
      # resident memory.
      - --query.memory-limit=1073741824
      - --query.cache-mode=demand
      - --rocksdb.block-cache-size=536870912
      - --rocksdb.total-write-buffer-size=268435456
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:8529/_db/_system/_admin/aardvark/index.html || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    expose:
      - "8529"
    volumes:
      - arangodb_data:/var/lib/arangodb3
    # Most-protected container: killing arangod mid-IVF-write caused the
    # crash loops in the 0.4.20 host-OOM incident. The kernel must pick this
    # last. Paired with the 5 GiB `vector` cap + fail-soft IVF nLists sizing.
    oom_score_adj: -900
    deploy:
      resources:
        <<: *ironrag-resources-vector
  startup:
    image: ${IRONRAG_BACKEND_IMAGE:-pipingspace/ironrag-backend:latest}
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      arangodb:
        condition: service_healthy
    stop_signal: SIGTERM
    stop_grace_period: 10m
    environment:
      <<: *ironrag-runtime-env
      IRONRAG_SERVICE_ROLE: startup
      IRONRAG_SERVICE_NAME: ironrag-startup
      OTEL_SERVICE_NAME: ironrag-startup
    # One-shot migrator; neutral OOM priority — it exits before steady state
    # so it does not co-reside under load.
    oom_score_adj: 0
    volumes:
      - content_storage_data:/var/lib/ironrag/content-storage
    deploy:
      resources:
        <<: *ironrag-resources-db
  backend:
    image: ${IRONRAG_BACKEND_IMAGE:-pipingspace/ironrag-backend:latest}
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 10m
    # Restartable, but a kill drops in-flight answer turns — sacrifice after
    # the worker and frontend, and well before any stateful store.
    oom_score_adj: 200
    depends_on:
      startup:
        condition: service_completed_successfully
    environment:
      <<: *ironrag-runtime-env
      IRONRAG_SERVICE_ROLE: api
      IRONRAG_SERVICE_NAME: ironrag-backend
      OTEL_SERVICE_NAME: ironrag-backend
    expose:
      - "8080"
    volumes:
      - content_storage_data:/var/lib/ironrag/content-storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/ready"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    deploy:
      resources:
        <<: *ironrag-resources-backend
  worker:
    image: ${IRONRAG_BACKEND_IMAGE:-pipingspace/ironrag-backend:latest}
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 10m
    # First sacrifice under memory pressure: the worker (and its docling/python
    # extraction children) is the largest non-stateful consumer, and its ingest
    # job simply requeues after a kill. +800 puts it firmly at the top of the
    # kernel's OOM-victim list, ahead of frontend (+400) and backend (+200).
    oom_score_adj: 800
    depends_on:
      startup:
        condition: service_completed_successfully
    environment:
      <<: *ironrag-runtime-env
      IRONRAG_SERVICE_ROLE: worker
      IRONRAG_SERVICE_NAME: ironrag-worker
      OTEL_SERVICE_NAME: ironrag-worker
    expose:
      - "8080"
    volumes:
      - content_storage_data:/var/lib/ironrag/content-storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/ready"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    deploy:
      resources:
        <<: *ironrag-resources-worker
  frontend:
    image: ${IRONRAG_FRONTEND_IMAGE:-pipingspace/ironrag-frontend:latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      IRONRAG_API_UPSTREAM: http://backend:8080
    ports:
      - "${IRONRAG_PORT:-19000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Stateless nginx + static SPA — trivially restartable; sacrifice right
    # after the worker and before the backend.
    oom_score_adj: 400
    deploy:
      resources:
        <<: *ironrag-resources-frontend
volumes:
  postgres_data:
  arangodb_data:
  content_storage_data:
