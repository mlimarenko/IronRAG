services:
  postgres:
    image: ${RUSTRAG_POSTGRES_IMAGE:-postgres:18-alpine}
    security_opt:
      - apparmor=unconfined
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      # postgres:18-alpine stores PGDATA under /var/lib/postgresql by default.
      # Mount the parent path to avoid anonymous volume allocation.
      - ./data/postgres:/var/lib/postgresql

  redis:
    image: ${RUSTRAG_REDIS_IMAGE:-redis:8.4}
    security_opt:
      - apparmor=unconfined
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
  arangodb:
    image: ${RUSTRAG_ARANGODB_IMAGE:-arangodb:3.12.4}
    security_opt:
      - apparmor=unconfined
    environment:
      ARANGO_ROOT_PASSWORD: ${RUSTRAG_ARANGODB_ROOT_PASSWORD:-rustrag-dev}
    command:
      - arangod
      - --server.authentication=true
      - --experimental-vector-index=true
      - --database.directory=/var/lib/arangodb3
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "arangosh --server.endpoint tcp://127.0.0.1:8529 --server.username root --server.password \"$$ARANGO_ROOT_PASSWORD\" --javascript.execute-string \"db._version()\" >/dev/null 2>&1 || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    expose:
      - "8529"
    volumes:
      - ./data/arangodb:/var/lib/arangodb3

  backend:
    image: ${RUSTRAG_BACKEND_IMAGE}
    security_opt:
      - apparmor=unconfined
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 10m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      arangodb:
        condition: service_healthy
    environment:
      bind_addr: 0.0.0.0:8080
      service_role: api
      service_name: rustrag-backend
      environment: production
      database_url: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      database_max_connections: ${RUSTRAG_DATABASE_MAX_CONNECTIONS:-20}
      redis_url: redis://redis:6379
      arangodb_url: http://arangodb:8529
      arangodb_database: ${RUSTRAG_ARANGODB_DATABASE:-rustrag}
      arangodb_username: ${RUSTRAG_ARANGODB_USERNAME:-root}
      arangodb_password: ${RUSTRAG_ARANGODB_PASSWORD:-rustrag-dev}
      arangodb_request_timeout_seconds: ${RUSTRAG_ARANGODB_REQUEST_TIMEOUT_SECONDS:-15}
      arangodb_bootstrap_collections: ${RUSTRAG_ARANGODB_BOOTSTRAP_COLLECTIONS:-true}
      arangodb_bootstrap_views: ${RUSTRAG_ARANGODB_BOOTSTRAP_VIEWS:-true}
      arangodb_bootstrap_graph: ${RUSTRAG_ARANGODB_BOOTSTRAP_GRAPH:-true}
      log_filter: ${RUSTRAG_LOG_FILTER:-info}
      frontend_origin: ${RUSTRAG_FRONTEND_ORIGIN:-https://graph.piping.space}
      bootstrap_token: ${RUSTRAG_BOOTSTRAP_TOKEN:-bootstrap-local}
      ui_bootstrap_admin_login: ${RUSTRAG_UI_BOOTSTRAP_ADMIN_LOGIN:-}
      ui_bootstrap_admin_password: ${RUSTRAG_UI_BOOTSTRAP_ADMIN_PASSWORD:-}
      ui_bootstrap_admin_api_token: ${RUSTRAG_UI_BOOTSTRAP_ADMIN_API_TOKEN:-}
      content_storage_root: /var/lib/rustrag/content-storage
      RUST_BACKTRACE: full
    expose:
      - "8080"
    ports:
      - "${BACKEND_PORT:-18080}:8080"
    volumes:
      - ./data/content-storage:/var/lib/rustrag/content-storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    image: ${RUSTRAG_BACKEND_IMAGE}
    security_opt:
      - apparmor=unconfined
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 10m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      arangodb:
        condition: service_healthy
    environment:
      service_role: worker
      bind_addr: 0.0.0.0:8080
      service_name: rustrag-worker
      environment: production
      database_url: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      database_max_connections: ${RUSTRAG_DATABASE_MAX_CONNECTIONS:-20}
      redis_url: redis://redis:6379
      arangodb_url: http://arangodb:8529
      arangodb_database: ${RUSTRAG_ARANGODB_DATABASE:-rustrag}
      arangodb_username: ${RUSTRAG_ARANGODB_USERNAME:-root}
      arangodb_password: ${RUSTRAG_ARANGODB_PASSWORD:-rustrag-dev}
      arangodb_request_timeout_seconds: ${RUSTRAG_ARANGODB_REQUEST_TIMEOUT_SECONDS:-15}
      arangodb_bootstrap_collections: ${RUSTRAG_ARANGODB_BOOTSTRAP_COLLECTIONS:-true}
      arangodb_bootstrap_views: ${RUSTRAG_ARANGODB_BOOTSTRAP_VIEWS:-true}
      arangodb_bootstrap_graph: ${RUSTRAG_ARANGODB_BOOTSTRAP_GRAPH:-true}
      log_filter: ${RUSTRAG_LOG_FILTER:-info}
      frontend_origin: ${RUSTRAG_FRONTEND_ORIGIN:-https://graph.piping.space}
      bootstrap_token: ${RUSTRAG_BOOTSTRAP_TOKEN:-bootstrap-local}
      ui_bootstrap_admin_login: ${RUSTRAG_UI_BOOTSTRAP_ADMIN_LOGIN:-}
      ui_bootstrap_admin_password: ${RUSTRAG_UI_BOOTSTRAP_ADMIN_PASSWORD:-}
      ui_bootstrap_admin_api_token: ${RUSTRAG_UI_BOOTSTRAP_ADMIN_API_TOKEN:-}
      content_storage_root: /var/lib/rustrag/content-storage
      RUST_BACKTRACE: full
    volumes:
      - ./data/content-storage:/var/lib/rustrag/content-storage
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s

  frontend:
    image: ${RUSTRAG_FRONTEND_IMAGE}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: ${RUSTRAG_NGINX_IMAGE:-nginx:1.28-alpine}
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
      - arangodb
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${FRONTEND_PORT:-13000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
