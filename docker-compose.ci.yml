services:
  postgres:
    image: ${RUSTRAG_POSTGRES_IMAGE:-pgvector/pgvector:0.8.2-pg18-trixie}
    security_opt:
      - apparmor=unconfined
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "10.0.1.109:${POSTGRES_PORT:-55432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql

  redis:
    image: ${RUSTRAG_REDIS_IMAGE:-redis:8.4}
    security_opt:
      - apparmor=unconfined
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "10.0.1.109:${REDIS_PORT:-56379}:6379"

  neo4j:
    image: ${RUSTRAG_NEO4J_IMAGE:-neo4j:5.26.0}
    security_opt:
      - apparmor=unconfined
    environment:
      NEO4J_AUTH: ${RUSTRAG_NEO4J_AUTH:-neo4j/rustrag-dev}
      NEO4J_server_memory_pagecache_size: ${RUSTRAG_NEO4J_PAGECACHE_SIZE:-256M}
      NEO4J_server_memory_heap_initial__size: ${RUSTRAG_NEO4J_HEAP_INITIAL_SIZE:-256M}
      NEO4J_server_memory_heap_max__size: ${RUSTRAG_NEO4J_HEAP_MAX_SIZE:-256M}
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u ${RUSTRAG_NEO4J_USERNAME:-neo4j} -p ${RUSTRAG_NEO4J_PASSWORD:-rustrag-dev} 'RETURN 1;' >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
    ports:
      - "10.0.1.109:${NEO4J_BOLT_PORT:-57687}:7687"
    volumes:
      - ./data/neo4j:/data

  backend:
    image: ${RUSTRAG_BACKEND_IMAGE}
    security_opt:
      - apparmor=unconfined
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      bind_addr: 0.0.0.0:8080
      service_name: rustrag-backend
      environment: production
      database_url: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      database_max_connections: ${RUSTRAG_DATABASE_MAX_CONNECTIONS:-20}
      redis_url: redis://redis:6379
      neo4j_uri: neo4j:7687
      neo4j_username: ${RUSTRAG_NEO4J_USERNAME:-neo4j}
      neo4j_password: ${RUSTRAG_NEO4J_PASSWORD:-rustrag-dev}
      neo4j_database: ${RUSTRAG_NEO4J_DATABASE:-neo4j}
      neo4j_max_connections: ${RUSTRAG_NEO4J_MAX_CONNECTIONS:-16}
      log_filter: ${RUSTRAG_LOG_FILTER:-info}
      frontend_origin: ${RUSTRAG_FRONTEND_ORIGIN:-https://lightrag.piping.space}
      bootstrap_token: ${RUSTRAG_BOOTSTRAP_TOKEN:-bootstrap-local}
      openai_api_key: ${RUSTRAG_OPENAI_API_KEY:-}
      deepseek_api_key: ${RUSTRAG_DEEPSEEK_API_KEY:-}
      qwen_api_key: ${RUSTRAG_QWEN_API_KEY:-}
      qwen_api_base_url: ${RUSTRAG_QWEN_API_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      ingestion_worker_concurrency: ${RUSTRAG_INGESTION_WORKER_CONCURRENCY:-4}
      runtime_default_indexing_provider: ${RUSTRAG_RUNTIME_DEFAULT_INDEXING_PROVIDER:-openai}
      runtime_default_indexing_model: ${RUSTRAG_RUNTIME_DEFAULT_INDEXING_MODEL:-gpt-5-mini}
      runtime_default_embedding_provider: ${RUSTRAG_RUNTIME_DEFAULT_EMBEDDING_PROVIDER:-openai}
      runtime_default_embedding_model: ${RUSTRAG_RUNTIME_DEFAULT_EMBEDDING_MODEL:-text-embedding-3-large}
      runtime_default_answer_provider: ${RUSTRAG_RUNTIME_DEFAULT_ANSWER_PROVIDER:-openai}
      runtime_default_answer_model: ${RUSTRAG_RUNTIME_DEFAULT_ANSWER_MODEL:-gpt-5.4}
      runtime_default_vision_provider: ${RUSTRAG_RUNTIME_DEFAULT_VISION_PROVIDER:-openai}
      runtime_default_vision_model: ${RUSTRAG_RUNTIME_DEFAULT_VISION_MODEL:-gpt-5-mini}
      runtime_live_validation_enabled: ${RUSTRAG_RUNTIME_LIVE_VALIDATION_ENABLED:-true}
      qwen_input_price_per_1m: ${RUSTRAG_QWEN_INPUT_PRICE_PER_1M:-0.07}
      qwen_chat_input_price_per_1m: ${RUSTRAG_QWEN_CHAT_INPUT_PRICE_PER_1M:-0}
      qwen_chat_output_price_per_1m: ${RUSTRAG_QWEN_CHAT_OUTPUT_PRICE_PER_1M:-0}
      qwen_vision_input_price_per_1m: ${RUSTRAG_QWEN_VISION_INPUT_PRICE_PER_1M:-0}
      qwen_vision_output_price_per_1m: ${RUSTRAG_QWEN_VISION_OUTPUT_PRICE_PER_1M:-0}
      RUST_BACKTRACE: full
    ports:
      - "10.0.1.109:${BACKEND_PORT:-18080}:8080"

  frontend:
    image: ${RUSTRAG_FRONTEND_IMAGE}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "10.0.1.109:${FRONTEND_PORT:-13000}:3000"
