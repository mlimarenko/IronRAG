name: Release Docker Images
run-name: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker tag for both images (e.g. v0.1.0)"
        required: true
        type: string
      push_latest:
        description: "Also push the latest tag"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-docker-images-${{ github.event.release.tag_name || github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: pipingspace/ironrag-backend
            context: .
            file: apps/api/Dockerfile
            gha_scope: ironrag-backend
          - name: frontend
            image: pipingspace/ironrag-frontend
            context: apps/web
            file: apps/web/Dockerfile
            gha_scope: ironrag-frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}
            type=raw,value=latest,enable=${{ (github.event_name == 'release' && github.event.release.prerelease == false) || (github.event_name == 'workflow_dispatch' && github.event.inputs.push_latest) }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}
          cache-from: type=gha,scope=${{ matrix.gha_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.gha_scope }}
