# Large-host overlay for IronRAG (24-32 GiB VM).
#
# The base docker-compose.yml is sized for a 16 GiB swapless host: its steady
# memory-limit sum is ~14.0 GiB (see the "Memory containment" header there).
# Layer this overlay on a bigger box to restore the wider arango/backend/worker
# caps that big corpora need:
#
#   docker compose -f docker-compose.yml -f docker-compose.large.yml up -d
#
# It only deep-merges `deploy.resources.limits.memory` (cpus and reservations
# are inherited from the base anchors) and raises the IVF k-means training
# budget in lock-step with the larger Arango cap — never raise the budget
# without raising the cap (see the multi-dim vector-layer policy in CLAUDE.md
# and the budget header in docker-compose.yml).
#
#   service     base → large    note
#   arangodb    5120M → 6144M   vector tier: fits a larger per-(library,dim)
#                               IVF build (idle ~1.5 GiB + 4 GiB budget peak)
#   backend     3584M → 4096M   wider concurrent-turn headroom
#   worker      3072M → 4096M   restores the old docling ceiling
#
# Large-host steady Σ:
#   6144 + 4096 + 4096 + 1536 (postgres) + 768 (redis) + 256 (frontend)
#   = 16896 MiB ≈ 16.5 GiB — comfortable on a 24-32 GiB host.
#
# The training budget (default 4 GB here vs 3 GB in the base) stays env-
# overridable: export IRONRAG_VECTOR_INDEX_TRAINING_BUDGET_BYTES to tune it
# further without editing this file. nLists cap = budget / 50 MB-per-list,
# so 4 GB → 80 lists; idle 1.5 GiB + 4 GiB build = 5.5 GiB peak < 6 GiB cap.

services:
  arangodb:
    deploy:
      resources:
        limits:
          memory: 6144M

  backend:
    environment:
      IRONRAG_VECTOR_INDEX_TRAINING_BUDGET_BYTES: ${IRONRAG_VECTOR_INDEX_TRAINING_BUDGET_BYTES:-4000000000}
    deploy:
      resources:
        limits:
          memory: 4096M

  worker:
    environment:
      IRONRAG_VECTOR_INDEX_TRAINING_BUDGET_BYTES: ${IRONRAG_VECTOR_INDEX_TRAINING_BUDGET_BYTES:-4000000000}
    deploy:
      resources:
        limits:
          memory: 4096M

  # The one-shot migrator also runs ArangoDB bootstrap (which builds the vector
  # indexes), so it needs the same budget as the long-lived app containers.
  startup:
    environment:
      IRONRAG_VECTOR_INDEX_TRAINING_BUDGET_BYTES: ${IRONRAG_VECTOR_INDEX_TRAINING_BUDGET_BYTES:-4000000000}
