---
- name: Deploy RustRAG service to target host
  hosts: all
  gather_facts: false
  vars:
    deploy_path: "{{ lookup('env', 'DEPLOY_PATH') | default('/opt/docker/rustrag', true) }}"
    compose_file: "{{ lookup('env', 'COMPOSE_FILE') | default(deploy_path ~ '/docker-compose.yml', true) }}"
    env_file: "{{ lookup('env', 'ENV_FILE') | default(deploy_path ~ '/.env', true) }}"
    image_env_file: "{{ lookup('env', 'IMAGE_ENV_FILE') | default(deploy_path ~ '/.images.env', true) }}"
    service_name: "{{ lookup('env', 'APP_SERVICE_NAME') | default('rustrag', true) }}"
    compose_project: "{{ lookup('env', 'APP_COMPOSE_PROJECT') | default('rustrag', true) }}"
    image_env_var: "{{ lookup('env', 'APP_IMAGE_ENV_VAR') | default('RUSTRAG_IMAGE', true) }}"
    deploy_image: "{{ lookup('env', 'DEPLOY_IMAGE') | default('', true) }}"
    registry_url: "{{ lookup('env', 'CI_REGISTRY') | default('', true) }}"
    registry_user: "{{ lookup('env', 'CI_REGISTRY_USER') | default('', true) }}"
    registry_password: "{{ lookup('env', 'CI_REGISTRY_PASSWORD') | default('', true) }}"
    deploy_become: "{{ (lookup('env', 'DEPLOY_BECOME') | default('false', true)) | bool }}"
    deploy_lock_file: "{{ lookup('env', 'DEPLOY_LOCK_FILE') | default('/var/lock/rustrag-compose-deploy.lock', true) }}"
    compose_cmd:
      - docker
      - compose
      - -p
      - "{{ compose_project }}"
      - --env-file
      - "{{ env_file }}"
      - --env-file
      - "{{ image_env_file }}"
      - -f
      - "{{ compose_file }}"

  become: "{{ deploy_become }}"

  tasks:
    - name: Ensure deploy path exists
      ansible.builtin.file:
        path: "{{ deploy_path }}"
        state: directory
        mode: "0755"

    - name: Ensure compose file exists on target host
      ansible.builtin.stat:
        path: "{{ compose_file }}"
      register: compose_file_stat

    - name: Fail when compose file is missing on target host
      ansible.builtin.fail:
        msg: "Compose file not found at {{ compose_file }} on target host"
      when: not compose_file_stat.stat.exists

    - name: Ensure env file exists on target host
      ansible.builtin.stat:
        path: "{{ env_file }}"
      register: env_file_stat

    - name: Fail when env file is missing on target host
      ansible.builtin.fail:
        msg: ".env not found at {{ env_file }} on target host"
      when: not env_file_stat.stat.exists

    - name: Fail when deploy image is missing
      ansible.builtin.fail:
        msg: "DEPLOY_IMAGE is required"
      when: deploy_image | length == 0

    - name: Validate compose service and image env var names
      ansible.builtin.assert:
        that:
          - service_name is match('^[A-Za-z0-9][A-Za-z0-9_.-]*$')
          - image_env_var is match('^[A-Za-z_][A-Za-z0-9_]*$')
        fail_msg: "APP_SERVICE_NAME or APP_IMAGE_ENV_VAR contains unsafe characters"

    - name: Fail when GitLab registry credentials are missing
      ansible.builtin.fail:
        msg: "CI_REGISTRY / CI_REGISTRY_USER / CI_REGISTRY_PASSWORD are required"
      when: registry_url | length == 0 or registry_user | length == 0 or registry_password | length == 0

    - name: Login host Docker daemon to GitLab registry
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          echo "{{ registry_password }}" | docker login "{{ registry_url }}" -u "{{ registry_user }}" --password-stdin
        executable: /bin/bash
      no_log: true

    - name: Pin deploy image tag
      ansible.builtin.lineinfile:
        path: "{{ image_env_file }}"
        regexp: "^{{ image_env_var }}="
        line: "{{ image_env_var }}={{ deploy_image }}"
        create: true
        mode: "0600"

    - name: Validate compose configuration for target service
      ansible.builtin.command:
        argv: "{{ compose_cmd + ['config', '--services'] }}"
        chdir: "{{ deploy_path }}"
      register: compose_services
      changed_when: false

    - name: Fail when target service is missing from compose file
      ansible.builtin.fail:
        msg: "Service '{{ service_name }}' not found in {{ compose_file }}"
      when: service_name not in compose_services.stdout_lines

    - name: Pull application image
      ansible.builtin.command:
        argv: "{{ compose_cmd + ['pull', service_name] }}"
        chdir: "{{ deploy_path }}"

    - name: Restart application service from pulled image
      ansible.builtin.shell:
        cmd: >-
          flock {{ deploy_lock_file | quote }}
          docker compose
          -p {{ compose_project | quote }}
          --env-file {{ env_file | quote }}
          --env-file {{ image_env_file | quote }}
          -f {{ compose_file | quote }}
          up -d --no-deps --no-build {{ service_name | quote }}
        chdir: "{{ deploy_path }}"
        executable: /bin/bash

    - name: Show compose status for application service
      ansible.builtin.command:
        argv: "{{ compose_cmd + ['ps', service_name] }}"
        chdir: "{{ deploy_path }}"
      changed_when: false
