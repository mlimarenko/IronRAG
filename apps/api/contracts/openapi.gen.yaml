    LibraryDocumentMetrics:
      type: object
      description: |-
        Canonical per-library document metrics — one authoritative shape for all surfaces.

        Every surface (`/ops/libraries/{id}/dashboard`,
        `/content/libraries/{id}/documents?includeTotal=true`,
        `/knowledge/libraries/{id}/summary`) MUST read from this shape.

        Invariants enforced by the canonical aggregator:
          * `total == ready + processing + queued + failed + canceled`
          * `graph_ready + graph_sparse == ready` (graph readiness is a
            split of the ready bucket; it does not overlap with processing
            / queued / failed / canceled).

        `in_flight` is intentionally NOT a field on this struct — it is a
        derived value `processing + queued`. Adding it would invite the
        same kind of double-counting drift we just finished removing.
      required:
      - total
      - ready
      - processing
      - queued
      - failed
      - canceled
      - graphReady
      - graphSparse
      - recomputedAt
      properties:
        canceled:
          type: integer
          format: int64
          description: Documents whose current attempt was canceled or superseded.
        failed:
          type: integer
          format: int64
          description: Documents whose current attempt failed.
        graphReady:
          type: integer
          format: int64
          description: Ready documents with complete graph materialization.
        graphSparse:
          type: integer
          format: int64
          description: Ready documents with sparse graph materialization.
        processing:
          type: integer
          format: int64
          description: Documents with an active worker attempt.
        queued:
          type: integer
          format: int64
          description: Documents waiting for a worker attempt.
        ready:
          type: integer
          format: int64
          description: Successfully ingested documents.
        recomputedAt:
          type: string
          format: date-time
          description: Time at which the aggregate was recomputed.
        total:
          type: integer
          format: int64
          description: Sum of all mutually exclusive lifecycle buckets.
