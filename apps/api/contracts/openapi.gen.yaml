    AssistantReferenceSummary:
      type: object
      description: |-
        Cardinality metadata for a user-facing projection of assistant evidence.

        Query execution storage and operator debug endpoints retain the complete
        evidence set. Interactive UI surfaces may return a deterministic bounded
        projection and use this summary to report how much durable evidence exists.
      required:
      - totalCount
      - returnedCount
      - truncated
      properties:
        returnedCount:
          type: integer
          description: Number of references included in this response.
          minimum: 0
        totalCount:
          type: integer
          description: Number of durable references available before projection limits.
          minimum: 0
        truncated:
          type: boolean
          description: Whether additional references were omitted from the response.
    AssistantRelationReference:
