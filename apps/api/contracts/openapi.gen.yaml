openapi: 3.1.0
info:
  title: IronRAG API
  description: Public HTTP API for the IronRAG service (`apps/api/src/interfaces/http`). Operation paths include the `/v1` prefix. `servers.url` is the API origin without the `/v1` suffix.
  license:
    name: MIT
    identifier: MIT
  version: 0.5.11
servers:
- url: /
  description: Same origin (paths include /v1)
paths:
  /v1/admin/surface:
    get:
      tags:
      - admin
      summary: Get admin surface.
      description: Returns the admin shell aggregate. The admin UI uses this endpoint to load configuration, readiness, IAM, and model-catalog state with fewer round trips. Call it when the caller already has the resource identifier and needs the latest authorized server view.
      operationId: getAdminSurface
      responses:
        '200':
          description: Admin surface for the authenticated principal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSurface'
        '401':
          description: Caller is not authenticated
  /v1/ai/accounts:
    get:
      tags:
      - ai
      summary: List ai accounts.
      description: Manages stored AI provider accounts used by runtime bindings. Use these endpoints from the admin UI or automation when registering, rotating, or listing provider secrets without exposing secret material in responses. Call it for paginated or filtered table views. Prefer server-side filters and cursors over fetching broad result sets into the client.
      operationId: listAiAccounts
      parameters:
      - name: scopeKind
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/AiScopeKind'
      - name: workspaceId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: libraryId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Visible AI accounts for the requested scope
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AiAccountResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the requested scope
    post:
      tags:
      - ai
      summary: Create ai account.
      description: Manages stored AI provider accounts used by runtime bindings. Use these endpoints from the admin UI or automation when registering, rotating, or listing provider secrets without exposing secret material in responses. Call it to create work or submit a command. Some commands complete synchronously, while ingest, mutation, and runtime work can continue asynchronously.
      operationId: createAiAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAiAccountRequest'
        required: true
      responses:
        '201':
          description: Newly created AI account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiAccountResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer accounts in the requested scope
  /v1/ai/accounts/{accountId}:
    get:
      tags:
      - ai
      summary: Get ai account.
      description: Manages stored AI provider accounts used by runtime bindings. Use these endpoints from the admin UI or automation when registering, rotating, or listing provider secrets without exposing secret material in responses. Call it when the caller already has the resource identifier and needs the latest authorized server view.
      operationId: getAiAccount
      parameters:
      - name: accountId
        in: path
        description: AI account identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: AI account (secret redacted, same as the list view)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiAccountResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot view accounts in the account's scope
        '404':
          description: Account not found
    delete:
      tags:
      - ai
      summary: Delete ai account.
      description: Manages stored AI provider accounts used by runtime bindings. Use these endpoints from the admin UI or automation when registering, rotating, or listing provider secrets without exposing secret material in responses. Call it to remove or revoke a resource. Destructive operations are authorized, audited, and may return an asynchronous operation when cleanup continues in the background.
      operationId: deleteAiAccount
      parameters:
      - name: accountId
        in: path
        description: AI account identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Account deleted
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer accounts in the account's scope
        '404':
          description: Account not found
        '409':
          description: Account is still referenced
    patch:
      tags:
      - ai
      summary: Update ai account.
      description: Manages stored AI provider accounts used by runtime bindings. Use these endpoints from the admin UI or automation when registering, rotating, or listing provider secrets without exposing secret material in responses. Call it to replace or partially update server-owned configuration. The request body is validated before changes are persisted.
      operationId: updateAiAccount
      parameters:
      - name: accountId
        in: path
        description: AI account identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAiAccountRequest'
        required: true
      responses:
        '200':
          description: Updated AI account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiAccountResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer accounts in the account's scope
        '404':
          description: Account not found
  /v1/ai/bindings:
    get:
      tags:
      - ai
      summary: List ai library bindings.
      description: Manages library-level AI runtime bindings. A binding assigns an account and model to a purpose (embedding, query answering, graph extraction, and other AI purposes) for one library, with tuning parameters (system prompt, temperature, top-p, output token budget) stored inline. Call it for paginated or filtered table views. Prefer server-side filters and cursors over fetching broad result sets into the client.
      operationId: listAiLibraryBindings
      parameters:
      - name: scopeKind
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/AiScopeKind'
      - name: workspaceId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: libraryId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Bindings for the requested scope
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AiBindingResponse'
        '400':
          description: scopeKind query parameter is required
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the requested scope
    post:
      tags:
      - ai
      summary: Create ai library binding.
      description: Manages library-level AI runtime bindings. A binding assigns an account and model to a purpose (embedding, query answering, graph extraction, and other AI purposes) for one library, with tuning parameters (system prompt, temperature, top-p, output token budget) stored inline. Call it to create work or submit a command. Some commands complete synchronously, while ingest, mutation, and runtime work can continue asynchronously.
      operationId: createAiLibraryBinding
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAiBindingRequest'
        required: true
      responses:
        '201':
          description: Newly created binding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiBindingResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer bindings in the requested scope
  /v1/ai/bindings/{bindingId}:
    get:
      tags:
      - ai
      summary: Get ai library binding.
      description: Manages library-level AI runtime bindings. A binding assigns an account and model to a purpose (embedding, query answering, graph extraction, and other AI purposes) for one library, with tuning parameters (system prompt, temperature, top-p, output token budget) stored inline. Call it when the caller already has the resource identifier and needs the latest authorized server view.
      operationId: getAiLibraryBinding
      parameters:
      - name: bindingId
        in: path
        description: Binding identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Binding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiBindingResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot view bindings in the binding's scope
        '404':
          description: Binding not found
    delete:
      tags:
      - ai
      summary: Delete ai library binding.
      description: Manages library-level AI runtime bindings. A binding assigns an account and model to a purpose (embedding, query answering, graph extraction, and other AI purposes) for one library, with tuning parameters (system prompt, temperature, top-p, output token budget) stored inline. Call it to remove or revoke a resource. Destructive operations are authorized, audited, and may return an asynchronous operation when cleanup continues in the background.
      operationId: deleteAiLibraryBinding
      parameters:
      - name: bindingId
        in: path
        description: Binding identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Binding deleted
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer bindings in the binding's scope
        '404':
          description: Binding not found
    patch:
      tags:
      - ai
      summary: Update ai library binding.
      description: Manages library-level AI runtime bindings. A binding assigns an account and model to a purpose (embedding, query answering, graph extraction, and other AI purposes) for one library, with tuning parameters (system prompt, temperature, top-p, output token budget) stored inline. Call it to replace or partially update server-owned configuration. The request body is validated before changes are persisted.
      operationId: updateAiLibraryBinding
      parameters:
      - name: bindingId
        in: path
        description: Binding identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAiBindingRequest'
        required: true
      responses:
        '200':
          description: Updated binding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiBindingResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer bindings in the binding's scope
        '404':
          description: Binding not found
  /v1/ai/bindings/{bindingId}/validations:
    get:
      tags:
      - ai
      summary: List ai binding validations.
      description: Manages library-level AI runtime bindings. A binding assigns an account and model to a purpose (embedding, query answering, graph extraction, and other AI purposes) for one library, with tuning parameters (system prompt, temperature, top-p, output token budget) stored inline. Call it for paginated or filtered table views. Prefer server-side filters and cursors over fetching broad result sets into the client.
      operationId: listAiBindingValidations
      parameters:
      - name: bindingId
        in: path
        description: Binding identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Validation attempt history for the binding, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BindingValidationResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot view validations in the binding's scope
        '404':
          description: Binding not found
    post:
      tags:
      - ai
      summary: |-
        Creates a binding-validation attempt. Resource-shaped replacement for the
        former RPC-verb `POST .../validate`: the handler already created a real
        record with a `pending` → `succeeded`/`failed` lifecycle (`ai_binding_validation`,
        unchanged by this redesign); the defect was the unpollable verb-shaped
        form, not the underlying action. `Location` points at the created
        validation's own item-read endpoint below.
      description: Manages library-level AI runtime bindings. A binding assigns an account and model to a purpose (embedding, query answering, graph extraction, and other AI purposes) for one library, with tuning parameters (system prompt, temperature, top-p, output token budget) stored inline. Call it to create work or submit a command. Some commands complete synchronously, while ingest, mutation, and runtime work can continue asynchronously.
      operationId: createAiBindingValidation
      parameters:
      - name: bindingId
        in: path
        description: Binding identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '201':
          description: Binding validation attempt created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BindingValidationResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot validate bindings in the binding's scope
        '404':
          description: Binding not found
  /v1/ai/bindings/{bindingId}/validations/{validationId}:
    get:
      tags:
      - ai
      summary: Get ai binding validation.
      description: Manages library-level AI runtime bindings. A binding assigns an account and model to a purpose (embedding, query answering, graph extraction, and other AI purposes) for one library, with tuning parameters (system prompt, temperature, top-p, output token budget) stored inline. Call it when the caller already has the resource identifier and needs the latest authorized server view.
      operationId: getAiBindingValidation
      parameters:
      - name: bindingId
        in: path
        description: Binding identifier
        required: true
        schema:
          type: string
          format: uuid
      - name: validationId
        in: path
        description: Binding validation attempt identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Binding validation outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BindingValidationResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot view validations in the binding's scope
        '404':
          description: Binding or validation not found
  /v1/ai/models:
    get:
      tags:
      - ai
      summary: List ai models.
      description: Reads the AI provider catalog used by the admin configuration screens. Operators use this metadata to choose providers, models, capabilities, and binding targets. Call it for paginated or filtered table views. Prefer server-side filters and cursors over fetching broad result sets into the client.
      operationId: listAiModels
      parameters:
      - name: providerCatalogId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: workspaceId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: libraryId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: accountId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Resolved AI models for the requested context
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModelCatalogEntryResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot view the requested workspace/library
    post:
      tags:
      - ai
      summary: Create ai model.
      description: Reads the AI provider catalog used by the admin configuration screens. Operators use this metadata to choose providers, models, capabilities, and binding targets. Call it to create work or submit a command. Some commands complete synchronously, while ingest, mutation, and runtime work can continue asynchronously.
      operationId: createAiModel
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModelCatalogRequest'
        required: true
      responses:
        '201':
          description: Newly created AI model catalog entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelCatalogEntryResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not a system administrator
  /v1/ai/models/{modelId}:
    get:
      tags:
      - ai
      summary: Get ai model.
      description: Reads the AI provider catalog used by the admin configuration screens. Operators use this metadata to choose providers, models, capabilities, and binding targets. Call it when the caller already has the resource identifier and needs the latest authorized server view.
      operationId: getAiModel
      parameters:
      - name: modelId
        in: path
        description: AI model catalog identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: AI model catalog entry with its resolved availability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelCatalogEntryResponse'
        '401':
          description: Caller is not authenticated
        '404':
          description: Model not found
    delete:
      tags:
      - ai
      summary: |-
        Real hard delete; 409 when a price override or binding still references
        this model. The reversible pause is `PATCH {lifecycleState:"disabled"}`
        above — the two are distinct operations, not two paths to the same
        result.
      description: Reads the AI provider catalog used by the admin configuration screens. Operators use this metadata to choose providers, models, capabilities, and binding targets. Call it to remove or revoke a resource. Destructive operations are authorized, audited, and may return an asynchronous operation when cleanup continues in the background.
      operationId: deleteAiModel
      parameters:
      - name: modelId
        in: path
        description: AI model catalog identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Model catalog entry deleted
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not a system administrator
        '404':
          description: Model not found
        '409':
          description: Model is still referenced by a price override or binding
    patch:
      tags:
      - ai
      summary: Update ai model.
      description: Reads the AI provider catalog used by the admin configuration screens. Operators use this metadata to choose providers, models, capabilities, and binding targets. Call it to replace or partially update server-owned configuration. The request body is validated before changes are persisted.
      operationId: updateAiModel
      parameters:
      - name: modelId
        in: path
        description: AI model catalog identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateModelCatalogRequest'
        required: true
      responses:
        '200':
          description: Updated AI model catalog entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelCatalogEntryResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not a system administrator
        '404':
          description: Model not found
  /v1/ai/price-overrides:
    post:
      tags:
      - ai
      summary: Create ai price override.
      description: Manages AI price catalog overrides. Billing and cost dashboards use these rows to attribute provider calls and estimate execution cost. Call it to create work or submit a command. Some commands complete synchronously, while ingest, mutation, and runtime work can continue asynchronously.
      operationId: createAiPriceOverride
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspacePriceOverrideRequest'
        required: true
      responses:
        '201':
          description: Newly created workspace price override
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceCatalogEntryResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer pricing for the workspace
  /v1/ai/price-overrides/{overrideId}:
    get:
      tags:
      - ai
      summary: Get ai price override.
      description: Manages AI price catalog overrides. Billing and cost dashboards use these rows to attribute provider calls and estimate execution cost. Call it when the caller already has the resource identifier and needs the latest authorized server view.
      operationId: getAiPriceOverride
      parameters:
      - name: overrideId
        in: path
        description: Price catalog entry identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Price catalog entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceCatalogEntryResponse'
        '401':
          description: Caller is not authenticated
        '404':
          description: Price override not found
    delete:
      tags:
      - ai
      summary: Delete ai price override.
      description: Manages AI price catalog overrides. Billing and cost dashboards use these rows to attribute provider calls and estimate execution cost. Call it to remove or revoke a resource. Destructive operations are authorized, audited, and may return an asynchronous operation when cleanup continues in the background.
      operationId: deleteAiPriceOverride
      parameters:
      - name: overrideId
        in: path
        description: Price catalog entry identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Price override deleted
        '400':
          description: System catalog prices are read-only
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer pricing for the workspace
        '404':
          description: Price override not found
        '409':
          description: Price override is still referenced
    patch:
      tags:
      - ai
      summary: Update ai price override.
      description: Manages AI price catalog overrides. Billing and cost dashboards use these rows to attribute provider calls and estimate execution cost. Call it to replace or partially update server-owned configuration. The request body is validated before changes are persisted.
      operationId: updateAiPriceOverride
      parameters:
      - name: overrideId
        in: path
        description: Price catalog entry identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspacePriceOverrideRequest'
        required: true
      responses:
        '200':
          description: Updated workspace price override
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceCatalogEntryResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer pricing for the workspace
        '404':
          description: Price override not found
  /v1/ai/prices:
    get:
      tags:
      - ai
      summary: List ai prices.
      description: Manages AI price catalog overrides. Billing and cost dashboards use these rows to attribute provider calls and estimate execution cost. Call it for paginated or filtered table views. Prefer server-side filters and cursors over fetching broad result sets into the client.
      operationId: listAiPrices
      parameters:
      - name: modelCatalogId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: workspaceId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Price catalog entries for the requested model/workspace
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PriceCatalogEntryResponse'
        '401':
          description: Caller is not authenticated
  /v1/ai/providers:
    get:
      tags:
      - ai
      summary: List ai providers.
      description: Reads the AI provider catalog used by the admin configuration screens. Operators use this metadata to choose providers, models, capabilities, and binding targets. Call it for paginated or filtered table views. Prefer server-side filters and cursors over fetching broad result sets into the client.
      operationId: listAiProviders
      responses:
        '200':
          description: Available AI providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProviderCatalogEntryResponse'
        '401':
          description: Caller is not authenticated
    post:
      tags:
      - ai
      summary: Create ai provider.
      description: Reads the AI provider catalog used by the admin configuration screens. Operators use this metadata to choose providers, models, capabilities, and binding targets. Call it to create work or submit a command. Some commands complete synchronously, while ingest, mutation, and runtime work can continue asynchronously.
      operationId: createAiProvider
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProviderCatalogRequest'
        required: true
      responses:
        '201':
          description: Newly created AI provider catalog entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderCatalogEntryResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not a system administrator
  /v1/ai/providers/{providerId}:
    get:
      tags:
      - ai
      summary: Get ai provider.
      description: Reads the AI provider catalog used by the admin configuration screens. Operators use this metadata to choose providers, models, capabilities, and binding targets. Call it when the caller already has the resource identifier and needs the latest authorized server view.
      operationId: getAiProvider
      parameters:
      - name: providerId
        in: path
        description: AI provider catalog identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: AI provider catalog entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderCatalogEntryResponse'
        '401':
          description: Caller is not authenticated
        '404':
          description: Provider not found
    delete:
      tags:
      - ai
      summary: |-
        Real hard delete; 409 when a model still references this provider. The
        reversible pause is `PATCH {lifecycleState:"disabled"}` above — the two
        are distinct operations (obtained by not deleting FK references but
        blocking on them), not two paths to the same result.
      description: Reads the AI provider catalog used by the admin configuration screens. Operators use this metadata to choose providers, models, capabilities, and binding targets. Call it to remove or revoke a resource. Destructive operations are authorized, audited, and may return an asynchronous operation when cleanup continues in the background.
      operationId: deleteAiProvider
      parameters:
      - name: providerId
        in: path
        description: AI provider catalog identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Provider catalog entry deleted
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not a system administrator
        '404':
          description: Provider not found
        '409':
          description: Provider is still referenced by a model
    patch:
      tags:
      - ai
      summary: Update ai provider.
      description: Reads the AI provider catalog used by the admin configuration screens. Operators use this metadata to choose providers, models, capabilities, and binding targets. Call it to replace or partially update server-owned configuration. The request body is validated before changes are persisted.
      operationId: updateAiProvider
      parameters:
      - name: providerId
