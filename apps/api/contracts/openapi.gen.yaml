        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Assistant session turn
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantTurn'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the session
        '404':
          description: Session or turn not found
  /v1/query/system-prompt:
    get:
      tags:
      - query
      summary: Get the recommended MCP assistant system prompt.
      description: Returns the exact prompt text used by the built-in UI assistant and recommended for external MCP clients. The template teaches a generic tool-using agent how to choose IronRAG tools, pass conversation history, iterate over results, prefer high-signal grounded-answer probes for content questions, and avoid answering from catalog titles alone. Pass `libraryId` when the caller wants the same template rendered with a concrete `<workspace>/<library>` reference for copy-paste setup. Omit it to fetch only the reusable template with the `{LIBRARY_REF}` placeholder.
      operationId: getAssistantSystemPrompt
      parameters:
      - name: libraryId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Assistant system prompt template plus the version rendered for the active library
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantSystemPromptResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the requested library
  /v1/ready:
    get:
      tags:
      - system
      summary: Check backend readiness.
      description: Reads service health, readiness, version, or release metadata. Monitoring systems and the UI shell use these endpoints before calling heavier APIs. Call it from load balancers, deploy checks, and UI startup gates; it reports whether dependencies and required bootstrap state are usable.
      operationId: getReadiness
      responses:
        '200':
          description: All dependencies reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentReadinessSnapshot'
        '503':
          description: One or more dependencies are degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentReadinessSnapshot'
      security: []
  /v1/runtime/executions/{executionId}:
    get:
      tags:
      - runtime
      summary: Inspect one runtime execution.
      description: 'Loads the agent/tool-level runtime execution snapshot: owner, task/surface kind, lifecycle state, active stage, turn budget/count, failure code, and a redaction-safe policy summary. Distinct from a query execution — a runtime execution can be owned by a query turn, a graph-extraction attempt, or another agentic task, and is referenced independently via `runtimeExecutionId` in the audit filter set. The MCP tool `get_runtime_execution` is a thin wrapper over this same read.'
      operationId: getRuntimeExecution
      parameters:
      - name: executionId
        in: path
        description: Runtime execution identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Runtime execution snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeExecutionResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for this execution
        '404':
          description: Execution not found
  /v1/runtime/executions/{executionId}/trace:
    get:
      tags:
      - runtime
      summary: Inspect the full stage/action/policy trace of one runtime execution.
      description: 'Returns the complete `stages[]`/`actions[]`/`policy_decisions[]` trace recorded for one runtime execution, in addition to the execution snapshot itself. Use this for deep debugging of an agentic run: per-stage timing and outcome, per-action tool calls and usage, and every policy decision with its reason code. Traces are unbounded — long agentic executions can produce large stage/action counts; a size limit or pagination may be added at a later stage. The MCP tool `get_runtime_execution_trace` is a thin wrapper over this same read.'
      operationId: getRuntimeExecutionTrace
      parameters:
      - name: executionId
        in: path
        description: Runtime execution identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Runtime execution trace with stages, actions, and policy decisions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeExecutionTraceResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for this execution
        '404':
          description: Execution not found
  /v1/version:
    get:
      tags:
      - system
      summary: Get running service version.
      description: Reads service health, readiness, version, or release metadata. Monitoring systems and the UI shell use these endpoints before calling heavier APIs. Call it when the caller already has the resource identifier and needs the latest authorized server view.
      operationId: getVersion
      responses:
        '200':
          description: Build identifier and runtime metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
      security: []
  /v1/version/update:
    get:
      tags:
      - system
      summary: Check for an available release update.
      description: Reads service health, readiness, version, or release metadata. Monitoring systems and the UI shell use these endpoints before calling heavier APIs. Call it when the caller already has the resource identifier and needs the latest authorized server view.
      operationId: getReleaseUpdate
      responses:
        '200':
          description: Latest published release the service is aware of
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseUpdateResponse'
      security: []
  /v1/webhooks/subscriptions/{subscriptionId}:
    get:
      tags:
      - webhooks
      summary: Get webhook subscription.
      description: Manages outbound webhook subscriptions and delivery attempts. External systems use these subscriptions to receive document and revision lifecycle notifications. Call it when the caller already has the resource identifier and needs the latest authorized server view.
      operationId: getWebhookSubscription
      parameters:
      - name: subscriptionId
        in: path
        description: Webhook subscription identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Outbound webhook subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '401':
          description: Caller is not authenticated
        '404':
          description: Webhook subscription not found
    delete:
      tags:
      - webhooks
      summary: Delete webhook subscription.
      description: Manages outbound webhook subscriptions and delivery attempts. External systems use these subscriptions to receive document and revision lifecycle notifications. Call it to remove or revoke a resource. Destructive operations are authorized, audited, and may return an asynchronous operation when cleanup continues in the background.
      operationId: deleteWebhookSubscription
      parameters:
      - name: subscriptionId
        in: path
        description: Webhook subscription identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '202':
          description: Deletion accepted; an already-owned delivery is still draining. Retry DELETE until it returns 204
        '204':
          description: Webhook subscription deleted
        '401':
          description: Caller is not authenticated
        '404':
          description: Webhook subscription not found
    patch:
      tags:
      - webhooks
      summary: Update webhook subscription.
      description: Manages outbound webhook subscriptions and delivery attempts. External systems use these subscriptions to receive document and revision lifecycle notifications. Call it to replace or partially update server-owned configuration. The request body is validated before changes are persisted.
      operationId: updateWebhookSubscription
      parameters:
      - name: subscriptionId
        in: path
        description: Webhook subscription identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSubscriptionRequest'
        required: true
      responses:
        '200':
          description: Updated outbound webhook subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '400':
          description: Request body is invalid
        '401':
          description: Caller is not authenticated
        '404':
          description: Webhook subscription not found
        '409':
          description: Webhook subscription is draining or quota enforcement rejected reactivation
  /v1/webhooks/subscriptions/{subscriptionId}/attempts:
    get:
      tags:
      - webhooks
      summary: List webhook delivery attempts.
      description: Manages outbound webhook subscriptions and delivery attempts. External systems use these subscriptions to receive document and revision lifecycle notifications. Call it for paginated or filtered table views. Prefer server-side filters and cursors over fetching broad result sets into the client.
      operationId: listWebhookDeliveryAttempts
      parameters:
      - name: subscriptionId
        in: path
        description: Webhook subscription identifier
        required: true
        schema:
          type: string
          format: uuid
      - name: state
        in: query
        description: Optional delivery-state filter.
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: Page size, clamped to 1..=200. Defaults to 200.
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: |-
          Opaque keyset continuation token from a previous page's
          `nextCursor`. Absent starts from the newest attempt.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Delivery attempts for the outbound webhook subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryAttemptListPageResponse'
        '401':
          description: Caller is not authenticated
        '404':
          description: Webhook subscription not found
  /v1/webhooks/workspaces/{workspaceId}/subscriptions:
    get:
      tags:
      - webhooks
      summary: List webhook subscriptions.
      description: Manages outbound webhook subscriptions and delivery attempts. External systems use these subscriptions to receive document and revision lifecycle notifications. Call it for paginated or filtered table views. Prefer server-side filters and cursors over fetching broad result sets into the client.
      operationId: listWebhookSubscriptions
      parameters:
      - name: workspaceId
        in: path
        description: Workspace that owns the subscriptions
        required: true
        schema:
          type: string
          format: uuid
      - name: limit
        in: query
        description: Page size, clamped to 1..=200. Defaults to 100.
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: |-
          Opaque keyset continuation token from a previous page's
          `nextCursor`. Absent starts from the oldest subscription.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Outbound webhook subscriptions for a workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionListPageResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not a workspace administrator
    post:
      tags:
      - webhooks
      summary: Create webhook subscription.
      description: Manages outbound webhook subscriptions and delivery attempts. External systems use these subscriptions to receive document and revision lifecycle notifications. Call it to create work or submit a command. Some commands complete synchronously, while ingest, mutation, and runtime work can continue asynchronously.
      operationId: createWebhookSubscription
      parameters:
      - name: workspaceId
        in: path
        description: Workspace that owns the subscription
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubscriptionRequest'
        required: true
      responses:
        '201':
          description: Created outbound webhook subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '400':
          description: Request body is invalid
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not a workspace administrator
        '409':
          description: Workspace webhook subscription quota is exhausted
components:
  schemas:
    AdminCapabilityState:
      type: object
      description: Independent administration capabilities of the current principal.
      required:
      - adminEnabled
      - canManageTokens
      - canReadAudit
      - canReadOperations
      - canManageAi
      properties:
        adminEnabled:
          type: boolean
          description: Whether the administration surface is available at all.
        canManageAi:
          type: boolean
          description: Whether AI providers, credentials, presets, and bindings may be changed.
        canManageTokens:
          type: boolean
          description: Whether access tokens may be created or revoked.
        canReadAudit:
          type: boolean
          description: Whether audit events may be viewed.
        canReadOperations:
          type: boolean
          description: Whether operational state may be viewed.
    AdminSection:
      type: string
      description: Top-level sections of the administration console.
      enum:
      - access
      - mcp
      - operations
      - queue
      - ai
      - pricing
      - settings
    AdminSectionSummary:
      type: object
      description: Navigation metadata and access state for an administration section.
      required:
      - section
      - title
      - summary
      - gate
      properties:
        gate:
          $ref: '#/components/schemas/CapabilityGate'
          description: Access decision for the current principal.
        itemCount:
          type:
          - integer
          - 'null'
          format: int32
          description: Optional count of records represented by the section.
        section:
          $ref: '#/components/schemas/AdminSection'
          description: Section represented by the summary.
        summary:
          type: string
          description: Short description of the section contents.
        title:
          type: string
          description: Title shown in navigation.
    AdminSurface:
      type: object
      description: Lightweight administration shell state used before section data loads.
      required:
      - viewer
      - capabilities
      - sections
      - warnings
      properties:
        capabilities:
          $ref: '#/components/schemas/AdminCapabilityState'
          description: Administration capabilities of the current principal.
        sections:
          type: array
          items:
            $ref: '#/components/schemas/AdminSectionSummary'
          description: Navigation entries and access decisions for each section.
        viewer:
          $ref: '#/components/schemas/AdminViewerSummary'
          description: Compact summary of the current principal.
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/OperatorWarning'
          description: Current warnings that require operator attention.
    AdminViewerSummary:
      type: object
      description: Compact identity and access summary for the administration shell.
      required:
      - principalId
      - displayName
      - accessLabel
      - isAdmin
      properties:
        accessLabel:
          type: string
          description: Human-readable description of the principal's access level.
        displayName:
          type: string
          description: Human-readable principal name.
        isAdmin:
          type: boolean
          description: Whether the principal has the system administrator role.
        principalId:
          type: string
          format: uuid
          description: Principal represented by the current session.
    AgentLoopMetadata:
      type: object
      description: |-
        Metadata describing the tool-use loop that produced this snapshot.
        Present only on turns driven by tool-use execution; absent on
        single-shot grounded-answer turns.
      required:
      - iterationCap
      - deadlineMs
      - stoppedReason
      - toolCallCount
      properties:
        deadlineMs:
          type: integer
          format: int64
          minimum: 0
        iterationCap:
          type: integer
          minimum: 0
        stoppedReason:
          $ref: '#/components/schemas/AgentStopReason'
        toolCallCount:
          type: integer
          minimum: 0
    AgentStopReason:
      type: string
      description: Reason the tool-use loop stopped iterating.
      enum:
      - final_answer
      - iteration_cap
      - deadline
      - no_progress
      - tool_error
      - provider_error
    AiAccountResponse:
      type: object
      required:
      - id
      - scopeKind
      - providerCatalogId
      - label
      - apiKeySummary
      - credentialState
      - createdAt
      - updatedAt
      properties:
        apiKeySummary:
          type: string
        baseUrl:
          type:
          - string
          - 'null'
        createdAt:
          type: string
          format: date-time
        credentialState:
          type: string
        id:
          type: string
          format: uuid
        label:
          type: string
        libraryId:
          type:
          - string
          - 'null'
          format: uuid
        providerCatalogId:
          type: string
          format: uuid
        scopeKind:
          $ref: '#/components/schemas/AiScopeKind'
        updatedAt:
          type: string
          format: date-time
        workspaceId:
          type:
          - string
          - 'null'
          format: uuid
    AiBindingPurpose:
      type: string
      description: The six physical model bindings exposed to operators and runtime stages.
      enum:
      - extract_text
      - extract_graph
      - embed_chunk
      - query_compile
      - query_answer
      - agent
    AiBindingResponse:
      type: object
      required:
      - id
      - scopeKind
      - bindingPurpose
      - accountId
      - modelCatalogId
      - extraParametersJson
      - bindingState
      properties:
        accountId:
          type: string
          format: uuid
        bindingPurpose:
          $ref: '#/components/schemas/AiBindingPurpose'
        bindingState:
          type: string
        extraParametersJson: {}
        id:
          type: string
          format: uuid
        libraryId:
          type:
          - string
          - 'null'
          format: uuid
        maxOutputTokensOverride:
          type:
          - integer
          - 'null'
          format: int32
        modelCatalogId:
          type: string
          format: uuid
        scopeKind:
          $ref: '#/components/schemas/AiScopeKind'
        systemPrompt:
          type:
          - string
          - 'null'
        temperature:
          type:
          - number
          - 'null'
          format: double
        topP:
          type:
          - number
          - 'null'
          format: double
        workspaceId:
          type:
          - string
          - 'null'
          format: uuid
    AiScopeKind:
      type: string
      enum:
      - instance
      - workspace
      - library
    AssistantAnswerCandidate:
      type: object
      description: |-
        One typed disambiguation choice the answer pipeline surfaced alongside a
        clarifying answer.

        `kind` reuses the existing typed vocabulary where it applies — a graph
        `node_type` for entity probes, `"document"` for a document-derived variant
        — so agents can route a follow-up without parsing the prose answer body.
        `confidence` is `None` when the branch has no ranking signal to expose.
      required:
      - label
      - kind
      - provenance
      properties:
        confidence:
          type:
          - number
          - 'null'
          format: double
          description: Ranking confidence, when the producing branch exposes one.
        kind:
          type: string
          description: Typed candidate category used for follow-up routing.
        label:
          type: string
          description: User-facing label for the candidate.
        provenance:
          $ref: '#/components/schemas/AssistantAnswerCandidateProvenance'
          description: Stable source identifiers associated with the candidate.
    AssistantAnswerCandidateProvenance:
      type: object
      description: |-
        Structured provenance for a single answer candidate.

        Every field is optional because the clarify branches surface candidates
        derived from different evidence shapes: a graph-entity probe carries an
        `entity_id`, a document-derived variant carries a `document_id`, and a
        label-only variant (e.g. a grouped-reference title) carries none.
        Callers treat a present id as a stable handle for a follow-up tool call
        and a missing id as "label only".
      properties:
        chunkId:
          type:
          - string
          - 'null'
          format: uuid
          description: Source chunk represented by the candidate, when applicable.
        documentId:
          type:
          - string
          - 'null'
          format: uuid
          description: Source document represented by the candidate, when applicable.
        entityId:
          type:
          - string
          - 'null'
          format: uuid
          description: Graph entity represented by the candidate, when applicable.
    AssistantAnswerDisposition:
      type: string
      description: |-
        Finalizer-owned disposition of the public answer body.

        This is intentionally separate from [`AssistantVerificationState`]: a
        strict safe fallback is terminal but non-factual, while ordinary grounded
        prose may be factual-ready even when literal verification was not
        applicable.
      enum:
      - non_terminal
      - factual_ready
      - safe_fallback
      - clarification
    AssistantChunkReference:
      type: object
      description: Ranked citation linking an execution to a retrieved chunk.
      required:
      - executionId
      - chunkId
      - rank
      - score
      properties:
        chunkId:
          type: string
          format: uuid
          description: Referenced chunk identifier.
        executionId:
          type: string
          format: uuid
          description: Execution that selected the chunk.
        rank:
          type: integer
          format: int32
          description: Position assigned by evidence ranking.
        score:
          type: number
          format: double
          description: Relevance score used to rank the chunk.
    AssistantClarification:
      type: object
      description: |-
        Typed clarification metadata attached to a grounded-answer turn.

        The prose answer body stays authoritative for humans; this object is
        additive machine-readable metadata for agent callers. `required` is
        `true` only when the turn returned a clarifying answer; otherwise the
        candidate list is empty and `question` is `None`.
      required:
      - required
      properties:
        answerCandidates:
          type: array
          items:
            $ref: '#/components/schemas/AssistantAnswerCandidate'
          description: Structured choices available for resolving the ambiguity.
        question:
          type:
          - string
          - 'null'
          description: Clarifying question presented to the user.
        required:
          type: boolean
          description: Whether the user must clarify before a factual answer can proceed.
    AssistantContentSourceAccess:
      type: object
      description: Resolvable location for opening cited source content.
      required:
      - kind
      - href
      properties:
        href:
          type: string
          description: URI or application link used to open the source.
        kind:
          type: string
          description: Access mechanism represented by the location.
    AssistantConversationMessage:
      type: object
      description: Hydrated message presented in assistant conversation history.
      required:
      - id
      - role
      - content
      - timestamp
      properties:
        content:
          type: string
          description: Plain-text message content.
        evidence:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/AssistantEvidenceBundle'
            description: Answer evidence attached to the message, when available.
        executionId:
          type:
          - string
          - 'null'
          format: uuid
          description: Execution associated with the message, when applicable.
        id:
          type: string
          format: uuid
          description: Stable message identifier.
        role:
          $ref: '#/components/schemas/AssistantTurnRole'
          description: Author role represented by the message.
        timestamp:
          type: string
          format: date-time
          description: Time at which the message was recorded.
    AssistantEntityReference:
      type: object
      description: Ranked citation to an entity in the knowledge graph.
      required:
      - executionId
      - nodeId
      - rank
      - score
      - label
      properties:
        entityType:
          type:
          - string
          - 'null'
          description: Graph entity type, when classified.
        executionId:
          type: string
          format: uuid
          description: Execution that selected the entity.
        label:
          type: string
          description: Human-readable entity label.
        nodeId:
          type: string
          format: uuid
          description: Referenced graph-node identifier.
        rank:
          type: integer
          format: int32
          description: Position assigned by evidence ranking.
        score:
          type: number
          format: double
          description: Relevance score used to rank the entity.
        summary:
          type:
          - string
          - 'null'
          description: Concise entity description, when available.
    AssistantEvidenceBundle:
      type: object
      description: Evidence, verification, and runtime metadata attached to an answer.
      required:
      - chunkReferences
      - preparedSegmentReferences
      - technicalFactReferences
      - entityReferences
      - relationReferences
      - verificationState
      - verificationWarnings
      - clarification
      - runtimeSummary
      - runtimeStageSummaries
      properties:
        answerDisposition:
          $ref: '#/components/schemas/AssistantAnswerDisposition'
          description: Finalizer-owned outcome of the public answer body.
        chunkReferences:
          type: array
          items:
            $ref: '#/components/schemas/AssistantChunkReference'
          description: Ordered chunk citations that directly support the rendered answer.
        clarification:
          $ref: '#/components/schemas/AssistantClarification'
          description: |-
            Typed terminal clarification and its structured choices. This is
            included on history evidence so a page reload preserves the same
            machine-readable outcome as the live execution response.
        entityReferences:
          type: array
          items:
            $ref: '#/components/schemas/AssistantEntityReference'
          description: Graph entities cited by the answer.
        preparedSegmentReferences:
          type: array
          items:
            $ref: '#/components/schemas/AssistantPreparedSegmentReference'
          description: Prepared document segments used as structured answer evidence.
        referenceSummary:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/AssistantReferenceSummary'
            description: Aggregate counts and truncation metadata for the returned references.
        relationReferences:
          type: array
          items:
            $ref: '#/components/schemas/AssistantRelationReference'
          description: Graph relations cited by the answer.
        runtimeStageSummaries:
          type: array
          items:
            $ref: '#/components/schemas/AssistantRuntimeStageSummary'
          description: Ordered summaries of runtime stages observed for the answer.
        runtimeSummary:
          $ref: '#/components/schemas/AssistantRuntimeSummary'
          description: Agent-runtime state associated with the answer.
        technicalFactReferences:
          type: array
          items:
            $ref: '#/components/schemas/AssistantTechnicalFactReference'
          description: Typed facts selected from the evidence plane for this answer.
        verificationState:
          $ref: '#/components/schemas/AssistantVerificationState'
          description: Final evidence-verification outcome for the rendered answer.
        verificationWarnings:
          type: array
          items:
            $ref: '#/components/schemas/AssistantVerificationWarning'
          description: Structured verification limitations safe to present to the user.
    AssistantExecution:
      type: object
      description: Persisted execution that resolves one assistant request.
      required:
      - id
      - workspaceId
      - libraryId
      - conversationId
      - contextBundleId
      - lifecycleState
      - queryText
      - startedAt
      properties:
        activeStage:
          type:
          - string
          - 'null'
          description: Pipeline stage currently in progress, if any.
        bindingId:
          type:
          - string
          - 'null'
          format: uuid
