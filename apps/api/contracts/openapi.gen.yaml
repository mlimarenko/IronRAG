        executionId:
          type: string
          format: uuid
          description: Execution that selected the relation.
        normalizedAssertion:
          type:
          - string
          - 'null'
          description: Canonical relation statement, when one was produced.
        predicate:
          type: string
          description: Relation predicate connecting its endpoint entities.
        rank:
          type: integer
          format: int32
          description: Position assigned by evidence ranking.
        score:
          type: number
          format: double
          description: Relevance score used to rank the relation.
