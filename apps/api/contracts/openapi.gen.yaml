    UserAccessResponse:
      type: object
      description: |-
        The full per-user access picture: every workspace- and library-scoped grant
        the admin can manage from the Users access editor.
      required:
      - principalId
      - workspaces
      - libraries
      properties:
        libraries:
          type: array
          items:
            $ref: '#/components/schemas/UserLibraryAccessResponse'
        principalId:
          type: string
          format: uuid
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/UserWorkspaceAccessResponse'
    UserLibraryAccessResponse:
      type: object
      description: |-
        One library the user has been granted access to, with its workspace and the
        permission tier. Returned by `GET /iam/users/{id}/access`.
      required:
      - grantId
      - libraryId
      - workspaceId
      - displayName
      - permissionKind
      properties:
        displayName:
          type: string
        grantId:
          type: string
          format: uuid
        libraryId:
          type: string
          format: uuid
        permissionKind:
          $ref: '#/components/schemas/IamPermissionKind'
        workspaceId:
          type: string
          format: uuid
    UserProfile:
      type: object
      description: User-account attributes associated with a principal.
      required:
      - principalId
      - role
      properties:
        displayName:
          type:
          - string
          - 'null'
          description: Human-readable user name when one is recorded.
        email:
          type:
          - string
          - 'null'
          description: Email address when one is recorded.
        login:
          type:
          - string
          - 'null'
          description: Login identifier when the account supports direct sign-in.
        principalId:
          type: string
          format: uuid
          description: Principal represented by this user account.
        role:
          $ref: '#/components/schemas/SystemRole'
          description: System-wide role assigned to the user.
    UserResponse:
      type: object
      required:
      - principalId
      - login
      - email
      - displayName
      - role
      - authProviderKind
      properties:
        authProviderKind:
          type: string
        displayName:
          type: string
        email:
          type: string
        externalSubject:
          type:
          - string
          - 'null'
        login:
          type: string
        principalId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/SystemRole'
    UserWorkspaceAccessResponse:
      type: object
      description: |-
        One workspace the user has been granted access to, with the permission
        tier that access was granted at. Returned by `GET /iam/users/{id}/access`.
      required:
      - grantId
      - workspaceId
      - displayName
      - permissionKind
      properties:
        displayName:
          type: string
        grantId:
          type: string
          format: uuid
        permissionKind:
          $ref: '#/components/schemas/IamPermissionKind'
        workspaceId:
          type: string
          format: uuid
    VersionResponse:
      type: object
      required:
      - service
      - version
      - environment
      - role
      properties:
        environment:
          type: string
        role:
          type: string
        service:
          type: string
        version:
          type: string
    WebBoundaryPolicy:
      type: string
      enum:
      - same_host
      - same_host_and_subdomains
      - allow_external
    WebClassificationReason:
      type: string
      enum:
      - seed_accepted
      - duplicate_canonical_url
      - duplicate_content
      - outside_boundary_policy
      - exceeded_max_depth
      - exceeded_max_pages
      - url_filter
      - unsupported_scheme
      - invalid_url
      - inaccessible
      - unsupported_content
      - cancel_requested
    WebDiscoveredPage:
      type: object
      required:
      - candidateId
      - runId
      - normalizedUrl
      - depth
      - hostClassification
      - candidateState
      - discoveredAt
      - updatedAt
      properties:
        candidateId:
          type: string
          format: uuid
        candidateState:
          type: string
        canonicalUrl:
          type:
          - string
          - 'null'
        classificationDetail:
          type:
          - string
          - 'null'
        classificationReason:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WebClassificationReason'
        contentType:
          type:
          - string
          - 'null'
        depth:
          type: integer
          format: int32
        discoveredAt:
          type: string
          format: date-time
        discoveredUrl:
          type:
          - string
          - 'null'
        documentId:
          type:
          - string
          - 'null'
          format: uuid
        finalUrl:
          type:
          - string
          - 'null'
        hostClassification:
          type: string
        httpStatus:
          type:
          - integer
          - 'null'
          format: int32
        mutationItemId:
          type:
          - string
          - 'null'
          format: uuid
        normalizedUrl:
          type: string
        referrerCandidateId:
          type:
          - string
          - 'null'
          format: uuid
        resultRevisionId:
          type:
          - string
          - 'null'
          format: uuid
        runId:
          type: string
          format: uuid
        updatedAt:
          type: string
          format: date-time
    WebIngestMode:
      type: string
      enum:
      - single_page
      - recursive_crawl
    WebIngestPattern:
      type: object
      description: One typed URL-matching rule used by web-ingestion filters.
      required:
      - kind
      - value
      properties:
        kind:
          type: string
          description: Matching strategy understood by the web-ingestion policy.
        source:
          type:
          - string
          - 'null'
          description: Origin of the rule when it was inferred or imported.
        value:
          type: string
          description: Pattern payload interpreted according to `kind`.
    WebIngestPolicy:
      type: object
      required:
      - crawlFilter
      - materializationFilter
      properties:
        crawlFilter:
          $ref: '#/components/schemas/WebIngestUrlFilter'
        materializationFilter:
          $ref: '#/components/schemas/WebIngestUrlFilter'
      additionalProperties: false
    WebIngestRun:
      type: object
      required:
      - runId
      - mutationId
      - workspaceId
      - libraryId
      - mode
      - seedUrl
      - normalizedSeedUrl
      - boundaryPolicy
      - maxDepth
      - maxPages
      - crawlFilter
      - materializationFilter
      - runState
      - requestedAt
      - counts
      properties:
        asyncOperationId:
          type:
          - string
          - 'null'
          format: uuid
        boundaryPolicy:
          type: string
        cancelRequestedAt:
          type:
          - string
          - 'null'
          format: date-time
        completedAt:
          type:
          - string
          - 'null'
          format: date-time
        counts:
          $ref: '#/components/schemas/WebRunCounts'
        crawlFilter:
          $ref: '#/components/schemas/WebIngestUrlFilter'
        failureCode:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WebRunFailureCode'
        lastActivityAt:
          type:
          - string
          - 'null'
          format: date-time
        libraryId:
          type: string
          format: uuid
        materializationFilter:
          $ref: '#/components/schemas/WebIngestUrlFilter'
        maxDepth:
          type: integer
          format: int32
        maxPages:
          type: integer
          format: int32
        mode:
          type: string
        mutationId:
          type: string
          format: uuid
        normalizedSeedUrl:
          type: string
        requestedAt:
          type: string
          format: date-time
        requestedByPrincipalId:
          type:
          - string
          - 'null'
          format: uuid
        runId:
          type: string
          format: uuid
        runState:
          type: string
        seedUrl:
          type: string
        workspaceId:
          type: string
          format: uuid
    WebIngestRunReceipt:
      type: object
      required:
      - runId
      - libraryId
      - mode
      - runState
      - counts
      properties:
        asyncOperationId:
          type:
          - string
          - 'null'
          format: uuid
        cancelRequestedAt:
          type:
          - string
          - 'null'
          format: date-time
        counts:
          $ref: '#/components/schemas/WebRunCounts'
        failureCode:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WebRunFailureCode'
        libraryId:
          type: string
          format: uuid
        mode:
          type: string
        runId:
          type: string
          format: uuid
        runState:
          type: string
    WebIngestRunState:
      type: string
      description: Lifecycle of a bounded web-ingestion run.
      enum:
      - accepted
      - discovering
      - processing
      - completed
      - completed_partial
      - failed
      - canceled
    WebIngestRunSummary:
      type: object
      description: Configuration, progress, and counters for an existing crawl run.
      required:
      - runId
      - libraryId
      - mode
      - boundaryPolicy
      - maxDepth
      - maxPages
      - crawlFilter
      - materializationFilter
      - runState
      - seedUrl
      - counts
      properties:
        boundaryPolicy:
          type: string
          description: Origin or path boundary applied during discovery.
        counts:
          $ref: '#/components/schemas/WebRunCounts'
          description: Current candidate-state counters.
        crawlFilter:
          $ref: '#/components/schemas/WebIngestUrlFilter'
          description: URL rules applied before fetching a discovered candidate.
        lastActivityAt:
          type:
          - string
          - 'null'
          format: date-time
          description: Latest observed progress or terminal-state transition.
        libraryId:
          type: string
          format: uuid
          description: Destination library for materialized pages.
        materializationFilter:
          $ref: '#/components/schemas/WebIngestUrlFilter'
          description: URL rules applied before persisting a fetched page as a document.
        maxDepth:
          type: integer
          format: int32
          description: Maximum link distance from the seed page.
        maxPages:
          type: integer
          format: int32
          description: Maximum unique page candidates admitted by the run.
        mode:
          type: string
          description: Traversal mode selected when the run was created.
        runId:
          type: string
          format: uuid
          description: Stable run identifier.
        runState:
          $ref: '#/components/schemas/WebIngestRunState'
          description: Current run lifecycle.
        seedUrl:
          type: string
          description: Normalized URL from which traversal began.
    WebIngestUrlFilter:
      type: object
      description: Ordered admission and rejection rules for candidate URLs.
      required:
      - allowPatterns
      - blockPatterns
      properties:
        allowPatterns:
          type: array
          items:
            $ref: '#/components/schemas/WebIngestPattern'
          description: Rules that explicitly admit matching URLs.
        blockPatterns:
          type: array
          items:
            $ref: '#/components/schemas/WebIngestPattern'
          description: Rules that explicitly reject matching URLs.
    WebPageProvenance:
      type: object
      properties:
        candidateId:
          type:
          - string
          - 'null'
          format: uuid
        canonicalUrl:
          type:
          - string
          - 'null'
        runId:
          type:
          - string
          - 'null'
          format: uuid
        sourceUri:
          type:
          - string
          - 'null'
    WebRunCounts:
      type: object
      description: Candidate counters partitioning the work observed by a web-ingestion run.
      required:
      - discovered
      - eligible
      - processed
      - queued
      - processing
      - duplicates
      - excluded
      - blocked
      - failed
      - canceled
      properties:
        blocked:
          type: integer
          format: int32
          description: Candidates rejected by safety or traversal-boundary policy.
        canceled:
          type: integer
          format: int32
          description: Candidates canceled before a normal terminal outcome.
        discovered:
          type: integer
          format: int32
          description: Unique page candidates found during traversal.
        duplicates:
          type: integer
          format: int32
          description: Candidates converged with an existing canonical page.
        eligible:
          type: integer
          format: int32
          description: Candidates admitted by boundary and crawl filters.
        excluded:
          type: integer
          format: int32
          description: Candidates rejected by configured materialization filters.
        failed:
          type: integer
          format: int32
          description: Candidates ending in processing failure.
        processed:
          type: integer
          format: int32
          description: Candidates whose processing reached a terminal outcome.
        processing:
          type: integer
          format: int32
          description: Candidates with active processing attempts.
        queued:
          type: integer
          format: int32
          description: Candidates waiting for processing.
    WebRunFailureCode:
      type: string
      enum:
      - inaccessible
      - invalid_url
      - unsupported_content
      - web_discovery_failed
      - web_snapshot_persist_failed
      - web_snapshot_missing
      - web_snapshot_missing_final_url
      - web_snapshot_unavailable
      - web_capture_materialization_failed
      - recursive_crawl_failed
    WorkspaceAccessEntryRequest:
      type: object
      description: Desired workspace access entry in a `PUT /iam/users/{id}/access` request.
      required:
      - workspaceId
      - permissionKind
      properties:
        permissionKind:
          $ref: '#/components/schemas/IamPermissionKind'
        workspaceId:
          type: string
          format: uuid
    WorkspaceCostSummary:
      type: object
      required:
      - totalCost
      - currencyCode
      - libraryCount
      - documentCount
      - providerCallCount
      properties:
        currencyCode:
          type: string
        documentCount:
          type: integer
          format: int64
        libraryCount:
          type: integer
          format: int64
        providerCallCount:
          type: integer
          format: int64
        totalCost:
          type: string
    WorkspaceMembership:
      type: object
      description: Principal membership and lifecycle within a workspace.
      required:
      - workspaceId
      - principalId
      - membershipState
      - joinedAt
      properties:
        endedAt:
          type:
          - string
          - 'null'
          format: date-time
          description: Time at which the membership ended, if inactive.
        joinedAt:
          type: string
          format: date-time
          description: Time at which the membership began.
        membershipState:
          type: string
          description: Current membership lifecycle state.
        principalId:
          type: string
          format: uuid
          description: Principal holding the membership.
        workspaceId:
          type: string
          format: uuid
          description: Workspace to which the membership applies.
    WorkspaceMembershipResponse:
      type: object
      required:
      - workspaceId
      - principalId
      - membershipState
      - joinedAt
      properties:
        endedAt:
          type:
          - string
          - 'null'
          format: date-time
        joinedAt:
          type: string
          format: date-time
        membershipState:
          type: string
        principalId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
    WorkspaceSnapshotImportAcceptedResponse:
      type: object
      required:
      - operationId
      - workspaceId
      - onConflict
      - archiveBytes
      properties:
        archiveBytes:
          type: integer
          format: int64
          minimum: 0
        onConflict:
          $ref: '#/components/schemas/OverwriteMode'
        operationId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
    WorkspaceSummary:
      type: object
      description: Minimal workspace metadata needed by the scope selector.
      required:
      - id
      - slug
      - name
      - lifecycleState
      properties:
        id:
          type: string
          format: uuid
          description: Stable workspace identifier.
        lifecycleState:
          type: string
          description: Current workspace lifecycle state as exposed by the API.
        name:
          type: string
          description: Display name shown in the scope selector.
        slug:
          type: string
          description: URL-safe workspace identifier.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
- bearerAuth: []
