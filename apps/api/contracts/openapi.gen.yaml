        archive is already zstd-compressed).
      description: Manages catalog workspaces. Workspaces group libraries, IAM scope, billing summaries, and administrative ownership boundaries. Call it to export a portable library archive for backup, migration, or offline inspection.
      operationId: exportCatalogWorkspaceSnapshot
      parameters:
      - name: workspaceId
        in: path
        description: Workspace identifier
        required: true
        schema:
          type: string
          format: uuid
      - name: include
        in: query
        description: Comma-separated include kinds applied to every library archive (default `library_data,blobs`)
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Streaming plain tar bundling every library archive
          content:
            application/x-tar:
              schema:
                type: string
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the workspace
        '404':
          description: Workspace not found
    put:
      tags:
      - catalog
      summary: |-
        Restores a whole workspace from a plain-tar snapshot body (full-replace
        `PUT`), provisioning one fresh library per embedded archive. Admits the
        restore for async processing and returns `202 Accepted` with
        `Location: /v1/ops/operations/{operationId}` — the same async-admission
        pattern used by `content::create_revision` and the library snapshot
        import, rather than blocking the request on a potentially very large
        multi-library restore.
      description: Manages catalog workspaces. Workspaces group libraries, IAM scope, billing summaries, and administrative ownership boundaries. Call it to replace or partially update server-owned configuration. The request body is validated before changes are persisted.
      operationId: importCatalogWorkspaceSnapshot
      parameters:
      - name: workspaceId
        in: path
        description: Workspace identifier
        required: true
        schema:
          type: string
          format: uuid
      - name: onConflict
        in: query
        description: '''reject'' (default) or ''replace'''
        required: false
        schema:
          $ref: '#/components/schemas/OverwriteMode'
      requestBody:
        description: Plain tar archive previously emitted by GET /v1/catalog/workspaces/{workspaceId}/snapshot
        content:
          application/x-tar: {}
      responses:
        '202':
          description: Workspace snapshot import accepted; poll /v1/ops/operations/{operationId}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSnapshotImportAcceptedResponse'
