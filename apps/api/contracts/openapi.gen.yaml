        file upload (former `POST /v1/content/documents/upload`). Both bodies
        converge on the same `CreateDocumentAdmission` result and the same
        201 + Location response — there is one creation door, not two.
      description: Manages document content and derived document views. These endpoints are used by document workspaces, upload flows, source viewers, revision history, and document-level diagnostics. Call it to create work or submit a command. Some commands complete synchronously, while ingest, mutation, and runtime work can continue asynchronously.
