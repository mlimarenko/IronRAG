          type:
          - string
          - 'null'
          description: Stable failure code for an unsuccessful execution.
        id:
          type: string
          format: uuid
          description: Stable execution identifier.
        libraryId:
          type: string
          format: uuid
          description: Knowledge library queried by the execution.
        lifecycleState:
          type: string
          description: Current execution lifecycle state.
        queryText:
          type: string
          description: User query submitted for execution.
        requestTurnId:
          type:
          - string
          - 'null'
          format: uuid
          description: User turn that initiated the execution, when persisted.
        responseTurnId:
          type:
          - string
          - 'null'
          format: uuid
          description: Assistant turn produced by the execution, when persisted.
        runtimeExecutionId:
          type:
          - string
          - 'null'
          format: uuid
          description: Associated agent-runtime execution, when delegated to the runtime.
        startedAt:
          type: string
          format: date-time
          description: Time at which execution processing began.
        workspaceId:
          type: string
          format: uuid
          description: Workspace in which the execution ran.
    AssistantExecutionDetail:
      type: object
      description: Complete persisted evidence and turn context for one execution.
      required:
      - contextBundleId
      - execution
      - runtimeSummary
      - runtimeStageSummaries
      - chunkReferences
      - preparedSegmentReferences
      - technicalFactReferences
      - entityReferences
      - relationReferences
      - verificationState
      - verificationWarnings
      properties:
        answerDisposition:
          $ref: '#/components/schemas/AssistantAnswerDisposition'
          description: |-
            Finalizer-owned typed outcome. Historical rows created before this
            field existed deserialize conservatively as `non_terminal`.
        chunkReferences:
          type: array
          items:
            $ref: '#/components/schemas/AssistantChunkReference'
          description: Chunk citations persisted with this execution record.
        clarification:
          $ref: '#/components/schemas/AssistantClarification'
          description: |-
            Typed clarification metadata for this turn. Defaults to
            `required: false` with no candidates for ordinary answers and for
            historical rows created before typed clarification persistence; a
            clarify turn populates `question` and `answer_candidates`.
        contextBundleId:
          type: string
          format: uuid
          description: Captured context bundle used for the execution.
        entityReferences:
          type: array
          items:
            $ref: '#/components/schemas/AssistantEntityReference'
          description: Entity citations retained for execution inspection and replay.
        execution:
          $ref: '#/components/schemas/AssistantExecution'
          description: Core execution record.
        preparedSegmentReferences:
          type: array
          items:
            $ref: '#/components/schemas/AssistantPreparedSegmentReference'
          description: Structured segment citations persisted with this execution record.
        referenceSummary:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/AssistantReferenceSummary'
            description: Persisted aggregate counts and truncation metadata for all citations.
        relationReferences:
          type: array
          items:
            $ref: '#/components/schemas/AssistantRelationReference'
          description: Relation citations retained for execution inspection and replay.
        requestTurn:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/AssistantTurn'
            description: Request turn that initiated the execution, when available.
        responseTurn:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/AssistantTurn'
            description: Response turn produced by the execution, when available.
        runtimeStageSummaries:
          type: array
          items:
            $ref: '#/components/schemas/AssistantRuntimeStageSummary'
          description: Ordered summaries of runtime stages observed during execution.
        runtimeSummary:
          $ref: '#/components/schemas/AssistantRuntimeSummary'
          description: Agent-runtime state associated with the execution.
        technicalFactReferences:
          type: array
          items:
            $ref: '#/components/schemas/AssistantTechnicalFactReference'
          description: Typed fact citations persisted with this execution record.
        verificationState:
          $ref: '#/components/schemas/AssistantVerificationState'
          description: Verification outcome stored when this execution reached its terminal state.
        verificationWarnings:
          type: array
          items:
            $ref: '#/components/schemas/AssistantVerificationWarning'
          description: Structured verification limitations stored with the execution.
