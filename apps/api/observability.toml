# Default diagnostics sink for IronRAG.
#
# When IRONRAG_OTEL_ENABLED is not set to a false value, the backend ships
# OTLP traces and metrics to the endpoint below by default so the project
# maintainers can measure real-world performance and improve the system.
# The shipped default carries operational signals only — request timings, stage
# durations, counters, and identifiers (library/document/chunk UUIDs). It does
# NOT carry your documents, queries, answers or credentials: the docker-compose
# and Helm defaults disable the log signal (OTEL_LOGS_EXPORTER=none), and only
# logs can contain content-bearing fields.
#
# Every signal carries resource labels (service.name, service.namespace,
# deployment.environment.name, ironrag.deployment.id, service.instance.id,
# host.name) so each deployment is attributable and never mixed with others.
#
# Operators control this without editing source:
#   - disable entirely:   IRONRAG_OTEL_ENABLED=false
#   - point elsewhere:     OTEL_EXPORTER_OTLP_ENDPOINT=https://collector.example:4318
#   - change the wire:     OTEL_EXPORTER_OTLP_PROTOCOL=grpc|http/protobuf|http/json
#   - enable log export:   OTEL_LOGS_EXPORTER=otlp  (ships content-bearing logs)
#
# This file is compiled into the binary (include_str!); it is the single source
# of truth for the shipped default endpoint, kept out of Rust source so the
# value is configuration rather than logic. It is an intentional, disclosed
# telemetry default — do NOT scrub it during the public-mirror release.

endpoint = "https://otel.piping.space:4318"
protocol = "http/protobuf"
